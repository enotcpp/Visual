<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Edit Distance Visualizer</title>
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --border: #3e3e42;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            padding: 2rem 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main);
            color: var(--text-main); 
        }
        
        .wrap { max-width: 700px; margin: 0 auto; padding: 0 20px; }
        
        .inputs { display: flex; gap: 12px; margin: 0 0 20px; align-items: center; flex-wrap: wrap; }
        .inputs label { font-size: 14px; color: var(--text-secondary); }
        .inputs input { 
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 8px;
            width: 140px; 
            font-family: monospace; 
        }
        
        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 14px;
        }
        button:hover { opacity: 0.9; }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }

        .info-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px; 
            font-size: 14px; 
            line-height: 1.6;
            min-height: 80px; 
            margin: 0 0 20px;
        }
        .info-box b { color: var(--accent); }
        .info-box code { background: #3e3e42; padding: 2px 6px; border-radius: 4px; font-family: monospace; }

        .legend { display: flex; gap: 15px; flex-wrap: wrap; font-size: 12px; color: var(--text-secondary); margin: 0 0 20px; }
        .leg { display: flex; align-items: center; gap: 6px; }
        .ldot { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }

        .tbl-wrap { overflow-x: auto; margin: 0 0 20px; }
        table { border-collapse: separate; border-spacing: 6px; margin: 0 auto; }
        th { font-size: 13px; color: var(--text-secondary); padding: 5px; min-width: 48px; }
        .rlbl { font-size: 13px; color: var(--text-secondary); text-align: right; padding-right: 10px; }

        .cell {
            width: 48px; height: 48px; border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            text-align: center; vertical-align: middle;
            font-size: 16px; color: var(--text-secondary);
            transition: all .2s;
        }
        .cell.filled  { background: var(--bg-input); color: var(--text-main); }
        .cell.cur     { background: #3c3489; border: 2px solid #7f77dd; color: white; font-weight: bold; }
        .cell.match   { background: #085041; border: 2px solid #1d9e75; color: white; }
        .cell.op-rep  { background: #633806; border: 1.5px solid #ba7517; color: white; }
        .cell.op-del  { background: #712b13; border: 1.5px solid #993c1d; color: white; }
        .cell.op-ins  { background: #0c447c; border: 1.5px solid #185fa5; color: white; }
        .cell.hi      { border-color: #5c5c63; }

        .op-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin: 0 4px; text-transform: uppercase; }
        .badge-match { background: #1d9e75; color: white; }
        .badge-rep   { background: #ba7517; color: white; }
        .badge-del   { background: #993c1d; color: white; }
        .badge-ins   { background: #185fa5; color: white; }

        .ctrls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .ctr-lbl { font-size: 13px; color: var(--text-secondary); margin-left: auto; }
        .res { font-size: 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border); padding-top: 20px; }
        .res-val { font-size: 24px; font-weight: bold; color: var(--accent); }
        
        .str-row { font-size: 16px; margin: 0 0 15px; min-height: 24px; background: var(--bg-card); padding: 10px; border-radius: 8px; }
        .ch { display: inline-block; padding: 0 4px; margin: 0 1px; border-radius: 4px; font-family: monospace; }
        .ch-cur   { background: #3c3489; color: white; }
        .ch-match { background: #085041; color: white; }
        .err { font-size: 12px; color: #ff6b6b; margin-top: -15px; margin-bottom: 15px; min-height: 16px; }
    </style>
</head>
<body>

<div class="wrap">
  <div class="inputs">
    <label>Text 1</label>
    <input id="in1" type="text" value="adbdcd" maxlength="12" oninput="onInput()">
    <label>Text 2</label>
    <input id="in2" type="text" value="abc" maxlength="12" oninput="onInput()">
    <button onclick="rebuild()">Apply</button>
  </div>
  <div class="err" id="err"></div>

  <div class="legend">
    <div class="leg"><div class="ldot" style="background:#3c3489;border:2px solid #7f77dd"></div>current</div>
    <div class="leg"><div class="ldot" style="background:#085041;border:2px solid #1d9e75"></div>match</div>
    <div class="leg"><div class="ldot" style="background:#633806;border:1.5px solid #ba7517"></div>replace</div>
    <div class="leg"><div class="ldot" style="background:#712b13;border:1.5px solid #993c1d"></div>delete</div>
    <div class="leg"><div class="ldot" style="background:#0c447c;border:1.5px solid #185fa5"></div>insert</div>
  </div>

  <div class="str-row" id="str-display"></div>
  <div class="info-box" id="info">Click "Next Step" to start.</div>
  
  <div class="tbl-wrap"><div id="tbl"></div></div>

  <div class="ctrls">
    <button class="secondary" onclick="go(-1)">< Back</button>
    <button onclick="go(1)">Next Step ></button>
    <button class="secondary" onclick="jumpEnd()">Finish �</button>
    <button class="secondary" onclick="resetAll()">Reset</button>
    <span class="ctr-lbl" id="ctr"></span>
  </div>
  
  <div class="res">Final DP[n][m]: <span class="res-val" id="resv">�</span></div>
</div>

<script>
let t1 = 'adbdcd', t2 = 'abc';
let steps = [], cur = 0;

function onInput() {
  document.getElementById('err').textContent = '';
}

function rebuild() {
  const v1 = document.getElementById('in1').value.trim();
  const v2 = document.getElementById('in2').value.trim();
  const err = document.getElementById('err');
  if (!v1 || !v2) { err.textContent = 'Both fields are required.'; return; }
  if (v1.length > 12 || v2.length > 12) { err.textContent = 'Max 12 characters.'; return; }
  err.textContent = '';
  t1 = v1; t2 = v2;
  steps = buildSteps();
  cur = 0;
  render();
}

function buildSteps() {
  const n = t1.length, m = t2.length;
  const _steps = [];
  const dp = Array.from({length: n+1}, (_,i) =>
    Array.from({length: m+1}, (_,j) => i===0 ? j : (j===0 ? i : 0))
  );

  _steps.push({ i:-1, j:-1, n, m, dp: dp.map(r=>[...r]), action:'start', src:null,
    msg: 'Base cases initialized: <code>dp[i][0]=i</code> (deletion) and <code>dp[0][j]=j</code> (insertion).' });

  for (let i = 1; i <= n; i++) {
    for (let j = 1; j <= m; j++) {
      const isMatch = t1[i-1] === t2[j-1];
      const rep  = dp[i-1][j-1] + (isMatch ? 0 : 1);
      const del_ = dp[i-1][j]   + 1;
      const ins  = dp[i][j-1]   + 1;
      dp[i][j] = Math.min(rep, del_, ins);

      let action, src;
      if (isMatch)                            { action='match';   src='diag'; }
      else if (rep <= del_ && rep <= ins)     { action='replace'; src='diag'; }
      else if (del_ <= ins)                   { action='delete';  src='top';  }
      else                                    { action='insert';  src='left'; }

      const opLine = isMatch
        ? `<span class="op-badge badge-match">match</span> dp[${i-1}][${j-1}] + 0 = ${dp[i][j]}`
        : `<span class="op-badge badge-rep">rep</span>${rep} | <span class="op-badge badge-del">del</span>${del_} | <span class="op-badge badge-ins">ins</span>${ins} > min = ${dp[i][j]}`;

      _steps.push({ i, j, n, m, dp: dp.map(r=>[...r]), action, src,
        msg: `Comparing <b>'${t1[i-1]}'</b> and <b>'${t2[j-1]}'</b><br>${opLine}<br><b>dp[${i}][${j}] = ${dp[i][j]}</b>` });
    }
  }
  _steps.push({ i:n, j:m, n, m, dp: dp.map(r=>[...r]), action:'done', src:null,
    msg: `<b>Calculation complete.</b> The Levenshtein distance is <b>${dp[n][m]}</b>.` });
  return _steps;
}

function renderStrDisplay(s) {
  if (s.i < 1) { document.getElementById('str-display').innerHTML = 'Waiting for input...'; return; }
  const ci = s.i-1, cj = s.j-1, isMat = s.action==='match';
  let h1='', h2='';
  for (let k=0;k<t1.length;k++) {
    const cls = k===ci ? (isMat?'ch ch-match':'ch ch-cur') : 'ch';
    h1 += `<span class="${cls}">${t1[k]}</span>`;
  }
  for (let k=0;k<t2.length;k++) {
    const cls = k===cj ? (isMat?'ch ch-match':'ch ch-cur') : 'ch';
    h2 += `<span class="${cls}">${t2[k]}</span>`;
  }
  document.getElementById('str-display').innerHTML = `T1: ${h1} &nbsp; | &nbsp; T2: ${h2}`;
}

function render() {
  const s = steps[cur];
  const {n, m} = s;
  document.getElementById('ctr').textContent = `step ${cur} / ${steps.length-1}`;
  document.getElementById('resv').textContent = s.action==='done' ? s.dp[n][m] : (cur===0?'�':'...');
  document.getElementById('info').innerHTML = s.msg;
  renderStrDisplay(s);

  let html = '<table><tr><th></th><th>""</th>';
  for (let j=0;j<m;j++) html+=`<th>${t2[j]}</th>`;
  html+='</tr>';

  for (let i=0;i<=n;i++) {
    const rl = i===0 ? '""' : t1[i-1];
    html+=`<tr><td class="rlbl">${rl}</td>`;
    for (let j=0;j<=m;j++) {
      const isBase = i===0||j===0;
      const isFilled = isBase||(cur>0&&(i<s.i||(i===s.i&&j<=s.j)));
      const val = s.dp[i][j];
      let cls='cell';
      if (isFilled) cls+=' filled';
      if (s.i>0&&s.j>0&&s.action!=='start') {
        if (i===s.i&&j===s.j) {
          if      (s.action==='match')   cls+=' match';
          else if (s.action==='replace') cls+=' op-rep cur';
          else if (s.action==='delete')  cls+=' op-del cur';
          else if (s.action==='insert')  cls+=' op-ins cur';
          else cls+=' cur';
        } else if (s.src==='diag'&&i===s.i-1&&j===s.j-1) { cls+=s.action==='match'?' match':' op-rep'; }
          else if (s.src==='top' &&i===s.i-1&&j===s.j)   { cls+=' op-del'; }
          else if (s.src==='left'&&i===s.i  &&j===s.j-1) { cls+=' op-ins'; }
        if (i===s.i&&j!==s.j) cls+=' hi';
        if (j===s.j&&i!==s.i) cls+=' hi';
      }
      html+=`<td class="${cls}">${isFilled?val:''}</td>`;
    }
    html+='</tr>';
  }
  html+='</table>';
  document.getElementById('tbl').innerHTML = html;
}

function go(dir)  { const nx=cur+dir; if(nx>=0&&nx<steps.length){cur=nx;render();} }
function jumpEnd(){ cur=steps.length-1; render(); }
function resetAll(){ cur=0; render(); }

steps = buildSteps();
render();
</script>
</body>
</html>
