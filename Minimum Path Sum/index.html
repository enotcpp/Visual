<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>64. Minimum Path Sum (Fixed Grid)</title>
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --accent-secondary: #1d9e75;
            --border: #3e3e42;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 2rem 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        h1 { font-size: 24px; margin-bottom: 20px; }

        .inputs { display: flex; gap: 15px; margin-bottom: 25px; align-items: flex-end; }
        .inputs textarea { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: var(--text-main); padding: 10px; border-radius: 8px;
            width: 250px; height: 70px; font-family: monospace; font-size: 14px; resize: none;
        }
        
        button {
            padding: 12px 24px; border-radius: 8px; border: none;
            background: var(--accent); color: white; font-weight: 600;
            cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        button:hover { opacity: 0.9; }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }

        .info-box {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px; font-size: 15px; line-height: 1.6;
            min-height: 90px; margin-bottom: 25px; border-left: 4px solid var(--accent);
        }

        /* КОНТЕЙНЕР ДЛЯ СЕТКИ */
        .grid-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            overflow-x: auto;
            padding: 10px;
        }

        /* САМА СЕТКА (CSS GRID) */
        #grid-main {
            display: grid;
            /* Количество колонок задается через JS переменную --cols */
            grid-template-columns: repeat(var(--cols, 3), 75px);
            gap: 12px;
        }
        
        .cell {
            width: 75px; height: 75px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg-card);
            position: relative; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }
        
        .grid-val { font-size: 11px; color: var(--text-secondary); position: absolute; top: 6px; right: 8px; }
        .dp-val { font-size: 22px; font-weight: bold; color: var(--text-main); }
        
        /* Состояния ячеек */
        .cell.filled { background: var(--bg-input); }
        .cell.active { 
            border: 3px solid var(--accent); 
            background: #3c3489; 
            transform: scale(1.1); 
            z-index: 10;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .cell.source { border: 2.5px solid var(--accent-secondary); background: #085041; }
        .cell.path { background: #5c54c7; border-color: #fff; box-shadow: 0 0 15px var(--accent); }

        .ctrls { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .ctr-lbl { font-size: 13px; color: var(--text-secondary); margin-left: auto; }
        
        .res { font-size: 16px; border-top: 1px solid var(--border); padding-top: 20px; display: flex; align-items: center; gap: 12px; }
        .res-val { font-size: 28px; font-weight: bold; color: var(--accent-secondary); }
    </style>
</head>
<body>

<div class="wrap">
    <h1>64. Minimum Path Sum (Horizontal Scan)</h1>
    
    <div class="inputs">
        <textarea id="grid-input">1,3,1
1,5,1
4,2,1</textarea>
        <button onclick="rebuild()">Update Grid</button>
    </div>

    <div class="info-box" id="info">Press "Next Step" to calculate the path horizontally (row by row).</div>

    <div class="grid-wrapper">
        <div id="grid-main"></div>
    </div>

    <div class="ctrls">
        <button class="secondary" onclick="go(-1)">← Back</button>
        <button onclick="go(1)">Next Step →</button>
        <button class="secondary" onclick="resetAll()">Reset</button>
        <span class="ctr-lbl" id="ctr"></span>
    </div>
    
    <div class="res">Minimum Sum: <span class="res-val" id="resv">—</span></div>
</div>

<script>
let grid = [[1,3,1],[1,5,1],[4,2,1]];
let steps = [];
let cur = 0;

function rebuild() {
    const text = document.getElementById('grid-input').value.trim();
    const rows = text.split('\n');
    try {
        const newGrid = rows.map(r => r.split(',').map(v => parseInt(v.trim())).filter(v => !isNaN(v)));
        if (newGrid.length > 0 && newGrid[0].length > 0) {
            grid = newGrid;
            init();
        }
    } catch(e) { alert("Format: numbers separated by commas."); }
}

function init() {
    steps = buildSteps();
    cur = 0;
    render();
}

function buildSteps() {
    const R = grid.length;
    const C = grid[0].length;
    let _steps = [];
    let dp = Array.from({length: R}, () => Array(C).fill(null));

    _steps.push({ r:-1, c:-1, dp: dp.map(row=>[...row]), sources:[], msg: "Ready. We will process the grid <b>row by row</b>." });

    for (let r = 0; r < R; r++) {
        for (let c = 0; c < C; c++) {
            let sources = [];
            if (r === 0 && c === 0) {
                dp[r][c] = grid[r][c];
                _steps.push({ r, c, dp: dp.map(row=>[...row]), sources, 
                    msg: `Row 0, Col 0: Base case. Sum = <b>${dp[r][c]}</b>` });
            } else {
                let fromTop = r > 0 ? dp[r-1][c] : Infinity;
                let fromLeft = c > 0 ? dp[r][c-1] : Infinity;
                if (r > 0) sources.push({r: r-1, c});
                if (c > 0) sources.push({r, c: c-1});

                dp[r][c] = grid[r][c] + Math.min(fromTop, fromLeft);
                
                let detail = (r > 0 && c > 0) 
                    ? `Min(Top:${fromTop}, Left:${fromLeft}) = ${Math.min(fromTop, fromLeft)}`
                    : (r > 0 ? `Only Top: ${fromTop}` : `Only Left: ${fromLeft}`);

                _steps.push({ r, c, dp: dp.map(row=>[...row]), sources, 
                    msg: `Position [${r},${c}]: ${grid[r][c]} + ${detail} = <b>${dp[r][c]}</b>` });
            }
        }
    }

    let path = [];
    let cr = R - 1, cc = C - 1;
    while (cr >= 0 && cc >= 0) {
        path.push({r: cr, c: cc});
        if (cr === 0 && cc === 0) break;
        if (cr === 0) cc--;
        else if (cc === 0) cr--;
        else (dp[cr-1][cc] < dp[cr][cc-1]) ? cr-- : cc--;
    }

    _steps.push({ r: R-1, c: C-1, dp: dp.map(row=>[...row]), sources:[], path, done: true,
        msg: `<b>Calculation complete!</b> The minimum path is highlighted.` });

    return _steps;
}

function render() {
    const s = steps[cur];
    const R = grid.length;
    const C = grid[0].length;
    
    document.getElementById('ctr').textContent = `step ${cur} / ${steps.length - 1}`;
    document.getElementById('info').innerHTML = s.msg;
    document.getElementById('resv').textContent = s.done ? s.dp[R-1][C-1] : '...';

    const viz = document.getElementById('grid-main');
    
    // ПРИНУДИТЕЛЬНО УСТАНАВЛИВАЕМ КОЛИЧЕСТВО КОЛОНОК
    viz.style.setProperty('--cols', C);
    
    let html = '';
    for (let r = 0; r < R; r++) {
        for (let c = 0; c < C; c++) {
            let cls = 'cell';
            if (s.dp[r][c] !== null) cls += ' filled';
            if (r === s.r && c === s.c) cls += ' active';
            if (s.sources.some(src => src.r === r && src.c === c)) cls += ' source';
            if (s.path && s.path.some(p => p.r === r && p.c === c)) cls += ' path';
            
            html += `
                <div class="${cls}">
                    <div class="grid-val">${grid[r][c]}</div>
                    <div class="dp-val">${s.dp[r][c] !== null ? s.dp[r][c] : ''}</div>
                </div>`;
        }
    }
    viz.innerHTML = html;
}

function go(dir) { const nx = cur + dir; if (nx >= 0 && nx < steps.length) { cur = nx; render(); } }
function resetAll() { cur = 0; render(); }

init();
</script>
</body>
</html>
