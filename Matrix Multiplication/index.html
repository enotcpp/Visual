<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Multiplication | AlgoView Lab</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-main: #141416;
            --bg-card: #1e1e22;
            --bg-input: #26262a;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd; /* Purple */
            --accent-soft: rgba(127, 119, 221, 0.1);
            --border: #313136;
            --code-bg: #0d0d0f;
            --highlight-a: #e67e22; /* Orange for Matrix A */
            --highlight-b: #1d9e75; /* Green for Matrix B */
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        h1 { font-size: 22px; margin-top: 0; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }

        .visualizer-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .inputs { display: flex; gap: 15px; margin-bottom: 25px; align-items: flex-start; flex-wrap: wrap; }
        .matrix-input-group { display: flex; flex-direction: column; gap: 8px; }
        .matrix-input-group label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;}
        
        .inputs textarea { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 8px; outline: none; 
            font-family: monospace; font-size: 14px; resize: none;
            width: 200px; height: 80px; line-height: 1.5;
        }
        
        .controls { display: flex; gap: 12px; align-items: center; margin-top: 10px; }
        button {
            padding: 10px 18px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-main); font-weight: 600;
            cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        button:hover { border-color: var(--accent); background: #2d2d32; }
        button.primary { background: var(--accent); color: white; border: none; }

        .info-box { min-height: 45px; color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; border-left: 3px solid var(--border); padding-left: 15px; }
        .info-box b { color: var(--accent); }
        .info-box .math { font-family: monospace; color: var(--accent); font-weight: bold; }

        /* MATRIX VISUALIZATION AREA */
        .matrix-container { 
            display: flex; justify-content: center; align-items: center; 
            gap: 40px; margin: 40px 0; min-height: 250px; flex-wrap: wrap;
        }

        .matrix-block { display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; }
        .matrix-label { font-size: 11px; text-transform: uppercase; font-weight: 800; color: var(--text-secondary); letter-spacing: 1.5px; }
        
        .matrix-grid { 
            display: grid; border: 2px solid var(--border); border-radius: 12px; overflow: hidden;
            background: var(--bg-main); gap: 1px;
        }
        
        .matrix-cell {
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            font-family: monospace; font-size: 18px; font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-main); 
            /* --- FIX: Added base border to define dividers --- */
            border: 1px solid var(--border); 
        }

        /* Logic highlighters - semitransparent backgrounds and borders for text clarity */
        .grid-a .cell-active { background-color: rgba(230, 126, 34, 0.1); border: 1px dashed var(--highlight-a); color: var(--highlight-a); }
        .grid-b .cell-active { background-color: rgba(29, 158, 117, 0.1); border: 1px dashed var(--highlight-b); color: var(--highlight-b); }
        
        /* Highlight specific pairs during multiplication */
        .matrix-grid.grid-a .matrix-cell.cell-pair { background-color: rgba(230, 126, 34, 0.4); color: white; border: 2px solid var(--highlight-a); font-weight: 800; }
        .matrix-grid.grid-b .matrix-cell.cell-pair { background-color: rgba(29, 158, 117, 0.4); color: white; border: 2px solid var(--highlight-b); font-weight: 800; }

        /* Result Cell */
        .matrix-grid.grid-c .matrix-cell.cell-result { background-color: var(--accent-soft); border: 2px solid var(--accent); color: var(--accent); font-weight: 800; }

        .operator { font-size: 24px; font-weight: 300; color: var(--text-secondary); margin-top: 15px; }

        /* LAB INFO SECTION */
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; padding: 18px 25px; color: var(--text-secondary); font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }
        
        .context-controls { margin-left: auto; display: flex; align-items: center; gap: 6px; padding-right: 15px; }
        .sub-btn { font-size: 10px; padding: 4px 8px; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); border-radius: 4px; cursor: pointer; }
        .sub-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

        .tab-content { display: none; padding: 25px; line-height: 1.6; min-height: 200px; }
        .tab-content.active { display: block; }
        pre[class*="language-"] { margin: 0; border-radius: 10px; background: var(--code-bg) !important; font-size: 14px; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-card">
        <h1>🔢 Matrix Multiplication</h1>
        
        <div class="inputs">
            <div class="matrix-input-group">
                <label>Matrix A (Rows)</label>
                <textarea id="matrix-a-input">9, 4
9, 6
4, 5</textarea>
            </div>
            <div class="matrix-input-group">
                <label>Matrix B (Columns)</label>
                <textarea id="matrix-b-input">2, 9, 4
9, 8, 9</textarea>
            </div>
            <div class="matrix-input-group" style="margin-left: auto;">
                <label>Actions</label>
                <div class="controls">
                    <button onclick="rebuild()" class="primary">Load Data</button>
                    <button onclick="randomize()">Random</button>
                </div>
            </div>
        </div>

        <div class="info-box" id="info">Press Next to start the step-by-step multiplication.</div>
        
        <div class="matrix-container">
            <div class="matrix-block">
                <div class="matrix-label">Matrix A</div>
                <div class="matrix-grid grid-a" id="grid-a"></div>
            </div>
            
            <div class="operator">×</div>
            
            <div class="matrix-block">
                <div class="matrix-label">Matrix B</div>
                <div class="matrix-grid grid-b" id="grid-b"></div>
            </div>
            
            <div class="operator">=</div>
            
            <div class="matrix-block">
                <div class="matrix-label">Result C</div>
                <div class="matrix-grid grid-c" id="grid-c"></div>
            </div>
        </div>

        <div class="inputs" style="margin-top: 30px; margin-bottom: 0;">
            <button onclick="go(-1)">← Back</button>
            <button onclick="go(1)" class="primary">Next Step →</button>
            <button id="auto-btn" onclick="toggleAuto()">Auto Play</button>
            <span id="ctr" style="margin-left: auto; font-size: 12px; color: var(--text-secondary);"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div class="context-controls" id="context-panel"></div>
        </div>
        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content"><pre><code class="language-python" id="python-display"></code></pre></div>
        <div id="cpp" class="tab-content"><pre><code class="language-cpp" id="cpp-display"></code></pre></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
    // --- DATABASE ---
    const db = {
        theory: {
            v1: "<h3>Matrix Multiplication</h3><p>Operation is possible if and only if the number of columns in Matrix A equals the number of rows in Matrix B. The element <span class='math'>C[i][j]</span> is calculated as the dot product of the $i$-th row of A and the $j$-th column of B.</p>",
            v2: "<h3>Algorithm O(N³)</h3><p>Standard matrix multiplication requires three nested loops. To optimize performance on large datasets, methods like the Strassen algorithm ($O(N^{2.807})$) are used.</p>"
        },
        python: {
            v1: "# Iterative O(rowsA * colsA * colsB)\ndef multiply(A, B):\n    rowsA, colsA = len(A), len(A[0])\n    colsB = len(B[0])\n    C = [[0] * colsB for _ in range(rowsA)]\n    for i in range(rowsA):\n        for j in range(colsB):\n            for k in range(colsA):\n                C[i][j] += A[i][k] * B[k][j]\n    return C",
            v2: "# Concise vectorization version using zip\ndef multiply(A, B):\n    return [[sum(a*b for a, b in zip(rowA, colB))\n            for colB in zip(*B)] for rowA in A]"
        },
        cpp: {
            v1: "// Naive 3-loop implementation\nvector<vector<int>> multiply(Mat A, Mat B) {\n    int rA = A.size(), cA = A[0].size(), cB = B[0].size();\n    vector<vector<int>> C(rA, vector<int>(cB, 0));\n    for (int i=0; i<rA; i++)\n        for (int j=0; j<cB; j++)\n            for (int k=0; k<cA; k++)\n                C[i][j] += A[i][k] * B[k][j];\n    return C;\n}"
        }
    };

    // --- VISUALIZATION LOGIC ---
    let matrixA = [], matrixB = [], matrixC = [];
    let steps = [], cur = 0, timer = null, currentMainTab = 'theory';

    function parseMatrix(text) {
        return text.trim().split('\n').map(row => 
            row.split(',').map(cell => parseInt(cell.trim())).filter(cell => !isNaN(cell))
        ).filter(row => row.length > 0);
    }

    function randomize() {
        const rowsA = 3, colsA = 2, colsB = 3; // Fixed simple dimensions
        let a = [], b = [];
        for(let i=0; i<rowsA; i++) {
            let row = [];
            for(let j=0; j<colsA; j++) row.push(Math.floor(Math.random() * 9) + 1);
            a.push(row.join(', '));
        }
        for(let i=0; i<colsA; i++) {
            let row = [];
            for(let j=0; j<colsB; j++) row.push(Math.floor(Math.random() * 9) + 1);
            b.push(row.join(', '));
        }
        
        document.getElementById('matrix-a-input').value = a.join('\n');
        document.getElementById('matrix-b-input').value = b.join('\n');
        rebuild();
    }

    function rebuild() {
        if (timer) toggleAuto();
        matrixA = parseMatrix(document.getElementById('matrix-a-input').value);
        matrixB = parseMatrix(document.getElementById('matrix-b-input').value);
        
        // Validate
        if (matrixA.length === 0 || matrixB.length === 0) { alert("Matrices are empty!"); return; }
        if (matrixA[0].length !== matrixB.length) {
            alert(`Dimensionality Error: A_cols (${matrixA[0].length}) must equal B_rows (${matrixB.length}).`);
            return;
        }

        initSteps();
    }

    function initSteps() {
        steps = [];
        const rA = matrixA.length, cA = matrixA[0].length, cB = matrixB[0].length;
        matrixC = Array(rA).fill().map(() => Array(cB).fill(null));

        steps.push({ a: matrixA, b: matrixB, c: JSON.parse(JSON.stringify(matrixC)), msg: "Start. Calculating Result C elements step-by-step." });

        for (let i = 0; i < rA; i++) {
            for (let j = 0; j < cB; j++) {
                let sum = 0;
                let calculationDetails = [];

                // Step 1: Highlight row and column
                steps.push({
                    a: matrixA, b: matrixB, c: JSON.parse(JSON.stringify(matrixC)),
                    activeRowA: i, activeColB: j,
                    msg: `Calculating element <span class='math'>C[${i}][${j}]</span>. Using <b>Row ${i}</b> (A) and <b>Column ${j}</b> (B).`
                });

                // Step 2: Dot product calculation
                for (let k = 0; k < cA; k++) {
                    const valA = matrixA[i][k];
                    const valB = matrixB[k][j];
                    const prod = valA * valB;
                    sum += prod;
                    calculationDetails.push(`${valA}×${valB}`);
                    
                    steps.push({
                        a: matrixA, b: matrixB, c: JSON.parse(JSON.stringify(matrixC)),
                        activeRowA: i, activeColB: j,
                        activePairs: {A_cell: [i, k], B_cell: [k, j]},
                        currentSum: sum,
                        msg: `Multiplying pairs: <span class='math'>${valA} (A) × ${valB} (B) = ${prod}</span>. Current sum: <b>${sum}</b>.`
                    });
                }

                // Step 3: Final cell value
                matrixC[i][j] = sum;
                steps.push({
                    a: matrixA, b: matrixB, c: JSON.parse(JSON.stringify(matrixC)),
                    activeRowA: i, activeColB: j,
                    targetCellC: [i, j],
                    msg: `Sum <span class='math'>(${calculationDetails.join(' + ')}) = ${sum}</span>. Result recorded in <span class='math'>C[${i}][${j}]</span>.`
                });
            }
        }

        steps.push({ a: matrixA, b: matrixB, c: matrixC, isDone: true, msg: "<b>Matrix multiplication complete!</b>" });
        cur = 0; render();
    }

    function createGrid(container, data, activeRow, activeCol, pairs, targetCell) {
        container.innerHTML = '';
        if (!data || data.length === 0) return;

        const rows = data.length;
        const cols = data[0].length;
        container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

        for (let i = 0; i < rows; i++) {
            for (let j = 0; j < cols; j++) {
                const cell = document.createElement('div');
                cell.className = 'matrix-cell';
                const val = data[i][j];
                cell.textContent = val === null ? '' : val;

                // Reset specific pair and result styles
                cell.style.borderWidth = '1px';
                cell.style.borderStyle = 'solid';

                // --- Base dividing style: always visible ---
                // (Already handled by createGrid re-instantiating cells and CSS .matrix-cell)

                // Highlight Logic - semitransparent backgrounds
                if (container.classList.contains('grid-a') && i === activeRow) cell.classList.add('cell-active');
                if (container.classList.contains('grid-b') && j === activeCol) cell.classList.add('cell-active');
                
                // --- Highlight specific pair without hiding text ---
                if (pairs) {
                   if (container.classList.contains('grid-a') && i === pairs.A_cell[0] && j === pairs.A_cell[1]) {
                       cell.classList.add('cell-pair');
                   }
                   if (container.classList.contains('grid-b') && i === pairs.B_cell[0] && j === pairs.B_cell[1]) {
                       cell.classList.add('cell-pair');
                   }
                }

                // Result Cell
                if (container.classList.contains('grid-c') && targetCell && i === targetCell[0] && j === targetCell[1]) {
                    cell.classList.add('cell-result');
                }

                container.appendChild(cell);
            }
        }
    }

    function render() {
        const s = steps[cur];
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;

        createGrid(document.getElementById('grid-a'), s.a, s.activeRowA, null, s.activePairs, null);
        createGrid(document.getElementById('grid-b'), s.b, null, s.activeColB, s.activePairs, null);
        createGrid(document.getElementById('grid-c'), s.c, null, null, null, s.targetCellC);
    }

    // --- UI CONTROLS ---
    function go(dir) { 
        if (cur+dir >= 0 && cur+dir < steps.length) { cur+=dir; render(); }
        else if (timer) toggleAuto();
    }

    function toggleAuto() {
        const btn = document.getElementById('auto-btn');
        if (timer) { clearInterval(timer); timer = null; btn.textContent = "Auto Play"; }
        else { btn.textContent = "Stop"; timer = setInterval(() => go(1), 800); }
    }

    function switchMainTab(btn, tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active'); document.getElementById(tabId).classList.add('active');
        renderContextControls();
    }

    function renderContextControls() {
        const panel = document.getElementById('context-panel'); panel.innerHTML = '';
        // v1/v2 tabs are used for code examples only in this Lab
        let list;
        if (currentMainTab === 'theory') list = ['Theory'];
        else list = ['v1', 'v2'];
        
        list.forEach((item, idx) => {
            const b = document.createElement('button');
            b.className = 'sub-btn' + (idx === 0 ? ' active' : '');
            b.textContent = item;
            b.onclick = () => {
                document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                b.classList.add('active'); updateContent(item.toLowerCase());
            };
            panel.appendChild(b);
        });
        updateContent(currentMainTab === 'theory' ? 'v1' : 'v1');
    }

    function updateContent(key) {
        const display = document.getElementById(currentMainTab + '-display');
        if (currentMainTab === 'theory') display.innerHTML = db.theory[key] || db.theory['v1'];
        else { display.textContent = db[currentMainTab][key]; Prism.highlightElement(display); }
    }

    rebuild();
</script>
</body>
</html>
