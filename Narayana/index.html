<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Narayana's Permutation | AlgoView Lab</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --border: #3e3e42;
            --code-bg: #0d0d0f;
            --pivot-color: #f1c40f;
            --suffix-bg: rgba(127, 119, 221, 0.15);
            --match-color: #1d9e75;
            --line-hl: rgba(127, 119, 221, 0.3); /* Цвет подсветки строки */
        }

        * { box-sizing: border-box; }
        body { margin: 0; padding: 2rem 0; font-family: sans-serif; background-color: var(--bg-main); color: var(--text-main); }
        .wrap { max-width: 850px; margin: 0 auto; padding: 0 20px; }
        
        .visualizer-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .inputs { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        .inputs input { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; width: 280px; }
        
        button { padding: 10px 18px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: 600; cursor: pointer; }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }

        .info-box { background: var(--bg-main); border-left: 4px solid var(--accent); padding: 20px; min-height: 85px; margin-bottom: 40px; font-size: 14px; }

        .viz-area { margin: 60px 0; }
        .array-row { display: flex; justify-content: center; gap: 10px; }

        .cell {
            width: 58px; height: 58px; border-radius: 12px; border: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; position: relative; transition: 0.3s;
        }
        .index-label { position: absolute; top: -35px; background: var(--accent); color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; }

        .cell.pivot { border: 3px solid var(--pivot-color); color: var(--pivot-color); }
        .cell.suffix-focus { background: var(--suffix-bg); border-color: var(--accent); }
        .cell.swapped { background: var(--match-color); color: white; }
        .cell.active { border-color: var(--accent); transform: translateY(-4px); }

        /* Стили для подсветки кода */
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; padding: 15px 22px; color: var(--text-secondary); cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }
        
        .tab-content { display: none; padding: 25px; }
        .tab-content.active { display: block; }

        pre[class*="language-"] { margin: 0 !important; background: var(--code-bg) !important; }
        .code-line { display: block; padding: 0 15px; border-left: 3px solid transparent; }
        .code-line.highlight { background: var(--line-hl); border-left-color: var(--accent); }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-card">
        <div class="inputs">
            <input id="in-arr" type="text" value="1, 2, 5, 3, 0">
            <button onclick="rebuild()">Apply</button>
        </div>
        <div class="info-box" id="info">Ready.</div>
        <div class="viz-area"><div class="array-row" id="array-row"></div></div>
        <div class="inputs">
            <button class="secondary" onclick="go(-1)">Back</button>
            <button onclick="go(1)">Next Step</button>
            <button class="secondary" onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto;"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div id="context-panel" style="margin-left:auto; display:flex; align-items:center; gap:10px; padding-right:15px;"></div>
        </div>
        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content"><pre><code class="language-python" id="python-display"></code></pre></div>
        <div id="cpp" class="tab-content"><pre><code class="language-cpp" id="cpp-display"></code></pre></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
    const db = {
        theory: { EN: "<h3>Narayana's Algorithm</h3>", RU: "<h3>Алгоритм Нараяны</h3>" },
        python: {
            v1: "def my_next_permutation(arr):\n    i = len(arr) - 1\n    while True:\n        i1 = i\n        if arr[--i] < arr[i1]:\n            j = len(arr)\n            while not (arr[i] < arr[--j]): pass\n            arr[i], arr[j] = arr[j], arr[i]\n            arr[i1:] = reversed(arr[i1:])\n            return True\n        if i == 0: return False",
            v2: "def std_logic(nums):\n    # Standard version here"
        },
        cpp: {
            v1: `bool my_next_permutation(BidirectionalIt first, BidirectionalIt last) {
    if (first == last) return false;
    auto i = last; 
    if (first == --i) return false;
    while (true) {
        auto i1 = i; 
        if (*--i < *i1) {
            auto j = last;
            while (!(*i < *--j));
            std::iter_swap(i, j);
            std::reverse(i1, last);
            return true;
        }
        if (i == first) {
            std::reverse(first, last);
            return false;
        }
    }
}`,
            v2: "void nextPermutation(vector<int>& nums) {\n    std::next_permutation(nums.begin(), nums.end());\n}"
        }
    };

    let steps = [], cur = 0, currentMainTab = 'theory', currentVer = 'v1';

    // Обертка кода для возможности подсветки строк
    function renderCodeWithLines(code) {
        return code.split('\n').map((line, idx) => 
            `<span class="code-line" id="line-${idx + 1}">${line || ' '}</span>`
        ).join('');
    }

    function switchMainTab(btn, tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active'); document.getElementById(tabId).classList.add('active');
        renderContextControls();
    }

    function renderContextControls() {
        const panel = document.getElementById('context-panel'); panel.innerHTML = '';
        const list = currentMainTab === 'theory' ? ['EN', 'RU'] : ['v1', 'v2'];
        list.forEach(item => {
            const b = document.createElement('button');
            b.style = "font-size:10px; padding:2px 5px; cursor:pointer;";
            b.textContent = item;
            b.onclick = () => { currentVer = item; updateContent(item); };
            panel.appendChild(b);
        });
        updateContent(currentMainTab === 'theory' ? 'RU' : 'v1');
    }

    function updateContent(key) {
        const display = document.getElementById(currentMainTab + '-display');
        if (currentMainTab === 'theory') {
            document.getElementById('theory-display').innerHTML = db.theory[key];
        } else {
            display.innerHTML = renderCodeWithLines(db[currentMainTab][key]);
            Prism.highlightElement(display);
            highlightCodeLine(); // Подсветить текущую строку
        }
    }

    // ЛОГИКА ПОДСВЕТКИ СТРОК (Карта строк для C++ V1)
    function highlightCodeLine() {
        if (currentMainTab === 'theory') return;
        document.querySelectorAll('.code-line').forEach(el => el.classList.remove('highlight'));
        
        const s = steps[cur];
        let lineNum = 1;

        if (currentVer === 'v1' && currentMainTab === 'cpp') {
            if (s.label === 'i') lineNum = 8;
            if (s.label === 'j') lineNum = 10;
            if (s.pivotIdx !== undefined && s.matchIdx !== undefined && !s.suffixRange) lineNum = 11;
            if (s.suffixRange) lineNum = 12;
            if (s.isLast) lineNum = 16;
        }

        const target = document.getElementById(`line-${lineNum}`);
        if (target) target.classList.add('highlight');
    }

    function buildSteps(arr) {
        let _steps = [], data = [...arr], n = data.length;
        _steps.push({ arr: [...data], msg: "Start Narayana algorithm." });

        let i = n - 2;
        while (i >= 0 && data[i] >= data[i+1]) {
            _steps.push({ arr: [...data], activeIdx: i, label: 'i', msg: `Find i: ${data[i]} >= ${data[i+1]}` });
            i--;
        }

        if (i === -1) {
            _steps.push({ arr: [...data], isLast: true, msg: "Last permutation. Reverse all." });
            return _steps;
        }

        _steps.push({ arr: [...data], pivotIdx: i, label: 'i', msg: `Pivot found: ${data[i]}` });

        let j = n - 1;
        while (data[j] <= data[i]) {
            _steps.push({ arr: [...data], pivotIdx: i, activeIdx: j, label: 'j', msg: `Find j: ${data[j]} <= ${data[i]}` });
            j--;
        }

        _steps.push({ arr: [...data], pivotIdx: i, matchIdx: j, msg: `Found j: ${data[j]}. Swap!` });

        [data[i], data[j]] = [data[j], data[i]];
        _steps.push({ arr: [...data], pivotIdx: j, matchIdx: i, msg: `Swapped.` });

        _steps.push({ arr: [...data], suffixRange: [i+1, n-1], msg: `Reverse suffix.` });
        let res = [...data.slice(0, i+1), ...data.slice(i+1).reverse()];
        _steps.push({ arr: res, suffixRange: [i+1, n-1], msg: `Done!` });

        return _steps;
    }

    function render() {
        const s = steps[cur], container = document.getElementById('array-row');
        container.innerHTML = '';
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('ctr').textContent = `${cur}/${steps.length-1}`;

        s.arr.forEach((val, idx) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.textContent = val;
            if (idx === s.pivotIdx) cell.classList.add('pivot');
            if (idx === s.matchIdx) cell.classList.add('swapped');
            if (s.suffixRange && idx >= s.suffixRange[0] && idx <= s.suffixRange[1]) cell.classList.add('suffix-focus');
            if (s.activeIdx === idx) {
                cell.classList.add('active');
                const lbl = document.createElement('div');
                lbl.className = 'index-label'; lbl.textContent = s.label;
                cell.appendChild(lbl);
            }
            container.appendChild(cell);
        });
        highlightCodeLine();
    }

    function go(dir) {
        if(cur + dir >= 0 && cur + dir < steps.length) { cur += dir; render(); }
    }

    function rebuild() {
        const arr = document.getElementById('in-arr').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        steps = buildSteps(arr); cur = 0; render();
    }

    function resetAll() { rebuild(); }

    rebuild(); renderContextControls();
</script>
</body>
</html>
