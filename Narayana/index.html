<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AlgoView | Narayana's Permutation</title>
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --border: #3e3e42;
            --pivot-color: #f1c40f;
            --suffix-bg: rgba(127, 119, 221, 0.15);
            --match-color: #1d9e75;
        }

        body { 
            margin: 0; padding: 2rem; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 850px; margin: 0 auto; }
        
        .inputs { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: var(--text-main); padding: 10px; border-radius: 8px; font-size: 14px;
        }
        
        button {
            padding: 10px 20px; border-radius: 8px; border: none;
            background: var(--accent); color: white; font-weight: 600; cursor: pointer;
        }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }

        .info-box {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; min-height: 80px; margin-bottom: 60px;
            border-left: 4px solid var(--accent);
        }

        .viz-area { position: relative; margin: 60px 0; }
        .array-row { display: flex; justify-content: center; gap: 10px; }

        .cell {
            width: 58px; height: 58px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg-card);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .index-label {
            position: absolute; top: -40px; left: 50%;
            transform: translateX(-50%);
            background: var(--accent); color: white;
            padding: 2px 10px; border-radius: 6px;
            font-size: 14px; font-weight: 800;
        }

        /* Highlights */
        .cell.pivot { border: 3px solid var(--pivot-color); }
        .cell.suffix-focus { background: var(--suffix-bg); border-color: var(--accent); border-style: dashed; }
        .cell.swapped { background: var(--match-color); color: white; border-color: white; }
        .cell.active { border-color: var(--accent); transform: translateY(-4px); }

        .ctrls { display: flex; align-items: center; gap: 10px; margin-top: 40px; }
        .ctr-lbl { font-size: 13px; color: var(--text-secondary); margin-left: auto; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="inputs">
        <input id="in-arr" type="text" value="0, 1, 2, 5, 3, 3, 0" style="width: 280px;">
        <button onclick="rebuild()">Apply Sequence</button>
    </div>

    <div class="info-box" id="info">Click "Next Step" to start.</div>
    
    <div class="viz-area">
        <div class="array-row" id="array-row"></div>
    </div>

    <div class="ctrls">
        <button onclick="go(-1)" class="secondary">< Back</button>
        <button onclick="go(1)">Next Step ></button>
        <button onclick="resetAll()" class="secondary">Reset</button>
        <span class="ctr-lbl" id="ctr"></span>
    </div>
</div>

<script>
let steps = [], cur = 0;

function rebuild() {
    const val = document.getElementById('in-arr').value;
    const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
    steps = buildSteps(arr);
    cur = 0;
    render();
}

function buildSteps(arr) {
    let _steps = [];
    let data = [...arr];
    const n = data.length;

    _steps.push({ arr: [...data], msg: "Find the largest index <b>i</b> such that <b>a[i] < a[i + 1]</b>." });

    // 1. Find i
    let i = -1;
    for (let k = n - 2; k >= 0; k--) {
        _steps.push({ arr: [...data], activeIdx: k, label: 'i', msg: `Checking if ${data[k]} < ${data[k+1]}...` });
        if (data[k] < data[k+1]) {
            i = k;
            break;
        }
    }

    if (i === -1) {
        _steps.push({ arr: [...data], msg: "No such index exists. This is the last permutation." });
        return _steps;
    }

    _steps.push({ arr: [...data], pivotIdx: i, msg: `Pivot found at index <b>${i}</b> (value: ${data[i]}).` });

    // 2. Find j
    let j = -1;
    for (let k = n - 1; k > i; k--) {
        _steps.push({ arr: [...data], pivotIdx: i, activeIdx: k, label: 'j', msg: `Find the largest index <b>j</b> greater than i such that <b>a[i] < a[j]</b>.` });
        if (data[k] > data[i]) {
            j = k;
            break;
        }
    }

    _steps.push({ arr: [...data], pivotIdx: i, matchIdx: j, msg: `Found index <b>j</b> at ${j} (value: ${data[j]}).` });

    // 3. Swap
    let swapped = [...data];
    [swapped[i], swapped[j]] = [swapped[j], swapped[i]];
    _steps.push({ arr: [...swapped], pivotIdx: j, matchIdx: i, msg: `Swap <b>a[i]</b> with <b>a[j]</b>.` });

    // 4. Highlight Suffix for Reverse
    _steps.push({ 
        arr: [...swapped], 
        suffixRange: [i + 1, n - 1], 
        msg: `<b>Reverse the suffix</b>: the part of the array from index ${i+1} to the end.` 
    });

    // 5. Final Reverse (Back to your first version style)
    let final = [...swapped];
    let part1 = final.slice(0, i + 1);
    let part2 = final.slice(i + 1).reverse();
    final = [...part1, ...part2];
    
    _steps.push({ 
        arr: [...final], 
        suffixRange: [i + 1, n - 1],
        msg: "<b>Next permutation found!</b> The suffix has been reversed to achieve the smallest possible value." 
    });

    return _steps;
}

function render() {
    const s = steps[cur];
    const container = document.getElementById('array-row');
    container.innerHTML = '';
    document.getElementById('info').innerHTML = s.msg;
    document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;

    s.arr.forEach((val, idx) => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = val;

        if (idx === s.pivotIdx) cell.classList.add('pivot');
        if (idx === s.matchIdx) cell.classList.add('swapped');
        if (s.suffixRange && idx >= s.suffixRange[0] && idx <= s.suffixRange[1]) cell.classList.add('suffix-focus');
        
        if (s.activeIdx === idx) {
            cell.classList.add('active');
            const lbl = document.createElement('div');
            lbl.className = 'index-label';
            lbl.textContent = s.label;
            cell.appendChild(lbl);
        }

        container.appendChild(cell);
    });
}

function go(dir) { const nx = cur + dir; if(nx>=0 && nx<steps.length){ cur=nx; render(); } }
function resetAll() { cur=0; render(); }

rebuild();
</script>
</body>
</html>
