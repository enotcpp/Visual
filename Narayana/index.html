<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Narayana's Permutation | Fixed Version</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --border: #3e3e42;
            --code-bg: #0d0d0f;
            --pivot-color: #f1c40f;
            --suffix-bg: rgba(127, 119, 221, 0.15);
            --match-color: #1d9e75;
            --line-hl: rgba(127, 119, 221, 0.35);
        }

        body { margin: 0; padding: 2rem 0; font-family: sans-serif; background: var(--bg-main); color: var(--text-main); }
        .wrap { max-width: 850px; margin: 0 auto; padding: 0 20px; }
        
        .visualizer-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 30px;
        }

        .inputs { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: var(--text-main); padding: 10px; border-radius: 8px; width: 280px;
        }
        
        button {
            padding: 10px 18px; border-radius: 8px; border: none;
            background: var(--accent); color: white; font-weight: 600; cursor: pointer;
        }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }

        .viz-area { margin: 60px 0; }
        .array-row { display: flex; justify-content: center; gap: 10px; }
        .cell {
            width: 55px; height: 55px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg-card);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; position: relative;
        }
        .index-label {
            position: absolute; top: -35px; background: var(--accent);
            padding: 2px 8px; border-radius: 4px; font-size: 12px;
        }

        .cell.pivot { border: 2px solid var(--pivot-color); color: var(--pivot-color); }
        .cell.swapped { background: var(--match-color); border-color: #fff; }
        .cell.suffix-focus { background: var(--suffix-bg); border-style: dashed; }

        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; padding: 15px 20px; color: var(--text-secondary); cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }
        
        .code-wrapper { position: relative; padding: 16px; background: var(--code-bg); }
        pre[class*="language-"] { margin: 0 !important; padding: 0 !important; background: transparent !important; }
        code[class*="language-"] { 
            font-size: 13px !important; 
            line-height: 20px !important; /* Фиксированная высота строки */
            display: block;
        }

        .line-highlight-overlay {
            position: absolute;
            left: 0; width: 100%;
            height: 20px; /* Должна совпадать с line-height */
            background: var(--line-hl);
            border-left: 4px solid var(--accent);
            display: none;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-card">
        <div class="inputs">
            <input id="in-arr" type="text" value="0, 1, 2, 5, 3, 3, 0">
            <button onclick="rebuild()">Apply</button>
        </div>
        <div id="info" style="margin-bottom: 20px; color: var(--accent);">Ready.</div>
        <div class="viz-area"><div class="array-row" id="array-row"></div></div>
        <div class="inputs">
            <button class="secondary" onclick="go(-1)">Back</button>
            <button onclick="go(1)">Next Step</button>
            <button class="secondary" onclick="resetAll()">Reset</button>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchTab(this, 'cpp')">C++</button>
        </div>
        <div class="code-wrapper">
            <div id="line-overlay" class="line-highlight-overlay"></div>
            <pre><code id="code-display" class="language-python"></code></pre>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
    const db = {
        python: "def my_next_permutation(arr):\n    n = len(arr)\n    if n <= 1: return False\n    i = n - 1\n    while True:\n        i1 = i\n        i -= 1\n        if arr[i] < arr[i1]:\n            j = n\n            while not (arr[i] < arr[j-1]):\n                j -= 1\n            arr[i], arr[j-1] = arr[j-1], arr[i]\n            arr[i1:] = reversed(arr[i1:])\n            return True\n        if i == 0:\n            arr.reverse()\n            return False",
        cpp: "bool my_next_permutation(BidirectionalIt first, BidirectionalIt last) {\n    if (first == last) return false;\n    auto i = last; \n    if (first == --i) return false;\n    while (true) {\n        auto i1 = i; \n        if (*--i < *i1) {\n            auto j = last;\n            while (!(*i < *--j));\n            std::iter_swap(i, j);\n            std::reverse(i1, last);\n            return true;\n        }\n        if (i == first) {\n            std::reverse(first, last);\n            return false;\n        }\n    }\n}"
    };

    let steps = [], cur = 0, currentLang = 'python';

    function switchTab(btn, lang) {
        currentLang = lang;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateCodeView();
    }

    function updateCodeView() {
        const display = document.getElementById('code-display');
        display.className = 'language-' + currentLang;
        
        // Экранируем символы для корректной подсветки C++
        let code = db[currentLang];
        display.innerHTML = code.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        
        Prism.highlightElement(display);
        syncHighlight();
    }

    function syncHighlight() {
        const overlay = document.getElementById('line-overlay');
        const step = steps[cur];
        
        // Маппинг строк (1-based)
        const maps = {
            cpp: { i: 8, j: 10, swap: 11, rev: 12, end: 16 },
            python: { i: 8, j: 10, swap: 12, rev: 13, end: 16 }
        };

        let line = -1;
        if (step) {
            if (step.label === 'i') line = maps[currentLang].i;
            else if (step.label === 'j') line = maps[currentLang].j;
            else if (step.pivotIdx !== undefined && step.matchIdx !== undefined && !step.suffixRange) line = maps[currentLang].swap;
            else if (step.suffixRange) line = maps[currentLang].rev;
            else if (step.isLast) line = maps[currentLang].end;
        }

        if (line > 0) {
            overlay.style.top = `${16 + (line - 1) * 20}px`; // 16px - padding контейнера, 20px - высота строки
            overlay.style.display = 'block';
        } else {
            overlay.style.display = 'none';
        }
    }

    function buildSteps(arr) {
        let _steps = [], data = [...arr], n = data.length;
        _steps.push({ arr: [...data], msg: "Start" });
        let i = -1;
        for (let k = n - 2; k >= 0; k--) {
            _steps.push({ arr: [...data], activeIdx: k, label: 'i', msg: `Check i=${k}` });
            if (data[k] < data[k+1]) { i = k; break; }
        }
        if (i === -1) { _steps.push({ arr: [...data], isLast: true, msg: "Finish" }); return _steps; }
        
        let j = -1;
        for (let k = n - 1; k > i; k--) {
            _steps.push({ arr: [...data], pivotIdx: i, activeIdx: k, label: 'j', msg: `Check j=${k}` });
            if (data[k] > data[i]) { j = k; break; }
        }
        
        let sw = [...data]; [sw[i], sw[j]] = [sw[j], sw[i]];
        _steps.push({ arr: [...sw], pivotIdx: j, matchIdx: i, msg: "Swap" });
        _steps.push({ arr: [...sw], suffixRange: [i + 1, n - 1], msg: "Reverse" });
        
        let res = [...sw];
        let tail = res.slice(i + 1).reverse();
        res.splice(i + 1, tail.length, ...tail);
        _steps.push({ arr: [...res], suffixRange: [i + 1, n - 1], msg: "Done" });
        return _steps;
    }

    function render() {
        const s = steps[cur], container = document.getElementById('array-row');
        container.innerHTML = '';
        document.getElementById('info').textContent = s.msg;
        s.arr.forEach((val, idx) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (idx === s.pivotIdx) cell.classList.add('pivot');
            if (idx === s.matchIdx) cell.classList.add('swapped');
            if (s.suffixRange && idx >= s.suffixRange[0] && idx <= s.suffixRange[1]) cell.classList.add('suffix-focus');
            cell.textContent = val;
            if (s.activeIdx === idx) {
                const l = document.createElement('div'); l.className = 'index-label'; l.textContent = s.label;
                cell.appendChild(l);
            }
            container.appendChild(cell);
        });
        syncHighlight();
    }

    function go(d) { if (cur+d >= 0 && cur+d < steps.length) { cur+=d; render(); } }
    function rebuild() {
        const val = document.getElementById('in-arr').value;
        const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        steps = buildSteps(arr); cur = 0; render();
    }
    function resetAll() { rebuild(); }

    updateCodeView();
    rebuild();
</script>
</body>
</html>
