<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Narayana's Permutation | AlgoView Lab</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --border: #3e3e42;
            --code-bg: #0d0d0f;
            --pivot-color: #f1c40f;
            --suffix-bg: rgba(127, 119, 221, 0.15);
            --match-color: #1d9e75;
            --line-hl: rgba(127, 119, 221, 0.3);
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 2rem 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 850px; margin: 0 auto; padding: 0 20px; }
        
        .visualizer-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 30px;
        }

        .inputs { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: var(--text-main); padding: 10px; border-radius: 8px; font-size: 14px; width: 280px;
            font-family: monospace;
        }
        
        button {
            padding: 10px 18px; border-radius: 8px; border: none;
            background: var(--accent); color: white; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s; font-size: 14px;
        }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }

        .info-box {
            background: var(--bg-main); border-left: 4px solid var(--accent);
            padding: 20px; min-height: 85px; margin-bottom: 40px; font-size: 14px; line-height: 1.6;
        }
        .info-box b { color: var(--accent); }

        .viz-area { position: relative; margin: 60px 0; min-height: 80px; }
        .array-row { display: flex; justify-content: center; gap: 10px; }

        .cell {
            width: 58px; height: 58px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg-card);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .index-label {
            position: absolute; top: -40px; left: 50%;
            transform: translateX(-50%);
            background: var(--accent); color: white;
            padding: 2px 10px; border-radius: 6px;
            font-size: 14px; font-weight: 800;
        }

        .cell.pivot { border: 3px solid var(--pivot-color); color: var(--pivot-color); }
        .cell.suffix-focus { background: var(--suffix-bg); border-color: var(--accent); border-style: dashed; }
        .cell.swapped { background: var(--match-color); color: white; border-color: white; }
        .cell.active { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; padding: 15px 22px; color: var(--text-secondary); font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }
        .context-controls { margin-left: auto; display: flex; align-items: center; gap: 6px; padding-right: 15px; }
        .sub-btn { font-size: 10px; padding: 4px 8px; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); border-radius: 4px; cursor: pointer; }
        .sub-btn.active { border-color: var(--accent); color: var(--accent); }
        
        .tab-content { display: none; padding: 25px; line-height: 1.6; }
        .tab-content.active { display: block; }

        pre[class*="language-"] { 
            margin: 0; border-radius: 10px; 
            background: var(--code-bg) !important; 
            font-size: 13px; position: relative;
        }
        
        code[class*="language-"] { display: block; white-space: pre; position: relative; z-index: 2; }

        .code-wrapper { position: relative; }
        .line-highlight-overlay {
            position: absolute;
            left: 0; width: 100%;
            background: var(--line-hl);
            border-left: 3px solid var(--accent);
            pointer-events: none;
            display: none;
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-card">
        <div class="inputs">
            <input id="in-arr" type="text" value="0, 1, 2, 5, 3, 3, 0">
            <button onclick="rebuild()">Apply Sequence</button>
        </div>
        <div class="info-box" id="info">Click "Next Step" to start.</div>
        <div class="viz-area"><div class="array-row" id="array-row"></div></div>
        <div class="inputs" style="margin-top: 20px; margin-bottom: 0;">
            <button class="secondary" onclick="go(-1)">< Back</button>
            <button onclick="go(1)">Next Step ></button>
            <button class="secondary" onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto; font-size: 12px; color: var(--text-secondary);"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div class="context-controls" id="context-panel"></div>
        </div>
        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content">
            <div class="code-wrapper">
                <div class="line-highlight-overlay" id="python-overlay"></div>
                <pre><code class="language-python" id="python-display"></code></pre>
            </div>
        </div>
        <div id="cpp" class="tab-content">
            <div class="code-wrapper">
                <div class="line-highlight-overlay" id="cpp-overlay"></div>
                <pre><code class="language-cpp" id="cpp-display"></code></pre>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
    const db = {
        theory: {
            EN: "<h3>Narayana's Algorithm</h3><p>Generates the next lexicographical permutation.</p>",
            RU: "<h3>Алгоритм Нараяны</h3><p>Находит следующую перестановку.</p>"
        },
        python: {
            v1: "def my_next_permutation(arr):\n    n = len(arr)\n    if n <= 1: return False\n    i = n - 1\n    while True:\n        i1 = i\n        i -= 1\n        if arr[i] < arr[i1]:\n            j = n\n            while not (arr[i] < arr[j-1]):\n                j -= 1\n            arr[i], arr[j-1] = arr[j-1], arr[i]\n            arr[i1:] = reversed(arr[i1:])\n            return True\n        if i == 0:\n            arr.reverse()\n            return False",
            v2: "def next_permutation(nums):\n    pass"
        },
        cpp: {
            v1: "bool my_next_permutation(BidirectionalIt first, BidirectionalIt last) {\n    if (first == last) return false;\n    auto i = last; \n    if (first == --i) return false;\n    while (true) {\n        auto i1 = i; \n        if (*--i < *i1) {\n            auto j = last;\n            while (!(*i < *--j));\n            std::iter_swap(i, j);\n            std::reverse(i1, last);\n            return true;\n        }\n        if (i == first) {\n            std::reverse(first, last);\n            return false;\n        }\n    }\n}",
            v2: "void nextPermutation(vector<int>& nums) {\n    std::next_permutation(nums.begin(), nums.end());\n}"
        }
    };

    let steps = [], cur = 0, currentMainTab = 'theory', currentVer = 'v1';

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function switchMainTab(btn, tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active'); 
        document.getElementById(tabId).classList.add('active');
        renderContextControls();
    }

    function renderContextControls() {
        const panel = document.getElementById('context-panel'); panel.innerHTML = '';
        const list = currentMainTab === 'theory' ? ['EN', 'RU'] : ['v1', 'v2'];
        list.forEach(item => {
            const b = document.createElement('button');
            b.className = 'sub-btn' + (item === (currentMainTab === 'theory' ? 'EN' : currentVer) ? ' active' : '');
            b.textContent = item;
            b.onclick = () => {
                if (currentMainTab !== 'theory') currentVer = item;
                updateContent(item);
            };
            panel.appendChild(b);
        });
        updateContent(currentMainTab === 'theory' ? 'EN' : currentVer);
    }

    function updateContent(key) {
        const display = document.getElementById(currentMainTab + '-display');
        const overlay = document.getElementById(currentMainTab + '-overlay');
        if (overlay) overlay.style.display = 'none';

        if (currentMainTab === 'theory') {
            display.innerHTML = db.theory[key];
        } else {
            display.innerHTML = escapeHtml(db[currentMainTab][key]);
            Prism.highlightElement(display);
            setTimeout(syncCodeHighlight, 0);
        }
    }

    function syncCodeHighlight() {
        if (currentMainTab === 'theory') return;
        const overlay = document.getElementById(currentMainTab + '-overlay');
        if (!overlay) return;

        const lineMap = {
            cpp_v1: { findI: 8, findJ: 10, swap: 11, rev: 12, last: 16 },
            python_v1: { findI: 8, findJ: 10, swap: 12, rev: 13, last: 16 }
        };

        const step = steps[cur];
        let lineNum = -1;
        const mapKey = `${currentMainTab}_${currentVer}`;

        if (step && lineMap[mapKey]) {
            if (step.activeIdx !== undefined && step.label === 'i') lineNum = lineMap[mapKey].findI;
            else if (step.label === 'j') lineNum = lineMap[mapKey].findJ;
            else if (step.pivotIdx !== undefined && step.matchIdx !== undefined && !step.suffixRange) lineNum = lineMap[mapKey].swap;
            else if (step.suffixRange) lineNum = lineMap[mapKey].rev;
            else if (step.isLast) lineNum = lineMap[mapKey].last;
        }

        if (lineNum > 0) {
            const lineHeight = 19.5; 
            const paddingTop = 16;
            overlay.style.height = `${lineHeight}px`;
            overlay.style.top = `${paddingTop + (lineNum - 1) * lineHeight}px`;
            overlay.style.display = 'block';
        } else {
            overlay.style.display = 'none';
        }
    }

    function buildSteps(arr) {
        let _steps = [];
        let data = [...arr], n = data.length;
        _steps.push({ arr: [...data], msg: "Ready." });
        let i = -1;
        for (let k = n - 2; k >= 0; k--) {
            _steps.push({ arr: [...data], activeIdx: k, label: 'i', msg: `Search i: a[${k}] < a[${k+1}]?` });
            if (data[k] < data[k+1]) { i = k; break; }
        }
        if (i === -1) { _steps.push({ arr: [...data], isLast: true, msg: "No pivot." }); return _steps; }
        _steps.push({ arr: [...data], pivotIdx: i, msg: `Pivot found: ${data[i]}` });
        let j = -1;
        for (let k = n - 1; k > i; k--) {
            _steps.push({ arr: [...data], pivotIdx: i, activeIdx: k, label: 'j', msg: `Search j: a[i] < a[j]?` });
            if (data[k] > data[i]) { j = k; break; }
        }
        _steps.push({ arr: [...data], pivotIdx: i, matchIdx: j, msg: `Found j: ${data[j]}` });
        let sw = [...data]; [sw[i], sw[j]] = [sw[j], sw[i]];
        _steps.push({ arr: [...sw], pivotIdx: j, matchIdx: i, msg: `Swap!` });
        _steps.push({ arr: [...sw], suffixRange: [i + 1, n - 1], msg: `Reverse suffix.` });
        let final = [...sw];
        let p2 = final.slice(i + 1).reverse();
        final.splice(i + 1, p2.length, ...p2);
        _steps.push({ arr: [...final], suffixRange: [i + 1, n - 1], msg: "Done!" });
        return _steps;
    }

    function render() {
        const s = steps[cur], container = document.getElementById('array-row');
        container.innerHTML = '';
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;
        s.arr.forEach((val, idx) => {
            const cell = document.createElement('div');
            cell.className = 'cell' + (idx === s.pivotIdx ? ' pivot' : '') + (idx === s.matchIdx ? ' swapped' : '');
            if (s.suffixRange && idx >= s.suffixRange[0] && idx <= s.suffixRange[1]) cell.classList.add('suffix-focus');
            cell.textContent = val;
            if (s.activeIdx === idx) {
                cell.classList.add('active');
                const lbl = document.createElement('div'); lbl.className = 'index-label'; lbl.textContent = s.label;
                cell.appendChild(lbl);
            }
            container.appendChild(cell);
        });
        syncCodeHighlight();
    }

    function go(d) { if(cur+d >= 0 && cur+d < steps.length) { cur+=d; render(); } }
    function rebuild() {
        const val = document.getElementById('in-arr').value;
        const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        steps = buildSteps(arr); cur = 0; render();
    }
    function resetAll() { rebuild(); }

    renderContextControls();
    rebuild();
</script>
</body>
</html>
