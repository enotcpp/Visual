<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Narayana's Permutation | Restoration</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-main: #1a1a1c; --bg-card: #242426; --bg-input: #2d2d30;
            --text-main: #e1e1e3; --text-secondary: #9ba1a6; --accent: #7f77dd;
            --border: #3e3e42; --code-bg: #0d0d0f; --pivot-color: #f1c40f;
            --suffix-bg: rgba(127, 119, 221, 0.15); --match-color: #1d9e75;
            --line-hl: rgba(127, 119, 221, 0.3);
        }
        body { margin: 0; padding: 2rem 0; font-family: sans-serif; background: var(--bg-main); color: var(--text-main); }
        .wrap { max-width: 850px; margin: 0 auto; padding: 0 20px; }
        .visualizer-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .inputs { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        .inputs input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 8px; width: 280px; }
        button { padding: 10px 18px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: 600; cursor: pointer; }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }
        .viz-area { margin: 60px 0; }
        .array-row { display: flex; justify-content: center; gap: 10px; }
        .cell { width: 58px; height: 58px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; position: relative; transition: 0.3s; }
        .index-label { position: absolute; top: -40px; background: var(--accent); color: white; padding: 2px 10px; border-radius: 6px; font-size: 14px; }
        .cell.pivot { border: 3px solid var(--pivot-color); color: var(--pivot-color); }
        .cell.swapped { background: var(--match-color); color: white; }
        .cell.suffix-focus { background: var(--suffix-bg); border-style: dashed; }
        .cell.active { border-color: var(--accent); transform: translateY(-4px); }
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; padding: 15px 22px; color: var(--text-secondary); cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 12px; }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }
        .tab-content { display: none; padding: 25px; }
        .tab-content.active { display: block; }
        .code-container { position: relative; background: var(--code-bg); padding: 16px; border-radius: 10px; }
        pre[class*="language-"] { margin: 0 !important; background: transparent !important; }
        code[class*="language-"] { font-size: 13px !important; line-height: 20px !important; display: block; }
        .line-highlight { position: absolute; left: 0; width: 100%; height: 20px; background: var(--line-hl); border-left: 4px solid var(--accent); display: none; z-index: 1; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="visualizer-card">
        <div class="inputs">
            <input id="in-arr" type="text" value="0, 1, 2, 5, 3, 3, 0">
            <button onclick="rebuild()">Apply</button>
        </div>
        <div id="info" style="margin-bottom: 20px; min-height: 40px;">Ready.</div>
        <div class="viz-area"><div class="array-row" id="array-row"></div></div>
        <div class="inputs" style="margin-bottom: 0;">
            <button class="secondary" onclick="go(-1)">< Back</button>
            <button onclick="go(1)">Next Step ></button>
            <button class="secondary" onclick="resetAll()">Reset</button>
        </div>
    </div>
    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchTab(this, 'cpp')">C++</button>
        </div>
        <div id="theory" class="tab-content active">
            <h3>Theory</h3>
            <p>1. Find largest <b>i</b>: a[i] < a[i+1]<br>2. Find largest <b>j</b>: a[i] < a[j]<br>3. Swap a[i], a[j]<br>4. Reverse suffix a[i+1...].</p>
        </div>
        <div id="code-tab" class="tab-content">
            <div class="code-container">
                <div id="highlight-bar" class="line-highlight"></div>
                <pre><code id="code-display"></code></pre>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
    const codes = {
        python: `def my_next_permutation(arr):\n    n = len(arr)\n    if n <= 1: return False\n    i = n - 1\n    while True:\n        i1 = i\n        i -= 1\n        if arr[i] < arr[i1]:\n            j = n\n            while not (arr[i] < arr[j-1]):\n                j -= 1\n            arr[i], arr[j-1] = arr[j-1], arr[i]\n            arr[i1:] = reversed(arr[i1:])\n            return True\n        if i == 0:\n            arr.reverse()\n            return False`,
        cpp: `bool my_next_permutation(BidirectionalIt first, BidirectionalIt last) {\n    if (first == last) return false;\n    auto i = last; \n    if (first == --i) return false;\n    while (true) {\n        auto i1 = i; \n        if (*--i < *i1) {\n            auto j = last;\n            while (!(*i < *--j));\n            std::iter_swap(i, j);\n            std::reverse(i1, last);\n            return true;\n        }\n        if (i == first) {\n            std::reverse(first, last);\n            return false;\n        }\n    }\n}`
    };

    let steps = [], cur = 0, currentTab = 'theory';

    function switchTab(btn, tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');

        if (tab === 'theory') document.getElementById('theory').classList.add('active');
        else {
            document.getElementById('code-tab').classList.add('active');
            const display = document.getElementById('code-display');
            display.className = 'language-' + tab;
            display.textContent = codes[tab];
            Prism.highlightElement(display);
            syncLine();
        }
    }

    function syncLine() {
        const bar = document.getElementById('highlight-bar');
        const step = steps[cur];
        if (currentTab === 'theory' || !step) { bar.style.display = 'none'; return; }

        const lines = {
            cpp: { i: 8, j: 10, swap: 11, rev: 12, last: 16 },
            python: { i: 8, j: 10, swap: 12, rev: 13, last: 16 }
        };

        let target = -1;
        if (step.label === 'i') target = lines[currentTab].i;
        else if (step.label === 'j') target = lines[currentTab].j;
        else if (step.pivotIdx !== undefined && step.matchIdx !== undefined && !step.suffixRange) target = lines[currentTab].swap;
        else if (step.suffixRange) target = lines[currentTab].rev;
        else if (step.isLast) target = lines[currentTab].last;

        if (target > 0) {
            bar.style.top = `${16 + (target - 1) * 20}px`;
            bar.style.display = 'block';
        } else bar.style.display = 'none';
    }

    function buildSteps(arr) {
        let s = [], data = [...arr], n = data.length;
        s.push({ arr: [...data], msg: "Starting search..." });
        let i = -1;
        for (let k = n - 2; k >= 0; k--) {
            s.push({ arr: [...data], activeIdx: k, label: 'i', msg: `Search i: ${data[k]} < ${data[k+1]}?` });
            if (data[k] < data[k+1]) { i = k; break; }
        }
        if (i === -1) { s.push({ arr: [...data], isLast: true, msg: "Last permutation. Resetting." }); return s; }
        s.push({ arr: [...data], pivotIdx: i, msg: `Pivot found: ${data[i]}` });
        let j = -1;
        for (let k = n - 1; k > i; k--) {
            s.push({ arr: [...data], pivotIdx: i, activeIdx: k, label: 'j', msg: `Search j: ${data[i]} < ${data[k]}?` });
            if (data[k] > data[i]) { j = k; break; }
        }
        let sw = [...data]; [sw[i], sw[j]] = [sw[j], sw[i]];
        s.push({ arr: [...sw], pivotIdx: j, matchIdx: i, msg: "Swap values." });
        s.push({ arr: [...sw], suffixRange: [i + 1, n - 1], msg: "Reverse suffix." });
        let res = [...sw]; let tail = res.slice(i + 1).reverse();
        res.splice(i + 1, tail.length, ...tail);
        s.push({ arr: [...res], suffixRange: [i + 1, n - 1], msg: "New permutation ready!" });
        return s;
    }

    function render() {
        const s = steps[cur], container = document.getElementById('array-row');
        container.innerHTML = '';
        document.getElementById('info').textContent = s.msg;
        s.arr.forEach((v, idx) => {
            const div = document.createElement('div');
            div.className = 'cell' + (idx === s.pivotIdx ? ' pivot' : '') + (idx === s.matchIdx ? ' swapped' : '');
            if (s.suffixRange && idx >= s.suffixRange[0] && idx <= s.suffixRange[1]) div.classList.add('suffix-focus');
            div.textContent = v;
            if (s.activeIdx === idx) {
                div.classList.add('active');
                const l = document.createElement('div'); l.className = 'index-label'; l.textContent = s.label;
                div.appendChild(l);
            }
            container.appendChild(div);
        });
        syncLine();
    }

    function go(d) {
        if (d === 1 && cur === steps.length - 1) {
            // АВТОМАТИЧЕСКИЙ ПЕРЕХОД К НОВОЙ ПЕРЕСТАНОВКЕ
            steps = buildSteps(steps[cur].arr);
            cur = 0; render(); return;
        }
        if (cur + d >= 0 && cur + d < steps.length) { cur += d; render(); }
    }

    function rebuild() {
        const val = document.getElementById('in-arr').value;
        const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        steps = buildSteps(arr); cur = 0; render();
    }
    function resetAll() { rebuild(); }

    rebuild();
</script>
</body>
</html>
