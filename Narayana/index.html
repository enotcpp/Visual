<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Narayana's Permutation | AlgoView Lab</title>
    
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --accent-secondary: #1d9e75;
            --border: #3e3e42;
            --code-bg: #0d0d0f;
            --pivot-color: #f1c40f;
            --suffix-bg: rgba(127, 119, 221, 0.15);
            --match-color: #1d9e75;
            --line-hl: rgba(127, 119, 221, 0.15); /* Цвет подсветки строки */
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 2rem 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 850px; margin: 0 auto; padding: 0 20px; }
        
        .visualizer-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 30px;
        }

        .inputs { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: var(--text-main); padding: 10px; border-radius: 8px; font-size: 14px; width: 280px;
            font-family: monospace; outline: none;
        }
        
        button {
            padding: 10px 18px; border-radius: 8px; border: none;
            background: var(--accent); color: white; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s; font-size: 14px;
        }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }
        button:hover { opacity: 0.9; }

        .info-box {
            background: var(--bg-main); border-left: 4px solid var(--accent);
            padding: 20px; min-height: 85px; margin-bottom: 40px; font-size: 14px; line-height: 1.6;
        }
        .info-box b { color: var(--accent); }

        .viz-area { position: relative; margin: 60px 0; min-height: 80px; }
        .array-row { display: flex; justify-content: center; gap: 10px; }

        .cell {
            width: 58px; height: 58px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg-card);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .index-label {
            position: absolute; top: -40px; left: 50%;
            transform: translateX(-50%);
            background: var(--accent); color: white;
            padding: 2px 10px; border-radius: 6px;
            font-size: 14px; font-weight: 800;
        }

        .cell.pivot { border: 3px solid var(--pivot-color); color: var(--pivot-color); }
        .cell.suffix-focus { background: var(--suffix-bg); border-color: var(--accent); border-style: dashed; }
        .cell.swapped { background: var(--match-color); color: white; border-color: white; }
        .cell.active { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; padding: 15px 22px; color: var(--text-secondary); font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }
        .context-controls { margin-left: auto; display: flex; align-items: center; gap: 6px; padding-right: 15px; }
        .sub-btn { font-size: 10px; padding: 4px 8px; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); border-radius: 4px; cursor: pointer; }
        .sub-btn.active { border-color: var(--accent); color: var(--accent); }
        .tab-content { display: none; padding: 25px; line-height: 1.6; }
        .tab-content.active { display: block; }

        /* СТИЛИ КОДА КАК В BINARY SEARCH */
        code { font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; color: #a6accd; display: block; background: var(--code-bg); padding: 15px; border-radius: 10px; }
        .code-line { display: block; padding: 0 10px; border-left: 3px solid transparent; transition: 0.2s; }
        .code-line.active { background: var(--line-hl); border-left-color: var(--accent); color: #fff; }
        .indent { display: inline-block; width: 20px; }
        .kw { color: #cc99cd; } .fn { color: #82aaff; } .cm { color: #676e95; } .num { color: #f8c555; } .op { color: #89ddff; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-card">
        <div class="inputs">
            <input id="in-arr" type="text" value="0, 1, 2, 5, 3, 3, 0">
            <button onclick="rebuild()">Apply Sequence</button>
        </div>

        <div class="info-box" id="info">Click "Next Step" to start.</div>
        
        <div class="viz-area">
            <div class="array-row" id="array-row"></div>
        </div>

        <div class="inputs" style="margin-top: 20px; margin-bottom: 0;">
            <button class="secondary" onclick="go(-1)">< Back</button>
            <button onclick="go(1)">Next Step ></button>
            <button class="secondary" onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto; font-size: 12px; color: var(--text-secondary);"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div class="context-controls" id="context-panel"></div>
        </div>
        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content"><code id="python-display"></code></div>
        <div id="cpp" class="tab-content"><code id="cpp-display"></code></div>
    </div>
</div>

<script>
    const db = {
        theory: {
            EN: "<h3>Narayana's Algorithm</h3><p>Generates the next lexicographical permutation of a sequence. It involves finding the largest index <b>i</b> such that <b>a[i] < a[i+1]</b>, then the largest index <b>j</b> such that <b>a[i] < a[j]</b>, swapping them, and reversing the suffix.</p>",
            RU: "<h3>Алгоритм Нараяны</h3><p>Алгоритм нахождения следующей перестановки в лексикографическом порядке. Состоит из 4 шагов: поиск индекса <b>i</b>, поиск индекса <b>j</b>, обмен значений и реверс хвоста последовательности.</p>"
        },
        python: {
            v1: `<span class="code-line" data-l="1"><span class="kw">def</span> <span class="fn">next_permutation</span>(nums):</span>` +
                `<span class="code-line" data-l="2"><span class="indent"></span>i = <span class="fn">len</span>(nums) - <span class="num">2</span></span>` +
                `<span class="code-line" data-l="3"><span class="indent"></span><span class="kw">while</span> i >= <span class="num">0</span> <span class="kw">and</span> nums[i] >= nums[i+1]:</span>` +
                `<span class="code-line" data-l="4"><span class="indent"></span><span class="indent"></span>i -= <span class="num">1</span></span>` +
                `<span class="code-line" data-l="5"><span class="indent"></span><span class="kw">if</span> i >= <span class="num">0</span>:</span>` +
                `<span class="code-line" data-l="6"><span class="indent"></span><span class="indent"></span>j = <span class="fn">len</span>(nums) - <span class="num">1</span></span>` +
                `<span class="code-line" data-l="7"><span class="indent"></span><span class="indent"></span><span class="kw">while</span> nums[j] &lt;= nums[i]:</span>` +
                `<span class="code-line" data-l="8"><span class="indent"></span><span class="indent"></span><span class="indent"></span>j -= <span class="num">1</span></span>` +
                `<span class="code-line" data-l="9"><span class="indent"></span><span class="indent"></span>nums[i], nums[j] = nums[j], nums[i]</span>` +
                `<span class="code-line" data-l="10"><span class="indent"></span>nums[i+1:] = <span class="fn">reversed</span>(nums[i+1:])</span>`,
            v2: `<span class="code-line"><span class="cm"># Generator version coming soon...</span></span>`
        },
        cpp: {
            v1: `<span class="code-line" data-l="1"><span class="kw">void</span> <span class="fn">nextPermutation</span>(vector&lt;<span class="kw">int</span>&gt;&amp; nums) {</span>` +
                `<span class="code-line" data-l="2"><span class="indent"></span>std::<span class="fn">next_permutation</span>(nums.<span class="fn">begin</span>(), nums.<span class="fn">end</span>());</span>` +
                `<span class="code-line" data-l="1">}</span>`,
            v2: `<span class="code-line" data-l="1"><span class="kw">bool</span> <span class="fn">my_next_permutation</span>(Iter first, Iter last) {</span>` +
                `<span class="code-line" data-l="3"><span class="indent"></span><span class="kw">auto</span> i = last; <span class="kw">if</span> (first == last || first == --i) <span class="kw">return</span> <span class="kw">false</span>;</span>` +
                `<span class="code-line" data-l="5"><span class="indent"></span><span class="kw">while</span> (<span class="kw">true</span>) {</span>` +
                `<span class="code-line" data-l="6"><span class="indent"></span><span class="indent"></span><span class="kw">auto</span> i1 = i; <span class="kw">if</span> (*--i &lt; *i1) {</span>` +
                `<span class="code-line" data-l="7"><span class="indent"></span><span class="indent"></span><span class="indent"></span><span class="kw">auto</span> j = last; <span class="kw">while</span> (!(*i &lt; *--j));</span>` +
                `<span class="code-line" data-l="9"><span class="indent"></span><span class="indent"></span><span class="indent"></span>std::<span class="fn">iter_swap</span>(i, j);</span>` +
                `<span class="code-line" data-l="10"><span class="indent"></span><span class="indent"></span><span class="indent"></span>std::<span class="fn">reverse</span>(i1, last);</span>` +
                `<span class="code-line" data-l="11"><span class="indent"></span><span class="indent"></span><span class="indent"></span><span class="kw">return</span> <span class="kw">true</span>;</span>` +
                `<span class="code-line" data-l="12"><span class="indent"></span><span class="indent"></span>}</span>` +
                `<span class="code-line" data-l="13"><span class="indent"></span><span class="indent"></span><span class="kw">if</span> (i == first) { std::<span class="fn">reverse</span>(first, last); <span class="kw">return</span> <span class="kw">false</span>; }</span>` +
                `<span class="code-line" data-l="14"><span class="indent"></span>}</span>` +
                `<span class="code-line" data-l="15">}</span>`
        }
    };

    let steps = [], cur = 0, lastInitial = "", currentMainTab = 'theory';

    function switchMainTab(btn, tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active'); 
        document.getElementById(tabId).classList.add('active');
        renderContextControls();
    }

    function renderContextControls() {
        const panel = document.getElementById('context-panel'); panel.innerHTML = '';
        const list = currentMainTab === 'theory' ? ['EN', 'RU'] : ['v1', 'v2'];
        list.forEach((item, idx) => {
            const b = document.createElement('button');
            b.className = 'sub-btn' + (idx === 0 ? ' active' : '');
            b.textContent = item;
            b.onclick = () => {
                document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                b.classList.add('active'); updateContent(item);
            };
            panel.appendChild(b);
        });
        updateContent(currentMainTab === 'theory' ? 'EN' : 'v1');
    }

    function updateContent(key) {
        const display = document.getElementById(currentMainTab + '-display');
        if (currentMainTab === 'theory') display.innerHTML = db.theory[key];
        else {
            display.innerHTML = db[currentMainTab][key];
            syncCodeHighlight();
        }
    }

    // СИНХРОНИЗАЦИЯ ПОДСВЕТКИ (как в Binary Search)
    function syncCodeHighlight() {
        if (currentMainTab === 'theory') return;
        const containerId = currentMainTab + '-display';
        const lines = document.getElementById(containerId).querySelectorAll('.code-line');
        lines.forEach(l => l.classList.remove('active'));
        
        const currentStep = steps[cur];
        if (currentStep && currentStep.line) {
            const targetLine = document.querySelector(`#${containerId} [data-l="${currentStep.line}"]`);
            if (targetLine) targetLine.classList.add('active');
        }
    }

    function rebuild() {
        const val = document.getElementById('in-arr').value;
        lastInitial = val;
        const arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        steps = buildSteps(arr);
        cur = 0; render();
    }

    function buildSteps(arr) {
        let _steps = [];
        let data = [...arr], n = data.length;
        _steps.push({ arr: [...data], msg: "Ready.", line: 1 });

        let i = -1;
        for (let k = n - 2; k >= 0; k--) {
            _steps.push({ arr: [...data], activeIdx: k, label: 'i', msg: `Search i: ${data[k]} < ${data[k+1]}?`, line: 3 });
            if (data[k] < data[k+1]) { i = k; break; }
        }

        if (i === -1) {
            _steps.push({ arr: [...data], isLast: true, msg: "<b>No pivot found.</b> Last permutation.", line: 13 });
            return _steps;
        }

        _steps.push({ arr: [...data], pivotIdx: i, msg: `Pivot found: ${data[i]}.`, line: 5 });

        let j = -1;
        for (let k = n - 1; k > i; k--) {
            _steps.push({ arr: [...data], pivotIdx: i, activeIdx: k, label: 'j', msg: `Search j: ${data[i]} < ${data[k]}?`, line: 7 });
            if (data[k] > data[i]) { j = k; break; }
        }

        _steps.push({ arr: [...data], pivotIdx: i, matchIdx: j, msg: `Found j: ${data[j]}.`, line: 8 });

        let swapped = [...data];
        [swapped[i], swapped[j]] = [swapped[j], swapped[i]];
        _steps.push({ arr: [...swapped], pivotIdx: j, matchIdx: i, msg: `Swap a[i] and a[j].`, line: 9 });

        _steps.push({ arr: [...swapped], suffixRange: [i + 1, n - 1], msg: `Reverse suffix from index ${i+1}.`, line: 10 });

        let final = [...swapped];
        let part2 = final.slice(i + 1).reverse();
        final.splice(i + 1, part2.length, ...part2);
        
        _steps.push({ arr: [...final], suffixRange: [i + 1, n - 1], msg: "<b>Next permutation found!</b>", line: 10 });
        return _steps;
    }

    function render() {
        const s = steps[cur], container = document.getElementById('array-row');
        container.innerHTML = '';
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;

        s.arr.forEach((val, idx) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.textContent = val;
            if (idx === s.pivotIdx) cell.classList.add('pivot');
            if (idx === s.matchIdx) cell.classList.add('swapped');
            if (s.suffixRange && idx >= s.suffixRange[0] && idx <= s.suffixRange[1]) cell.classList.add('suffix-focus');
            if (s.activeIdx === idx) {
                cell.classList.add('active');
                const lbl = document.createElement('div');
                lbl.className = 'index-label'; lbl.textContent = s.label;
                cell.appendChild(lbl);
            }
            container.appendChild(cell);
        });
        syncCodeHighlight(); // Подсвечиваем строку при каждом рендере
    }

    function go(dir) {
        if (dir === 1 && cur === steps.length - 1) {
            if (steps[cur].isLast) return;
            steps = buildSteps(steps[cur].arr);
            cur = 0; render(); return;
        }
        if(cur + dir >= 0 && cur + dir < steps.length) { cur += dir; render(); }
    }

    function resetAll() {
        document.getElementById('in-arr').value = lastInitial;
        rebuild();
    }

    renderContextControls(); rebuild();
</script>
</body>
</html>
