<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jump Search Visualizer</title>
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --accent-secondary: #1d9e75;
            --border: #3e3e42;
            --range-border: #4a4a4d;
        }

        body { 
            margin: 0; padding: 2rem 0; 
            font-family: sans-serif; 
            background-color: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        .inputs { display: flex; gap: 10px; margin-bottom: 30px; align-items: flex-end; }
        .inputs div { display: flex; flex-direction: column; gap: 5px; }
        .inputs label { font-size: 11px; color: var(--text-secondary); }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: white; padding: 8px; border-radius: 6px; 
        }
        
        button {
            padding: 8px 16px; border-radius: 6px; border: none;
            background: var(--accent); color: white; cursor: pointer; font-weight: bold;
        }

        .info-box {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; padding: 15px; min-height: 80px; margin-bottom: 50px;
            border-left: 4px solid var(--accent);
        }

        .search-area {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 70px 0;
            padding: 20px;
            flex-wrap: wrap;
        }

        .cell {
            width: 55px; height: 55px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ��������� �������� ����� */
        .cell.in-block {
            border-color: var(--range-border);
            background: #2a2a2d;
            box-shadow: 0 0 0 2px var(--range-border);
        }

        .cell.out { opacity: 0.2; }
        .cell.checking { border: 2px solid #e67e22; transform: translateY(-5px); }
        .cell.match { background: var(--accent-secondary); border-color: white; transform: scale(1.1); }

        /* ��������� */
        .ptr {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            white-space: nowrap;
        }
        .ptr-prev { top: -35px; background: #555; } /* ������ ����� */
        .ptr-curr { top: -35px; background: var(--accent); } /* ������� "������" */
        .ptr-curr.overlap { top: -55px; } 
        .ptr-scan { bottom: -35px; background: #e67e22; } /* �������� ����� */

        .ctrls { display: flex; align-items: center; gap: 10px; }
        .step-info { margin-left: auto; font-size: 12px; color: var(--text-secondary); }
    </style>
</head>
<body>

<div class="wrap">
    <h2>Jump Search Visualizer</h2>
    <div class="inputs">
        <div>
            <label>Sorted Array:</label>
            <input id="arr-input" type="text" value="1, 3, 5, 7, 9, 11, 13, 15, 17" style="width: 250px;">
        </div>
        <div>
            <label>Target:</label>
            <input id="target-input" type="number" value="13" style="width: 60px;">
        </div>
        <button onclick="rebuild()">Update</button>
    </div>

    <div class="info-box" id="info">Ready to jump.</div>

    <div class="search-area" id="search-area"></div>

    <div class="ctrls">
        <button onclick="go(-1)" style="background: var(--bg-input); border: 1px solid var(--border);">< Back</button>
        <button onclick="go(1)">Next Step ></button>
        <button onclick="resetAll()" style="background: transparent; color: var(--text-secondary);">Reset</button>
        <div class="step-info" id="step-ctr"></div>
    </div>
</div>

<script>
let arr = [];
let target = 13;
let steps = [];
let cur = 0;

function rebuild() {
    const val = document.getElementById('arr-input').value;
    arr = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x)).sort((a,b)=>a-b);
    target = parseInt(document.getElementById('target-input').value);
    init();
}

function init() {
    steps = buildJumpSteps();
    cur = 0;
    render();
}

function buildJumpSteps() {
    let _steps = [];
    let n = arr.length;
    let step = Math.floor(Math.sqrt(n));
    let prev = 0;
    let curr = step;

    _steps.push({ prev: 0, curr: 0, scan: null, msg: `Start. Block size is v${n} ? <b>${step}</b>.` });

    // ���� �������
    while (arr[Math.min(curr, n) - 1] < target) {
        _steps.push({ prev, curr: Math.min(curr, n) - 1, scan: null, 
            msg: `Value at index ${Math.min(curr, n)-1} (${arr[Math.min(curr, n)-1]}) < ${target}. Jumping...` });
        
        prev = curr;
        curr += step;
        
        if (prev >= n) {
            _steps.push({ prev: n-1, curr: n-1, scan: null, msg: "Target not found (beyond array bounds).", done: true });
            return _steps;
        }
    }

    _steps.push({ prev, curr: Math.min(curr, n) - 1, scan: null, 
        msg: `Found block! Target is between index ${prev} and ${Math.min(curr, n)-1}. Starting <b>linear scan</b>.` });

    // ���� ��������� ������
    let i = prev;
    const limit = Math.min(curr, n);
    while (arr[i] < target) {
        _steps.push({ prev, curr: limit-1, scan: i, msg: `Scanning... checking index ${i} (${arr[i]})` });
        i++;
        if (i === limit) {
            _steps.push({ prev, curr: limit-1, scan: null, msg: "Target not found in the block.", done: true });
            return _steps;
        }
    }

    if (arr[i] === target) {
        _steps.push({ prev, curr: limit-1, scan: i, msg: `<b>Match found!</b> Index: ${i}`, found: true });
    } else {
        _steps.push({ prev, curr: limit-1, scan: i, msg: "Target not found.", done: true });
    }

    return _steps;
}

function render() {
    const s = steps[cur];
    const container = document.getElementById('search-area');
    document.getElementById('info').innerHTML = s.msg;
    document.getElementById('step-ctr').textContent = `Step ${cur}/${steps.length-1}`;
    
    container.innerHTML = '';
    arr.forEach((val, i) => {
        const div = document.createElement('div');
        div.className = 'cell';
        
        if (i >= s.prev && i <= s.curr) div.classList.add('in-range', 'in-block');
        else div.classList.add('out');
        
        if (i === s.scan || (s.scan === null && i === s.curr)) div.classList.add('checking');
        if (s.found && i === s.scan) div.classList.add('match');
        
        div.textContent = val;

        if (i === s.prev) div.innerHTML += `<div class="ptr ptr-prev">PREV</div>`;
        if (i === s.curr) {
            const overlap = (s.prev === s.curr);
            div.innerHTML += `<div class="ptr ptr-curr ${overlap ? 'overlap' : ''}">CURR</div>`;
        }
        if (i === s.scan) div.innerHTML += `<div class="ptr ptr-scan">SCAN</div>`;

        container.appendChild(div);
    });
}

function go(dir) { if (cur+dir >= 0 && cur+dir < steps.length) { cur+=dir; render(); } }
function resetAll() { cur=0; render(); }

rebuild();
</script>
</body>
</html>
