<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LCS Visualizer | AlgoView Lab</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --accent-secondary: #1d9e75;
            --border: #3e3e42;
            --code-bg: #0d0d0f;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 2rem 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 850px; margin: 0 auto; padding: 0 20px; }
        
        /* VISUALIZER SECTION */
        .visualizer-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 30px;
        }

        .inputs { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: var(--text-main); padding: 8px 12px; border-radius: 8px; width: 140px; 
            font-family: monospace;
        }
        
        button {
            padding: 10px 18px; border-radius: 8px; border: none;
            background: var(--accent); color: white; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s; font-size: 14px;
        }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }
        button:hover { opacity: 0.9; }

        .info-box {
            background: var(--bg-main); border-left: 4px solid var(--accent-secondary);
            padding: 16px; min-height: 85px; margin-bottom: 20px; font-size: 14px; line-height: 1.6;
        }
        .info-box b { color: var(--accent-secondary); }

        .legend { display: flex; gap: 15px; flex-wrap: wrap; font-size: 11px; color: var(--text-secondary); margin-bottom: 20px; }
        .leg { display: flex; align-items: center; gap: 6px; }
        .ldot { width: 14px; height: 14px; border-radius: 4px; }

        /* TABLE LOGIC */
        .tbl-wrap { overflow-x: auto; margin-bottom: 25px; }
        table { border-collapse: separate; border-spacing: 6px; margin: 0 auto; }
        th, .rlbl { font-size: 13px; color: var(--text-secondary); min-width: 48px; text-align: center; }

        .cell {
            width: 48px; height: 48px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-card); text-align: center; font-size: 16px; transition: all .2s;
            color: var(--text-secondary);
        }
        .cell.filled { background: var(--bg-input); color: var(--text-main); }
        .cell.cur { border: 2.5px solid var(--accent) !important; color: white !important; transform: scale(1.05); z-index: 2; }
        .cell.match { background: #085041; border-color: var(--accent-secondary); color: white; }
        .cell.source { background: #3c3489; border-color: #7f77dd; color: white; }
        .cell.path { background: #1d9e75; border-color: #fff; color: white; box-shadow: 0 0 10px var(--accent-secondary); }

        /* LAB TABS */
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; padding: 15px 22px; color: var(--text-secondary); font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }
        .context-controls { margin-left: auto; display: flex; align-items: center; gap: 6px; padding-right: 15px; }
        .sub-btn { font-size: 10px; padding: 4px 8px; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); border-radius: 4px; cursor: pointer; }
        .sub-btn.active { border-color: var(--accent); color: var(--accent); }
        .tab-content { display: none; padding: 25px; line-height: 1.6; }
        .tab-content.active { display: block; }
        pre[class*="language-"] { margin: 0; border-radius: 10px; background: var(--code-bg) !important; font-size: 13px; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-card">
        <div class="inputs">
            <input id="in1" type="text" value="ABCBDEB" maxlength="12">
            <input id="in2" type="text" value="ACE" maxlength="12">
            <button onclick="rebuild()">Apply</button>
        </div>

        <div class="legend">
            <div class="leg"><div class="ldot" style="border:2.5px solid var(--accent)"></div>current</div>
            <div class="leg"><div class="ldot" style="background:#085041"></div>char match</div>
            <div class="leg"><div class="ldot" style="background:#3c3489"></div>src (max)</div>
            <div class="leg"><div class="ldot" style="background:#1d9e75"></div>lcs path</div>
        </div>

        <div class="info-box" id="info">Ready.</div>
        
        <div class="tbl-wrap" id="tbl"></div>

        <div class="inputs" style="margin-top: 20px; margin-bottom: 0;">
            <button class="secondary" onclick="go(-1)">< Back</button>
            <button onclick="go(1)">Next Step ></button>
            <button id="auto-btn" class="secondary" onclick="toggleAuto()">Auto Play</button>
            <button class="secondary" onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto; font-size: 12px; color: var(--text-secondary);"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div class="context-controls" id="context-panel"></div>
        </div>
        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content"><pre><code class="language-python" id="python-display"></code></pre></div>
        <div id="cpp" class="tab-content"><pre><code class="language-cpp" id="cpp-display"></code></pre></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
    const db = {
        theory: {
            EN: "<h3>Longest Common Subsequence</h3><p>The LCS problem is to find the longest subsequence common to all sequences in a set of sequences. Unlike substrings, subsequences are not required to occupy consecutive positions within the original sequences.</p>",
            RU: "<h3>Наибольшая общая подпоследовательность</h3><p>Задача поиска подпоследовательности, имеющейся во всех рассматриваемых последовательностях и имеющей максимальную длину. В отличие от подстрок, подпоследовательности не обязаны занимать последовательные позиции.</p>"
        },
        python: {
            v1: "def lcs(s1, s2):\n    m, n = len(s1), len(s2)\n    dp = [[0] * (n + 1) for _ in range(m + 1)]\n    \n    for i in range(1, m + 1):\n        for j in range(1, n + 1):\n            if s1[i-1] == s2[j-1]:\n                dp[i][j] = dp[i-1][j-1] + 1\n            else:\n                dp[i][j] = max(dp[i-1][j], dp[i][j-1])\n    return dp[m][n]",
            v2: "# Space optimized version O(min(N,M))\ndef lcs_small(s1, s2):\n    if len(s1) < len(s2): s1, s2 = s2, s1\n    dp = [0] * (len(s2) + 1)\n    for char1 in s1:\n        prev = 0\n        for j, char2 in enumerate(s2):\n            temp = dp[j+1]\n            if char1 == char2:\n                dp[j+1] = prev + 1\n            else:\n                dp[j+1] = max(dp[j+1], dp[j])\n            prev = temp\n    return dp[-1]"
        },
        cpp: {
            v1: "int lcs(string s1, string s2) {\n    int m = s1.size(), n = s2.size();\n    vector<vector<int>> dp(m + 1, vector<int>(n + 1, 0));\n    \n    for (int i = 1; i <= m; i++) {\n        for (int j = 1; j <= n; j++) {\n            if (s1[i-1] == s2[j-1])\n                dp[i][j] = dp[i-1][j-1] + 1;\n            else\n                dp[i][j] = max(dp[i-1][j], dp[i][j-1]);\n        }\n    }\n    return dp[m][n];\n}",
            v2: "int lcs_optimized(string s1, string s2) {\n    int n = s1.size(), m = s2.size();\n    if (n < m) return lcs_optimized(s2, s1);\n    vector<int> dp(m + 1, 0);\n    for (int i = 1; i <= n; i++) {\n        int prev = 0;\n        for (int j = 1; j <= m; j++) {\n            int temp = dp[j];\n            if (s1[i-1] == s2[j-1]) dp[j] = prev + 1;\n            else dp[j] = max(dp[j], dp[j-1]);\n            prev = temp;\n        }\n    }\n    return dp[m];\n}"
        }
    };

    let t1 = '', t2 = '', steps = [], cur = 0, timer = null, currentMainTab = 'theory';

    function switchMainTab(btn, tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active'); document.getElementById(tabId).classList.add('active');
        renderContextControls();
    }

    function renderContextControls() {
        const panel = document.getElementById('context-panel'); panel.innerHTML = '';
        const list = currentMainTab === 'theory' ? ['EN', 'RU'] : ['v1', 'v2'];
        list.forEach((item, idx) => {
            const b = document.createElement('button');
            b.className = 'sub-btn' + (idx === 0 ? ' active' : '');
            b.textContent = item;
            b.onclick = () => {
                document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                b.classList.add('active'); updateContent(item);
            };
            panel.appendChild(b);
        });
        updateContent(currentMainTab === 'theory' ? 'EN' : 'v1');
    }

    function updateContent(key) {
        const display = document.getElementById(currentMainTab + '-display');
        if (currentMainTab === 'theory') display.innerHTML = db.theory[key];
        else {
            display.textContent = db[currentMainTab][key];
            Prism.highlightElement(display);
        }
    }

    function rebuild() {
        t1 = document.getElementById('in1').value.trim();
        t2 = document.getElementById('in2').value.trim();
        steps = buildSteps(); cur = 0; render();
    }

    function buildSteps() {
        const n = t1.length, m = t2.length;
        const _steps = [];
        const dp = Array.from({length: n+1}, () => Array(m+1).fill(0));

        _steps.push({ i:0, j:0, dp: dp.map(r=>[...r]), action: 'init', msg: 'Initialize DP table with zeros.' });

        for (let i = 1; i <= n; i++) {
            for (let j = 1; j <= m; j++) {
                let src = [], action = '';
                if (t1[i-1] === t2[j-1]) {
                    dp[i][j] = dp[i-1][j-1] + 1;
                    src = [{r: i-1, c: j-1}];
                    action = 'match';
                } else {
                    dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
                    if (dp[i-1][j] >= dp[i][j-1]) src.push({r: i-1, c: j});
                    if (dp[i][j-1] >= dp[i-1][j]) src.push({r: i, c: j-1});
                    action = 'move';
                }
                _steps.push({ 
                    i, j, dp: dp.map(r=>[...r]), src, action,
                    msg: action === 'match' 
                        ? `Match found: <b>'${t1[i-1]}'</b>. Length = dp[i-1][j-1] + 1 = <b>${dp[i][j]}</b>`
                        : `No match. Taking max of neighbors: <b>${dp[i][j]}</b>`
                });
            }
        }

        let path = [];
        let r = n, c = m;
        while (r > 0 && c > 0) {
            if (t1[r-1] === t2[c-1]) { path.push({r, c}); r--; c--; }
            else if (dp[r-1][c] >= dp[r][c-1]) r--;
            else c--;
        }
        _steps.push({ i:n, j:m, dp: dp.map(r=>[...r]), path, action:'done', msg: '<b>LCS found!</b> Final path highlighted in green.' });
        return _steps;
    }

    function render() {
        const s = steps[cur], n = t1.length, m = t2.length;
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;
        document.getElementById('resv').textContent = s.dp[n][m];

        let html = '<table><tr><th></th><th>""</th>';
        for(let j=0; j<m; j++) html += `<th>${t2[j]}</th>`;
        html += '</tr>';

        for (let i=0; i<=n; i++) {
            html += `<tr><td class="rlbl">${i===0 ? '""' : t1[i-1]}</td>`;
            for (let j=0; j<=m; j++) {
                const isFilled = (i===0 || j===0 || (cur > 0 && (i < s.i || (i === s.i && j <= s.j))));
                let cls = 'cell';
                if (isFilled) cls += ' filled';
                if (i === s.i && j === s.j && s.action !== 'done') cls += ' cur';
                if (s.src && s.src.some(p => p.r === i && p.c === j)) cls += (s.action === 'match' ? ' match' : ' source');
                if (s.path && s.path.some(p => p.r === i && p.c === j)) cls += ' path';
                
                html += `<td class="${cls}">${isFilled ? s.dp[i][j] : ''}</td>`;
            }
            html += '</tr>';
        }
        document.getElementById('tbl').innerHTML = html + '</table>';
    }

    function go(dir) { if (cur+dir >= 0 && cur+dir < steps.length) { cur+=dir; render(); } else if (timer) toggleAuto(); }
    function toggleAuto() {
        const btn = document.getElementById('auto-btn');
        if (timer) { clearInterval(timer); timer = null; btn.textContent = "Auto Play"; }
        else { btn.textContent = "Stop"; timer = setInterval(() => go(1), 300); }
    }
    function resetAll() { cur = 0; render(); if(timer) toggleAuto(); }

    renderContextControls(); rebuild();
</script>
</body>
</html>
