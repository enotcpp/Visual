<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Distance Visualizer | AlgoView</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-main: #141416;
            --bg-card: #1e1e22;
            --bg-input: #26262a;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --accent-soft: rgba(127, 119, 221, 0.1);
            --accent-secondary: #1d9e75;
            --border: #313136;
            --code-bg: #0d0d0f;
        }

        body { 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        /* VISUALIZER SECTION */
        .visualizer-section {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { font-size: 22px; margin: 0 0 25px 0; }

        .inputs { display: flex; gap: 12px; margin-bottom: 25px; align-items: center; flex-wrap: wrap; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: white; padding: 10px 15px; border-radius: 8px; width: 140px; outline: none;
        }

        button {
            padding: 10px 18px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-main); font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { border-color: var(--accent); background: #2d2d32; }
        button.primary { background: var(--accent); color: white; border: none; }

        .info-box {
            background: var(--bg-main); border-left: 4px solid var(--accent);
            padding: 20px; min-height: 80px; margin-bottom: 25px;
            font-size: 14px; line-height: 1.6; color: var(--text-secondary);
        }
        .info-box b { color: var(--accent); }

        /* TABLE */
        .tbl-wrap { overflow-x: auto; margin-bottom: 30px; }
        table { border-collapse: separate; border-spacing: 6px; margin: 0 auto; }
        th, .rlbl { font-size: 13px; color: var(--text-secondary); padding: 5px; min-width: 45px; text-align: center; }

        .cell {
            width: 45px; height: 45px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--bg-card);
            text-align: center; font-size: 16px; color: var(--text-secondary);
            transition: all 0.2s;
        }
        .cell.filled { background: var(--bg-input); color: var(--text-main); }
        .cell.cur { border: 2.5px solid var(--accent); color: white; transform: scale(1.05); z-index: 2; }
        .cell.source { background: #3c3489; border-color: var(--accent); color: white; }
        .cell.match { background: #085041; border-color: var(--accent-secondary); color: white; }

        /* LAB INFO SECTION */
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn {
            background: none; border: none; padding: 18px 25px; color: var(--text-secondary);
            font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer;
        }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }
        .context-controls { margin-left: auto; display: flex; align-items: center; gap: 6px; padding-right: 15px; }
        .sub-btn {
            font-size: 10px; padding: 4px 8px; background: transparent; 
            border: 1px solid var(--border); color: var(--text-secondary); border-radius: 4px; cursor: pointer;
        }
        .sub-btn.active { border-color: var(--accent); color: var(--accent); }

        .tab-content { display: none; padding: 25px; line-height: 1.6; }
        .tab-content.active { display: block; }
        pre[class*="language-"] { margin: 0; border-radius: 10px; background: var(--code-bg) !important; font-size: 14px; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-section">
        <h1>📐 Edit Distance (Wagner-Fischer)</h1>
        
        <div class="inputs">
            <input id="in1" type="text" value="kitten" maxlength="12">
            <input id="in2" type="text" value="sitting" maxlength="12">
            <button onclick="rebuild()" class="primary">Apply</button>
        </div>

        <div class="info-box" id="info">Ready to start.</div>

        <div class="tbl-wrap" id="tbl"></div>

        <div class="inputs" style="margin-top: 20px; margin-bottom: 0;">
            <button onclick="go(-1)">← Back</button>
            <button onclick="go(1)" class="primary">Next Step →</button>
            <button id="auto-btn" onclick="toggleAuto()">Auto Play</button>
            <button onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto; font-size: 12px; color: var(--text-secondary);"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div class="context-controls" id="context-panel"></div>
        </div>
        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content"><pre><code class="language-python" id="python-display"></code></pre></div>
        <div id="cpp" class="tab-content"><pre><code class="language-cpp" id="cpp-display"></code></pre></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
    const db = {
        theory: {
            EN: "<h3>Edit Distance</h3><p>Also known as Levenshtein distance. It measures the minimum number of operations (insertions, deletions, substitutions) required to change one word into another.</p>",
            RU: "<h3>Расстояние редактирования</h3><p>Также известно как расстояние Левенштейна. Это минимальное количество операций (вставка, удаление, замена), необходимых для превращения одной строки в другую.</p>"
        },
        python: {
            v1: "def editDistance(s1, s2):\n    m, n = len(s1), len(s2)\n    dp = [[0]*(n+1) for _ in range(m+1)]\n    for i in range(m+1): dp[i][0] = i\n    for j in range(n+1): dp[0][j] = j\n    \n    for i in range(1, m+1):\n        for j in range(1, n+1):\n            if s1[i-1] == s2[j-1]:\n                dp[i][j] = dp[i-1][j-1]\n            else:\n                dp[i][j] = 1 + min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1])\n    return dp[m][n]",
            v2: "# Space optimized version\ndef editDistance(s1, s2):\n    n = len(s2)\n    prev = list(range(n + 1))\n    for i, c1 in enumerate(s1):\n        curr = [i + 1]\n        for j, c2 in enumerate(s2):\n            curr.append(prev[j] if c1 == c2 else 1 + min(prev[j], prev[j+1], curr[-1]))\n        prev = curr\n    return prev[-1]"
        },
        cpp: {
            v1: "int editDistance(string s1, string s2) {\n    int m = s1.length(), n = s2.length();\n    vector<vector<int>> dp(m + 1, vector<int>(n + 1));\n    for (int i = 0; i <= m; i++) dp[i][0] = i;\n    for (int j = 0; j <= n; j++) dp[0][j] = j;\n    \n    for (int i = 1; i <= m; i++) {\n        for (int j = 1; j <= n; j++) {\n            if (s1[i-1] == s2[j-1])\n                dp[i][j] = dp[i-1][j-1];\n            else\n                dp[i][j] = 1 + min({dp[i-1][j], dp[i][j-1], dp[i-1][j-1]});\n        }\n    }\n    return dp[m][n];\n}",
            v2: "// Using 2 rows only\nint editDistance(string s1, string s2) {\n    int m = s1.size(), n = s2.size();\n    vector<int> prev(n + 1), curr(n + 1);\n    iota(prev.begin(), prev.end(), 0);\n    for (int i = 1; i <= m; i++) {\n        curr[0] = i;\n        for (int j = 1; j <= n; j++) {\n            if (s1[i-1] == s2[j-1]) curr[j] = prev[j-1];\n            else curr[j] = 1 + min({prev[j], curr[j-1], prev[j-1]});\n        }\n        prev = curr;\n    }\n    return prev[n];\n}"
        }
    };

    let t1 = '', t2 = '', steps = [], cur = 0, timer = null, currentMainTab = 'theory';

    function switchMainTab(btn, tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        renderContextControls();
    }

    function renderContextControls() {
        const panel = document.getElementById('context-panel'); panel.innerHTML = '';
        const list = currentMainTab === 'theory' ? ['EN', 'RU'] : ['v1', 'v2'];
        list.forEach((item, idx) => {
            const b = document.createElement('button');
            b.className = 'sub-btn' + (idx === 0 ? ' active' : '');
            b.textContent = item;
            b.onclick = () => {
                document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                b.classList.add('active');
                updateContent(item);
            };
            panel.appendChild(b);
        });
        updateContent(currentMainTab === 'theory' ? 'EN' : 'v1');
    }

    function updateContent(key) {
        const display = document.getElementById(currentMainTab + '-display');
        if (currentMainTab === 'theory') display.innerHTML = db.theory[key];
        else {
            display.textContent = db[currentMainTab][key];
            Prism.highlightElement(display);
        }
    }

    function rebuild() {
        t1 = document.getElementById('in1').value.trim();
        t2 = document.getElementById('in2').value.trim();
        steps = buildSteps();
        cur = 0; render();
    }

    function buildSteps() {
        const n = t1.length, m = t2.length;
        const _steps = [];
        const dp = Array.from({length: n+1}, () => Array(m+1).fill(0));

        _steps.push({ i:0, j:0, dp: dp.map(r=>[...r]), msg: 'Initialize DP table.' });

        for (let i = 0; i <= n; i++) dp[i][0] = i;
        for (let j = 0; j <= m; j++) dp[0][j] = j;
        _steps.push({ i:0, j:0, dp: dp.map(r=>[...r]), msg: 'Fill first row and column with index values (base cases).' });

        for (let i = 1; i <= n; i++) {
            for (let j = 1; j <= m; j++) {
                let src = [], action = '';
                if (t1[i-1] === t2[j-1]) {
                    dp[i][j] = dp[i-1][j-1];
                    src = [{r: i-1, c: j-1}];
                    action = 'match';
                } else {
                    dp[i][j] = 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
                    src = [{r: i-1, c: j}, {r: i, c: j-1}, {r: i-1, c: j-1}];
                    action = 'diff';
                }
                _steps.push({ 
                    i, j, dp: dp.map(r=>[...r]), src, action,
                    msg: action === 'match' 
                        ? `Characters <b>'${t1[i-1]}'</b> match! Copy value from diagonal: <b>${dp[i][j]}</b>`
                        : `Characters differ. Take 1 + min(top, left, diagonal) = <b>${dp[i][j]}</b>`
                });
            }
        }
        _steps.push({ i:n, j:m, dp: dp.map(r=>[...r]), msg: `<b>Finished!</b> The Edit Distance is <b>${dp[n][m]}</b>.` });
        return _steps;
    }

    function render() {
        const s = steps[cur];
        const n = t1.length, m = t2.length;
        document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;
        document.getElementById('info').innerHTML = s.msg;

        let html = '<table><tr><th></th><th>""</th>';
        for (let j=0; j<m; j++) html += `<th>${t2[j]}</th>`;
        html += '</tr>';

        for (let i=0; i<=n; i++) {
            html += `<tr><td class="rlbl">${i===0 ? '""' : t1[i-1]}</td>`;
            for (let j=0; j<=m; j++) {
                const isFilled = (i===0 || j===0 || (cur > 0 && (i < s.i || (i === s.i && j <= s.j))));
                let cls = 'cell';
                if (isFilled) cls += ' filled';
                if (i === s.i && j === s.j) cls += ' cur';
                if (s.src && s.src.some(p => p.r === i && p.c === j)) {
                    cls += (s.action === 'match' ? ' match' : ' source');
                }
                html += `<td class="${cls}">${isFilled ? s.dp[i][j] : ''}</td>`;
            }
            html += '</tr>';
        }
        document.getElementById('tbl').innerHTML = html + '</table>';
    }

    function go(dir) {
        if (cur+dir >= 0 && cur+dir < steps.length) { cur+=dir; render(); }
        else if (timer) toggleAuto();
    }

    function toggleAuto() {
        const btn = document.getElementById('auto-btn');
        if (timer) { clearInterval(timer); timer = null; btn.textContent = "Auto Play"; }
        else { btn.textContent = "Stop"; timer = setInterval(() => go(1), 350); }
    }

    function resetAll() { cur = 0; render(); if(timer) toggleAuto(); }

    renderContextControls();
    rebuild();
</script>
</body>
</html>
