<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoView | Lab Library</title>
    <style>
        :root {
            --bg-main: #141416;
            --bg-card: #1e1e22;
            --bg-hover: #26262a;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --border: #2d2d30;
            --font-stack: 'Inter', -apple-system, sans-serif;
        }

        body { 
            font-family: var(--font-stack);
            background: var(--bg-main); 
            color: var(--text-main);
            margin: 0;
            padding: 40px; /* Отступ от краев экрана */
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Все влево */
        }

        /* ЛОГОТИП С ТОЧКОЙ */
        header {
            margin-bottom: 40px;
            border-left: 2px solid var(--accent);
            padding-left: 20px;
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span { color: var(--accent); }

        .subtitle {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .container {
            width: 100%;
            max-width: 700px; /* Ограничиваем ширину контента слева */
        }

        /* КАТЕГОРИИ (АККОРДЕОНЫ) */
        .category-wrapper {
            margin-bottom: 12px;
            width: 100%;
        }

        .category-header {
            padding: 15px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: color 0.3s;
        }

        .category-header:hover { color: var(--accent); }

        .category-title {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .chevron {
            font-size: 10px;
            transition: transform 0.3s;
        }

        /* СПИСОК АЛГОРИТМОВ */
        .algo-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding-left: 20px;
            border-left: 1px solid var(--border);
            margin-left: 5px;
        }

        .category-wrapper.active .algo-list {
            max-height: 1000px; /* Достаточно большое число */
            padding-top: 15px;
            padding-bottom: 15px;
        }

        .category-wrapper.active .chevron {
            transform: rotate(180deg);
            color: var(--accent);
        }

        /* КАРТОЧКА АЛГОРИТМА */
        .algo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid transparent;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .algo-item:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
            transform: translateX(5px);
        }

        .algo-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .algo-icon { font-size: 18px; opacity: 0.8; }
        .algo-name { font-size: 15px; font-weight: 600; }

        /* КНОПКИ-ЗАГЛУШКИ */
        .algo-btns {
            display: flex;
            gap: 6px;
        }

        .btn-tag {
            font-size: 10px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 5px;
            background: #2d2d30;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-tag:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">Algo<span>View</span></div>
        <div class="subtitle">Interactive algorithms laboratory</div>
    </header>

    <div class="container" id="main-container">
        
        <div class="category-wrapper">
            <div class="category-header" onclick="toggleCat(this)">
                <span class="chevron">▼</span>
                <span class="category-title">Searching</span>
            </div>
            <div class="algo-list">
                <div class="algo-item">
                    <a href="Binary Search/index.html" class="algo-info" style="text-decoration:none; color:inherit;">
                        <span class="algo-icon">🔍</span>
                        <span class="algo-name">Binary Search</span>
                    </a>
                    <div class="algo-btns">
                        <div class="btn-tag">DOC</div>
                        <div class="btn-tag">PY</div>
                        <div class="btn-tag">CPP</div>
                    </div>
                </div>
                <div class="algo-item">
                    <a href="Lower Bound/index.html" class="algo-info" style="text-decoration:none; color:inherit;">
                        <span class="algo-icon">🎯</span>
                        <span class="algo-name">Lower Bound</span>
                    </a>
                    <div class="algo-btns">
                        <div class="btn-tag">DOC</div>
                        <div class="btn-tag">PY</div>
                        <div class="btn-tag">CPP</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="category-wrapper">
            <div class="category-header" onclick="toggleCat(this)">
                <span class="chevron">▼</span>
                <span class="category-title">Sorting</span>
            </div>
            <div class="algo-list">
                <div class="algo-item">
                    <a href="Bubble Sort/index.html" class="algo-info" style="text-decoration:none; color:inherit;">
                        <span class="algo-icon">🔵</span>
                        <span class="algo-name">Bubble Sort</span>
                    </a>
                    <div class="algo-btns">
                        <div class="btn-tag">DOC</div>
                        <div class="btn-tag">PY</div>
                        <div class="btn-tag">CPP</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="category-wrapper">
            <div class="category-header" onclick="toggleCat(this)">
                <span class="chevron">▼</span>
                <span class="category-title">Dynamic Programming</span>
            </div>
            <div class="algo-list">
                <div class="algo-item">
                    <span class="algo-info">
                        <span class="algo-icon">📉</span>
                        <span class="algo-name">LCS</span>
                    </span>
                    <div class="algo-btns">
                        <div class="btn-tag">DOC</div>
                        <div class="btn-tag">PY</div>
                        <div class="btn-tag">CPP</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function toggleCat(el) {
            const wrapper = el.parentElement;
            wrapper.classList.toggle('active');
        }

        // Заглушка для кнопок, чтобы они не срабатывали как ссылка
        document.querySelectorAll('.btn-tag').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                alert('Content coming soon!');
            });
        });
    </script>
</body>
</html>
