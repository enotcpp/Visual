<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AlgoView Lab | Binary Heap (Max-Heap)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-main: #141416; --bg-card: #1e1e22; --bg-input: #26262a;
            --text-main: #e1e1e3; --text-secondary: #9ba1a6;
            --accent: #7f77dd; --border: #313136;
            --node-active: #7f77dd; --node-swap: #1D9E75;
            --font-sans: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body { margin: 0; padding: 20px; font-family: var(--font-sans); background: var(--bg-main); color: var(--text-main); }
        .container { max-width: 1000px; margin: 0 auto; }
        .visualizer-card { background: var(--bg-card); border-radius: 20px; padding: 35px; border: 1px solid var(--border); margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        
        .header-controls { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        input { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; width: 120px; outline: none; font-family: var(--font-mono); }
        button { padding: 12px 20px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }
        button:hover { transform: translateY(-1px); opacity: 0.9; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .info-box { background: rgba(127,119,221,0.05); border-left: 4px solid var(--accent); padding: 20px; border-radius: 6px; min-height: 60px; margin-bottom: 25px; font-size: 15px; line-height: 1.6; }
        canvas { display: block; background: #1a1a1c; border-radius: 16px; border: 1px solid var(--border); width: 100%; height: 320px; margin-bottom: 25px; }

        .array-container { margin-top: 20px; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 12px; }
        .array-label { font-size: 11px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 12px; letter-spacing: 1px; }
        .array-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .array-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .idx { font-size: 10px; font-family: var(--font-mono); color: #555; }
        .val { width: 40px; height: 40px; border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 600; background: var(--bg-input); transition: 0.3s; }
        .val.active { border-color: var(--node-active); background: rgba(127,119,221,0.3); }
        .val.swap { border-color: var(--node-swap); background: rgba(29,158,117,0.3); }

        .step-ctrls { display: flex; gap: 10px; margin-top: 30px; align-items: center; border-top: 1px solid var(--border); padding-top: 20px; }
        .step-info { margin-left: auto; font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }

        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-top: 24px; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); padding: 8px; }
        .tab-btn { background: none; border: none; padding: 12px 24px; color: var(--text-secondary); font-size: 12px; font-weight: 800; cursor: pointer; border-radius: 10px; text-transform: uppercase; }
        .tab-btn.active { color: var(--accent); background: var(--bg-input); }
        .tab-content { display: none; padding: 35px; line-height: 1.7; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="visualizer-card">
        <div class="header-controls">
            <input id="ins-val" type="number" placeholder="Value">
            <button class="btn-primary" onclick="doInsert()">Insert</button>
            <button class="btn-secondary" onclick="doExtract()">Extract Max</button>
            <button class="btn-secondary" onclick="resetHeap()">Reset</button>
        </div>

        <div id="info" class="info-box">Heap is empty. Add a value to start.</div>

        <canvas id="heapCanvas"></canvas>

        <div class="array-container">
            <div class="array-label">Array View</div>
            <div id="arrayRow" class="array-row"></div>
        </div>

        <div class="step-ctrls">
            <button id="back-btn" class="btn-secondary" onclick="changeStep(-1)">← Back</button>
            <button id="next-btn" class="btn-primary" onclick="changeStep(1)">Next Step →</button>
            <span id="stepCounter" class="step-info"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchTab(this, 'cpp')">C++ Code</button>
        </div>
        <div id="theory" class="tab-content active">
            <h3 style="margin-top:0; color:var(--accent)">Binary Heap</h3>
            <p>В <b>Max-Heap</b> значение каждого узла больше или равно значениям его потомков.</p>
        </div>
        <div id="cpp" class="tab-content">
            <pre><code class="language-cpp">void siftUp(int i) {
    while (i > 0 && heap[(i-1)/2] < heap[i]) {
        swap(heap[i], heap[(i-1)/2]);
        i = (i-1)/2;
    }
}</code></pre>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
    let heap = []; // Начинаем с пустого массива
    let steps = [];
    let curStep = 0;

    function saveStep(h, active, swap, msg) {
        steps.push({ h: [...h], active, swap, msg });
    }

    function doInsert() {
        const input = document.getElementById('ins-val');
        const val = parseInt(input.value);
        if (isNaN(val)) return;
        input.value = '';

        steps = []; curStep = 0;
        let h = [...heap];
        h.push(val);
        let i = h.length - 1;
        
        saveStep(h, i, -1, `Добавление <b>${val}</b> в конец массива.`);
        
        while (i > 0) {
            let p = Math.floor((i-1)/2);
            if (h[p] < h[i]) {
                saveStep(h, i, p, `Нарушение: Потомок ${h[i]} > Родитель ${h[p]}. Меняем местами.`);
                [h[i], h[p]] = [h[p], h[i]];
                i = p;
                saveStep(h, i, -1, `Элемент поднялся на индекс ${i}.`);
            } else {
                saveStep(h, i, p, `Условие кучи выполнено: ${h[p]} ≥ ${h[i]}.`);
                break;
            }
        }
        heap = h;
        render();
    }

    function doExtract() {
        if (heap.length === 0) return;
        steps = []; curStep = 0;
        let h = [...heap];
        const max = h[0];
        saveStep(h, 0, -1, `Извлечение максимума: <b>${max}</b>.`);
        
        if (h.length > 1) {
            h[0] = h.pop();
            saveStep(h, 0, -1, `Последний элемент (${h[0]}) перенесен в корень. Начинаем <b>Sift Down</b>.`);
            
            let i = 0;
            while (true) {
                let l = 2*i + 1, r = 2*i + 2, largest = i;
                if (l < h.length && h[l] > h[largest]) largest = l;
                if (r < h.length && h[r] > h[largest]) largest = r;
                
                if (largest !== i) {
                    saveStep(h, i, largest, `Ребенок ${h[largest]} больше ${h[i]}. Меняем местами.`);
                    [h[i], h[largest]] = [h[largest], h[i]];
                    i = largest;
                    saveStep(h, i, -1, `Элемент опустился на индекс ${i}.`);
                } else {
                    saveStep(h, i, -1, `Свойства кучи восстановлены.`);
                    break;
                }
            }
        } else { h.pop(); saveStep(h, -1, -1, "Куча пуста."); }
        heap = h;
        render();
    }

    const canvas = document.getElementById('heapCanvas');
    const ctx = canvas.getContext('2d');

    function draw() {
        const W = canvas.clientWidth, H = canvas.clientHeight;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = W * dpr; canvas.height = H * dpr;
        ctx.scale(dpr, dpr);
        ctx.clearRect(0,0,W,H);

        const s = steps.length > 0 ? steps[curStep] : { h: heap, active: -1, swap: -1 };
        const h = s.h;
        if (h.length === 0) {
            ctx.fillStyle = '#555'; ctx.textAlign = 'center'; ctx.font = '14px Inter';
            ctx.fillText("Heap is empty", W/2, H/2);
            return;
        }

        const pos = h.map((_, i) => {
            const lvl = Math.floor(Math.log2(i+1));
            const posInLvl = i - (Math.pow(2, lvl) - 1);
            const nodesInLvl = Math.pow(2, lvl);
            return { x: W * (posInLvl + 0.5) / nodesInLvl, y: 50 + lvl * 60 };
        });

        // Edges
        ctx.strokeStyle = '#313136'; ctx.lineWidth = 2;
        for (let i = 0; i < h.length; i++) {
            let l = 2*i+1, r = 2*i+2;
            if (l < h.length) { ctx.beginPath(); ctx.moveTo(pos[i].x, pos[i].y); ctx.lineTo(pos[l].x, pos[l].y); ctx.stroke(); }
            if (r < h.length) { ctx.beginPath(); ctx.moveTo(pos[i].x, pos[i].y); ctx.lineTo(pos[r].x, pos[r].y); ctx.stroke(); }
        }

        // Nodes
        pos.forEach((p, i) => {
            const isActive = i === s.active;
            const isSwap = i === s.swap;
            
            ctx.beginPath(); ctx.arc(p.x, p.y, 18, 0, Math.PI*2);
            ctx.fillStyle = isActive ? '#7f77dd' : (isSwap ? '#1D9E75' : '#26262a');
            ctx.fill();
            ctx.strokeStyle = (isActive || isSwap) ? '#fff' : '#313136';
            ctx.lineWidth = 2; ctx.stroke();

            ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Inter';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(h[i], p.x, p.y);
        });
    }

    function render() {
        draw();
        const s = steps.length > 0 ? steps[curStep] : { h: heap, active: -1, swap: -1, msg: "Куча готова." };
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('stepCounter').textContent = steps.length ? `Шаг ${curStep + 1} / ${steps.length}` : "";
        
        document.getElementById('back-btn').disabled = curStep === 0;
        document.getElementById('next-btn').disabled = (steps.length === 0 || curStep === steps.length - 1);

        const row = document.getElementById('arrayRow');
        row.innerHTML = s.h.map((v, i) => `
            <div class="array-cell">
                <div class="idx">${i}</div>
                <div class="val ${i===s.active?'active':''} ${i===s.swap?'swap':''}">${v}</div>
            </div>`).join('');
    }

    function changeStep(dir) {
        if (curStep + dir >= 0 && curStep + dir < steps.length) {
            curStep += dir; render();
        }
    }

    function resetHeap() { heap = []; steps = []; curStep = 0; render(); }
    function switchTab(btn, id) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active'); document.getElementById(id).classList.add('active');
    }

    window.onresize = draw;
    render();
</script>
</body>
</html>
