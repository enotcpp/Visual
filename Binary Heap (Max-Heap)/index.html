<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AlgoView Lab | Binary Heap (Max-Heap)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-main: #141416; --bg-card: #1e1e22; --bg-input: #26262a;
            --text-main: #e1e1e3; --text-secondary: #9ba1a6;
            --accent: #7f77dd; --border: #313136;
            --node-visited: #534ab7; --node-active-bg: #ffffff; --node-active-text: #141416;
            --font-sans: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body { margin: 0; padding: 20px; font-family: var(--font-sans); background: var(--bg-main); color: var(--text-main); }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .visualizer-card { background: var(--bg-card); border-radius: 20px; padding: 35px; border: 1px solid var(--border); margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        
        .header { display: flex; gap: 12px; margin-bottom: 30px; }
        input { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 14px; border-radius: 10px; flex-grow: 1; outline: none; font-family: var(--font-mono); font-size: 14px; }
        
        .info-box { background: rgba(127,119,221,0.05); border-left: 4px solid var(--accent); padding: 20px; border-radius: 6px; min-height: 60px; margin-bottom: 35px; font-size: 16px; line-height: 1.6; }

        /* Контейнер для скролла дерева */
        .canvas-viewport { 
            width: 100%; 
            overflow: auto; 
            background: #1a1a1c; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            margin-bottom: 30px;
            cursor: grab;
        }
        .canvas-viewport:active { cursor: grabbing; }
        
        canvas { display: block; }

        .status-rows { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .data-row { display: flex; align-items: flex-start; gap: 15px; min-height: 45px; width: 100%; }
        .row-label { font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; width: 120px; flex-shrink: 0; margin-top: 15px; }
        
        #arrayRow { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 25px 8px; 
            margin-top: 10px; 
            flex-grow: 1;
        }

        .node-pill { padding: 6px 14px; border-radius: 8px; font-size: 14px; font-weight: 600; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); min-width: 40px; text-align: center; position: relative; transition: 0.3s; }
        .node-pill.visited { background: var(--node-visited); border-color: var(--accent); color: white; }
        .node-pill.active { background: var(--node-active-bg); color: var(--node-active-text); border-color: white; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .idx-tag { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--text-secondary); font-family: var(--font-mono); }

        .controls { display: flex; gap: 12px; margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px; }
        button { padding: 12px 28px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(127,119,221,0.4); }
        .btn-secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }
        .step-counter { margin-left: auto; color: var(--text-secondary); font-size: 13px; align-self: center; font-family: var(--font-mono); }

        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); padding: 8px; }
        .tab-btn { background: none; border: none; padding: 12px 24px; color: var(--text-secondary); font-size: 12px; font-weight: 800; cursor: pointer; border-radius: 10px; text-transform: uppercase; }
        .tab-btn.active { color: var(--accent); background: var(--bg-input); }
        .tab-content { display: none; padding: 35px; }
        .tab-content.active { display: block; }
        pre { border-radius: 12px !important; font-size: 14px !important; margin: 0 !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="visualizer-card">
        <div class="header">
            <input id="insVal" type="number" placeholder="Value (e.g. 50)">
            <button class="btn-primary" onclick="doInsert()">Insert</button>
            <button class="btn-secondary" onclick="doExtract()">Extract Max</button>
            <button class="btn-secondary" onclick="resetHeap()">Clear</button>
        </div>

        <div id="info" class="info-box">Heap is empty. Insert a value to start.</div>

        <div class="canvas-viewport" id="viewport">
            <canvas id="heapCanvas"></canvas>
        </div>
        
        <div class="status-rows">
            <div class="data-row">
                <span class="row-label">Array View:</span>
                <div id="arrayRow"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-secondary" onclick="step(-1)">← Back</button>
            <button class="btn-primary" onclick="step(1)">Next Step →</button>
            <span class="step-counter" id="ctr"></span>
        </div>
    </div>
</div>

<script>
    let heap = [];
    let steps = [];
    let curStep = 0;

    const canvas = document.getElementById('heapCanvas');
    const ctx = canvas.getContext('2d');
    const viewport = document.getElementById('viewport');

    function saveStep(h, active, msg) {
        steps.push({ h: [...h], active, msg });
    }

    function doInsert() {
        const val = parseInt(document.getElementById('insVal').value);
        if (isNaN(val)) return;
        steps = []; curStep = 0;
        let h = [...heap];
        h.push(val);
        let i = h.length - 1;
        saveStep(h, i, `New element <b>${val}</b> added at the end (index ${i}).`);
        
        while (i > 0) {
            let p = Math.floor((i-1)/2);
            if (h[p] < h[i]) {
                saveStep(h, i, `Sift Up: ${h[i]} > ${h[p]}. Swapping.`);
                [h[i], h[p]] = [h[p], h[i]];
                i = p;
                saveStep(h, i, `Moved up. Checking property again.`);
            } else {
                saveStep(h, i, `Property satisfied: Parent ${h[p]} >= ${h[i]}.`);
                break;
            }
        }
        heap = h;
        render();
    }

    function doExtract() {
        if (heap.length === 0) return;
        steps = []; curStep = 0;
        let h = [...heap];
        const max = h[0];
        saveStep(h, 0, `Extracting root: <b>${max}</b>.`);
        
        if (h.length > 1) {
            h[0] = h.pop();
            saveStep(h, 0, `Last element moved to root. Starting Sift Down.`);
            let i = 0;
            while (true) {
                let l = 2*i + 1, r = 2*i + 2, largest = i;
                if (l < h.length && h[l] > h[largest]) largest = l;
                if (r < h.length && h[r] > h[largest]) largest = r;
                if (largest !== i) {
                    saveStep(h, i, `Sift Down: Swapping with larger child ${h[largest]}.`);
                    [h[i], h[largest]] = [h[largest], h[i]];
                    i = largest;
                    saveStep(h, i, `Moved down.`);
                } else {
                    saveStep(h, i, `Property restored.`);
                    break;
                }
            }
        } else { h.pop(); }
        heap = h;
        render();
    }

    function draw() {
        const s = steps[curStep] || { h: heap, active: -1 };
        const h = s.h;
        
        const nodeRadius = 28;
        const levelHeight = 80;
        const levels = h.length > 0 ? Math.floor(Math.log2(h.length)) + 1 : 1;
        
        // Динамически считаем ширину канваса на основе количества листьев
        const minWidth = viewport.clientWidth;
        const contentWidth = Math.max(minWidth, Math.pow(2, levels - 1) * 80);
        const contentHeight = Math.max(380, levels * levelHeight + 60);

        const DPR = window.devicePixelRatio || 1;
        canvas.width = contentWidth * DPR;
        canvas.height = contentHeight * DPR;
        canvas.style.width = contentWidth + 'px';
        canvas.style.height = contentHeight + 'px';
        ctx.scale(DPR, DPR);

        ctx.clearRect(0, 0, contentWidth, contentHeight);

        if (h.length === 0) {
            ctx.fillStyle = '#555'; ctx.font = '16px Inter'; ctx.textAlign = 'center';
            ctx.fillText('Heap is empty.', contentWidth/2, contentHeight/2);
            return;
        }

        const pos = h.map((_, i) => {
            const lvl = Math.floor(Math.log2(i+1));
            const nodesInLvl = Math.pow(2, lvl);
            const posInLvl = i - (nodesInLvl - 1);
            return { 
                x: contentWidth * (posInLvl + 0.5) / nodesInLvl, 
                y: 50 + lvl * levelHeight 
            };
        });

        // Линии
        ctx.strokeStyle = '#3e3e42'; ctx.lineWidth = 2;
        for (let i = 0; i < h.length; i++) {
            let l = 2*i+1, r = 2*i+2;
            if (l < h.length) { 
                ctx.beginPath(); ctx.moveTo(pos[i].x, pos[i].y); 
                ctx.lineTo(pos[l].x, pos[l].y); ctx.stroke(); 
            }
            if (r < h.length) { 
                ctx.beginPath(); ctx.moveTo(pos[i].x, pos[i].y); 
                ctx.lineTo(pos[r].x, pos[r].y); ctx.stroke(); 
            }
        }

        // Узлы
        pos.forEach((p, i) => {
            const isActive = i === s.active;
            ctx.beginPath(); ctx.arc(p.x, p.y, nodeRadius, 0, Math.PI*2);
            if (isActive) {
                ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4;
            } else {
                ctx.fillStyle = '#534ab7'; ctx.strokeStyle = '#7f77dd'; ctx.lineWidth = 2;
            }
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = isActive ? '#141416' : '#ffffff';
            ctx.font = 'bold 16px Inter'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(h[i], p.x, p.y);
        });
    }

    function renderDOM() {
        const s = steps[curStep] || { h: heap, active: -1 };
        document.getElementById('info').innerHTML = s.msg || (heap.length ? "Ready." : "Heap is empty.");
        document.getElementById('ctr').textContent = steps.length ? `STEP ${curStep + 1} / ${steps.length}` : "";
        
        const row = document.getElementById('arrayRow');
        row.innerHTML = s.h.map((v, i) => `
            <div class="node-pill visited ${i === s.active ? 'active' : ''}">
                <span class="idx-tag">${i}</span>
                ${v}
            </div>
        `).join('') || '<span style="color:var(--text-secondary)">Empty</span>';
    }

    function render() { draw(); renderDOM(); }
    function step(dir) { if (curStep + dir >= 0 && curStep + dir < steps.length) { curStep += dir; render(); } }
    function resetHeap() { heap = []; steps = []; curStep = 0; render(); }

    window.addEventListener('resize', draw);
    render();

    // Скролл мышкой (drag to scroll)
    let isDown = false, startX, scrollLeft;
    viewport.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - viewport.offsetLeft; scrollLeft = viewport.scrollLeft; });
    viewport.addEventListener('mouseleave', () => isDown = false);
    viewport.addEventListener('mouseup', () => isDown = false);
    viewport.addEventListener('mousemove', (e) => { if(!isDown) return; e.preventDefault(); const x = e.pageX - viewport.offsetLeft; const walk = (x - startX) * 2; viewport.scrollLeft = scrollLeft - walk; });
</script>
</body>
</html>
