<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LIS | Patience Sorting (O(n log n))</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-main: #0f0f11; --bg-card: #18181b; --bg-input: #27272a;
            --text-main: #f4f4f5; --text-secondary: #a1a1aa;
            --accent: #8b5cf6; --border: #3f3f46; --green: #10b981;
            --cell-size: 65px; --gap: 12px;
        }
        body { margin: 0; padding: 25px; font-family: 'Inter', system-ui, sans-serif; background: var(--bg-main); color: var(--text-main); }
        .container { max-width: 900px; margin: 0 auto; }
        
        .visualizer-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; gap: 12px; margin-bottom: 30px; }
        input { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 12px 16px; border-radius: 10px; flex-grow: 1; outline: none; font-family: monospace; font-size: 16px; }
        
        .info-box { background: rgba(139, 92, 246, 0.1); border-left: 4px solid var(--accent); padding: 20px; border-radius: 8px; min-height: 90px; margin-bottom: 40px; line-height: 1.6; }
        .formula { color: #c4b5fd; font-family: monospace; font-weight: bold; background: rgba(139, 92, 246, 0.2); padding: 2px 6px; border-radius: 4px; }

        .array-container { margin-bottom: 50px; }
        .label { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        .row { display: flex; gap: var(--gap); flex-wrap: wrap; justify-content: flex-start; }
        
        .cell { width: var(--cell-size); height: var(--cell-size); display: flex; align-items: center; justify-content: center; background: #27272a; border-radius: 12px; border: 2px solid var(--border); font-size: 20px; font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: var(--text-secondary); position: relative; }
        
        /* Состояния */
        .cell.active-num { border-color: #fff; color: #fff; transform: scale(1.1); box-shadow: 0 0 20px rgba(255,255,255,0.2); z-index: 10; }
        .cell.update { background: var(--green); border-color: #34d399; color: #fff; animation: pop 0.4s; }
        .cell.push { background: var(--accent); border-color: #a78bfa; color: #fff; animation: pop 0.4s; }
        
        @keyframes pop {
            0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); }
        }

        .controls { display: flex; gap: 12px; margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--border); }
        button { padding: 12px 24px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #7c3aed; }
        .btn-secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }
        
        pre { background: #111 !important; border-radius: 12px; padding: 20px !important; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="visualizer-card">
        <div class="header">
            <input id="numsInput" type="text" value="10, 22, 9, 33, 21, 50">
            <button class="btn-primary" onclick="init()">Apply</button>
        </div>

        <div id="info" class="info-box">Press "Next" to start the O(n log n) process.</div>

        <div class="array-container">
            <span class="label">Input (nums)</span>
            <div id="numsRow" class="row"></div>
        </div>

        <div class="array-container">
            <span class="label">Active Tails (LIS piles)</span>
            <div id="tailsRow" class="row"></div>
        </div>

        <div class="controls">
            <button class="btn-secondary" onclick="step(-1)">← Back</button>
            <button class="btn-primary" onclick="step(1)">Next Step →</button>
            <button class="btn-secondary" onclick="init()">Reset</button>
            <div id="stepCounter" style="margin-left: auto; color: var(--text-secondary); align-self: center;"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
    let nums = [], steps = [], curStep = 0;

    function init() {
        const val = document.getElementById('numsInput').value;
        nums = val.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        steps = [{ tails: [], idx: -1, msg: "Algorithm started. The <b>tails</b> array is currently empty." }];
        
        let tails = [];
        for (let i = 0; i < nums.length; i++) {
            let n = nums[i];
            // Binary search (lower_bound)
            let low = 0, high = tails.length;
            while (low < high) {
                let mid = Math.floor((low + high) / 2);
                if (tails[mid] < n) low = mid + 1;
                else high = mid;
            }

            let action = '';
            if (low === tails.length) {
                tails.push(n);
                action = 'push';
                msg = `<b>${n}</b> is greater than all existing tails. <br>Increasing LIS length: <span class="formula">tails.push_back(${n})</span>.`;
            } else {
                tails[low] = n;
                action = 'update';
                msg = `Binary search (lower_bound) found that <b>${n}</b> can replace <b>tails[${low}]</b>. <br>This lowers the threshold for future sequences of length ${low + 1}.`;
            }
            steps.push({ tails: [...tails], idx: i, updateIdx: low, action, msg });
        }
        curStep = 0; render();
    }

    function render() {
        const s = steps[curStep];
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('stepCounter').textContent = `Step ${curStep} / ${steps.length - 1}`;

        // Render nums
        document.getElementById('numsRow').innerHTML = nums.map((n, i) => `
            <div class="cell ${i === s.idx ? 'active-num' : ''}">${n}</div>
        `).join('');

        // Render tails
        document.getElementById('tailsRow').innerHTML = s.tails.map((t, i) => {
            let cls = 'cell';
            if (i === s.updateIdx && curStep > 0) cls += ` ${s.action}`;
            return `<div class="${cls}">${t}</div>`;
        }).join('') || '<div class="cell" style="opacity:0.2">∅</div>';
    }

    function step(dir) { if (curStep + dir >= 0 && curStep + dir < steps.length) { curStep += dir; render(); } }
    init();
</script>
</body>
</html>
