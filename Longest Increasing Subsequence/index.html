<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LIS Matrix Visualizer | AlgoView Lab</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-main: #1a1a1c; --bg-card: #242426; --bg-input: #2d2d30;
            --text-main: #e1e1e3; --text-secondary: #9ba1a6;
            --accent: #7f77dd; --accent-secondary: #1d9e75;
            --border: #3e3e42; --code-bg: #0d0d0f;
        }
        body { margin: 0; padding: 2rem 0; font-family: sans-serif; background: var(--bg-main); color: var(--text-main); }
        .wrap { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        .visualizer-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; }
        .inputs { display: flex; gap: 10px; margin-bottom: 20px; }
        input { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; flex-grow: 1; font-family: monospace; }
        
        button { padding: 8px 15px; border-radius: 6px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: bold; }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }

        /* TABLE STYLES */
        .tbl-wrap { overflow-x: auto; margin-bottom: 30px; border-radius: 12px; border: 1px solid var(--border); background: #111; padding: 10px; }
        table { border-collapse: separate; border-spacing: 4px; margin: 0 auto; }
        th, td { width: 40px; height: 40px; text-align: center; border-radius: 4px; font-size: 13px; transition: 0.2s; }
        
        .head-cell { color: var(--text-secondary); font-weight: bold; background: transparent; }
        .cell { background: var(--bg-card); border: 1px solid var(--border); color: #555; }
        
        /* Состояния ячеек в матрице i/j */
        .cell.active-row { background: rgba(127, 119, 221, 0.1); color: var(--text-secondary); }
        .cell.current-check { border: 2px solid var(--accent); color: white; transform: scale(1.1); z-index: 10; }
        .cell.match-true { background: #085041; color: white; border-color: var(--accent-secondary); }
        .cell.match-false { background: #3d1c1c; color: #a69b9b; }

        /* DP Row */
        .dp-label { font-size: 12px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: block;}
        .dp-row { display: flex; gap: 4px; justify-content: center; padding-top: 10px; border-top: 1px dashed var(--border); }
        .dp-cell { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--bg-input); border-radius: 4px; border: 1px solid var(--border); font-weight: bold; }
        .dp-cell.highlight { border: 2px solid var(--accent-secondary); background: #1d9e7533; }

        .info-box { background: var(--bg-main); border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 20px; min-height: 60px; font-size: 14px; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-card">
        <div class="inputs">
            <input id="in1" type="text" value="10, 22, 9, 33, 21, 50, 41, 60">
            <button onclick="rebuild()">Apply</button>
        </div>

        <div class="info-box" id="info">Press Next to start</div>

        <div class="tbl-wrap">
            <div style="text-align: center; color: var(--text-secondary); font-size: 11px; margin-bottom: 10px;">MATRIX: Comparison Nums[i] > Nums[j]</div>
            <div id="matrix-box"></div>
            
            <div style="margin-top: 20px;">
                <span class="dp-label">DP Array (Max Length ending at i)</span>
                <div id="dp-box" class="dp-row"></div>
            </div>
        </div>

        <div class="inputs">
            <button class="secondary" onclick="go(-1)">Back</button>
            <button onclick="go(1)">Next Step</button>
            <button class="secondary" onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto; color: var(--text-secondary); font-size: 12px; align-self: center;"></span>
        </div>
    </div>
</div>

<script>
    let nums = [], steps = [], cur = 0;

    function rebuild() {
        nums = document.getElementById('in1').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        steps = [];
        let dp = Array(nums.length).fill(1);
        
        // Step 0: Init
        steps.push({ i: 0, j: -1, dp: [...dp], msg: "Initialize: Every element starts with LIS length 1." });

        for (let i = 1; i < nums.length; i++) {
            for (let j = 0; j < i; j++) {
                let updated = false;
                if (nums[i] > nums[j]) {
                    if (dp[j] + 1 > dp[i]) {
                        dp[i] = dp[j] + 1;
                        updated = true;
                    }
                }
                steps.push({
                    i, j, dp: [...dp],
                    compare: nums[i] > nums[j],
                    updated,
                    msg: nums[i] > nums[j] 
                        ? `Nums[${i}](${nums[i]}) > Nums[${j}](${nums[j]}). DP[${i}] updated to ${dp[i]}.`
                        : `Nums[${i}](${nums[i]}) <= Nums[${j}](${nums[j]}). No update.`
                });
            }
        }
        cur = 0; render();
    }

    function render() {
        if (!steps.length) return;
        const s = steps[cur];
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('ctr').textContent = `Step ${cur} / ${steps.length - 1}`;

        // Render Matrix
        let html = '<table><tr><th></th>';
        nums.forEach(n => html += `<th class="head-cell">${n}</th>`);
        html += '</tr>';

        for (let i = 0; i < nums.length; i++) {
            html += `<tr><td class="head-cell">${nums[i]}</td>`;
            for (let j = 0; j < nums.length; j++) {
                let cls = 'cell';
                let content = '';
                
                if (j < i) { // Мы смотрим только "прошлое"
                    if (i === s.i) cls += ' active-row';
                    if (i === s.i && j === s.j) cls += ' current-check';
                    
                    // Показываем результат сравнения для уже пройденных шагов
                    const stepAtIJ = steps.find(st => st.i === i && st.j === j);
                    const stepIndex = steps.indexOf(stepAtIJ);
                    
                    if (stepIndex <= cur && stepIndex !== -1) {
                        const isMatch = nums[i] > nums[j];
                        cls += isMatch ? ' match-true' : ' match-false';
                        content = isMatch ? '✓' : '×';
                    }
                } else if (i === j) {
                    content = '\\';
                }
                
                html += `<td class="${cls}">${content}</td>`;
            }
            html += '</tr>';
        }
        document.getElementById('matrix-box').innerHTML = html + '</table>';

        // Render DP Row
        let dpHtml = '';
        s.dp.forEach((val, idx) => {
            let cls = 'dp-cell';
            if (idx === s.i) cls += ' highlight';
            dpHtml += `<div class="${cls}">${val}</div>`;
        });
        document.getElementById('dp-box').innerHTML = dpHtml;
    }

    function go(dir) { if (cur + dir >= 0 && cur + dir < steps.length) { cur += dir; render(); } }
    function resetAll() { cur = 0; render(); }

    rebuild();
</script>
</body>
</html>
