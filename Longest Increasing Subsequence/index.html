<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LIS Lab | Step-by-Step Educational Tool</title>
    <style>
        :root {
            --bg-main: #141416; --bg-card: #1e1e22; --bg-input: #26262a;
            --text-main: #e1e1e3; --text-secondary: #9ba1a6;
            --accent: #7f77dd; --border: #313136; --green: #1d9e75;
            --cell-size: 50px; --gap: 12px;
            --line-hl: rgba(127, 119, 221, 0.3);
        }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); }
        .container { max-width: 950px; margin: 0 auto; }
        
        .visualizer-card { background: var(--bg-card); border-radius: 20px; padding: 30px; border: 1px solid var(--border); margin-bottom: 24px; }
        .header { display: flex; gap: 10px; margin-bottom: 30px; }
        input { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; flex-grow: 1; outline: none; }
        
        .info-box { background: rgba(255,255,255,0.03); border-left: 4px solid var(--accent); padding: 18px; border-radius: 4px; min-height: 60px; margin-bottom: 40px; font-size: 15px; line-height: 1.5; }
        .info-box b { color: #fff; }
        .info-box .formula { color: var(--accent); font-family: monospace; font-weight: bold; }

        .workspace { display: flex; justify-content: center; gap: 30px; }
        .main-grid { display: flex; flex-direction: column; gap: var(--gap); }
        .row-container { display: flex; gap: var(--gap); align-items: center; }
        
        .cell { width: var(--cell-size); height: var(--cell-size); display: flex; align-items: center; justify-content: center; background: #26262a; border-radius: 10px; border: 1px solid var(--border); font-size: 14px; transition: 0.15s; color: var(--text-secondary); box-sizing: border-box; }
        .cell.empty { background: transparent; border: none; }
        .cell.label { color: var(--text-secondary); font-weight: bold; background: transparent; border: none; }

        .active-white { border: 2px solid #fff !important; color: #fff !important; transform: scale(1.05); z-index: 10; }
        .match { background: #085041 !important; border-color: var(--green) !important; color: #fff !important; }
        .no-match { background: #3d1c1c !important; opacity: 0.5; }
        
        .dp-cell { background: var(--bg-input); font-weight: bold; color: var(--text-main); }
        .dp-target { border: 2px solid var(--accent) !important; color: var(--accent) !important; box-shadow: 0 0 15px rgba(127,119,221,0.3); }
        .dp-title { color: var(--accent); font-size: 11px; font-weight: 800; text-align: center; width: var(--cell-size); }

        /* Tabs System */
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); padding: 6px; }
        .tab-btn { background: none; border: none; padding: 12px 20px; color: var(--text-secondary); font-size: 11px; font-weight: 800; cursor: pointer; border-radius: 8px; text-transform: uppercase; }
        .tab-btn.active { color: var(--accent); background: var(--bg-input); }
        .tab-content { display: none; padding: 25px; line-height: 1.6; }
        .tab-content.active { display: block; }

        /* CODE FORMATTING */
        .code-view { font-family: 'JetBrains Mono', monospace; font-size: 13px; background: #0d0d0f; padding: 20px; border-radius: 10px; color: #9ba1a6; white-space: pre; overflow-x: auto; line-height: 1.5; }
        .code-line { display: block; padding: 0 10px; border-left: 3px solid transparent; }
        .code-line.active { background: var(--line-hl); border-left-color: var(--accent); color: #fff; }
        .indent { display: inline-block; width: 24px; }
        .kw { color: #cc99cd; } .fn { color: #e67e22; } .cm { color: #777; }

        .controls { display: flex; gap: 10px; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        button.main-btn { padding: 12px 24px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: 600; cursor: pointer; }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px; cursor: pointer;}
    </style>
</head>
<body>

<div class="container">
    <div class="visualizer-card">
        <div class="header">
            <input id="numsInput" type="text" value="10, 22, 9, 33, 21, 50">
            <button class="main-btn" onclick="init()">Apply</button>
        </div>

        <div id="info" class="info-box">Ready. Press "Next Step".</div>

        <div class="workspace">
            <div id="visual-area" class="main-grid"></div>
        </div>

        <div class="controls">
            <button class="secondary" onclick="step(-1)">← Back</button>
            <button class="main-btn" id="nextBtn" onclick="step(1)">Next Step →</button>
            <button class="secondary" onclick="init()">Reset</button>
            <div id="stepCounter" style="margin-left: auto; color: var(--text-secondary); font-size: 12px; align-self: center;"></div>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchTab(this, 'cpp')">C++</button>
        </div>
        <div id="theory" class="tab-content active">
            <h3 style="margin-top:0">Longest Increasing Subsequence (LIS)</h3>
            <p>Finds the length of the longest subsequence where elements are in increasing order.</p>
        </div>
        <div id="python" class="tab-content">
            <div class="code-view" id="python-code"></div>
        </div>
        <div id="cpp" class="tab-content">
            <div class="code-view" id="cpp-code"></div>
        </div>
    </div>
</div>

<script>
    const codeDb = {
        python: `<span class="code-line" data-l="1"><span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="fn">len</span>(nums)):</span>` +
                `<span class="code-line" data-l="2"><span class="indent"></span><span class="kw">for</span> j <span class="kw">in</span> <span class="fn">range</span>(i):</span>` +
                `<span class="code-line" data-l="3"><span class="indent"></span><span class="indent"></span><span class="kw">if</span> nums[i] &gt; nums[j]:</span>` +
                `<span class="code-line" data-l="4"><span class="indent"></span><span class="indent"></span><span class="indent"></span>dp[i] = <span class="fn">max</span>(dp[i], dp[j] + 1)</span>`,
        cpp:    `<span class="code-line" data-l="1"><span class="kw">for</span> (<span class="kw">int</span> i = 0; i &lt; n; i++) {</span>` +
                `<span class="code-line" data-l="2"><span class="indent"></span><span class="kw">for</span> (<span class="kw">int</span> j = 0; j &lt; i; j++) {</span>` +
                `<span class="code-line" data-l="3"><span class="indent"></span><span class="indent"></span><span class="kw">if</span> (nums[i] &gt; nums[j]) {</span>` +
                `<span class="code-line" data-l="4"><span class="indent"></span><span class="indent"></span><span class="indent"></span>dp[i] = max(dp[i], dp[j] + 1);</span>` +
                `<span class="code-line" data-l="5"><span class="indent"></span><span class="indent"></span>}</span>` +
                `<span class="code-line" data-l="6"><span class="indent"></span>}</span>` +
                `<span class="code-line" data-l="7">}</span>`
    };

    let nums = [], steps = [], curStep = 0, activeTab = 'theory';

    function switchTab(btn, id) {
        activeTab = id;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active'); 
        document.getElementById(id).classList.add('active');
        if (id !== 'theory') {
            document.getElementById(id + '-code').innerHTML = codeDb[id];
        }
        syncCode();
    }

    function init() {
        nums = document.getElementById('numsInput').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        let dp = Array(nums.length).fill(1);
        steps = [{ i: 0, j: -1, dp: [...dp], line: 1, msg: "Initializing base case..." }];

        for (let i = 0; i < nums.length; i++) {
            for (let j = 0; j < i; j++) {
                let isMatch = nums[i] > nums[j];
                if (isMatch) dp[i] = Math.max(dp[i], dp[j] + 1);
                
                steps.push({ 
                    i, j, dp: [...dp], isMatch, 
                    line: isMatch ? 4 : 3,
                    msg: isMatch ? `<b>${nums[i]} > ${nums[j]}</b>: Updating DP[${i}]` : `<b>${nums[i]} ≤ ${nums[j]}</b>: No update.` 
                });
            }
        }
        curStep = 0; 
        document.getElementById('python-code').innerHTML = codeDb.python;
        document.getElementById('cpp-code').innerHTML = codeDb.cpp;
        render();
    }

    function syncCode() {
        if (activeTab === 'theory') return;
        const container = document.getElementById(activeTab + '-code');
        if (!container) return;
        
        container.querySelectorAll('.code-line').forEach(l => l.classList.remove('active'));
        const s = steps[curStep];
        if (s) {
            const line = container.querySelector(`[data-l="${s.line}"]`);
            if (line) line.classList.add('active');
        }
    }

    function render() {
        const s = steps[curStep];
        const container = document.getElementById('visual-area');
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('stepCounter').textContent = `Step ${curStep} / ${steps.length - 1}`;

        let html = '<div class="row-container"><div class="cell label">i \\ j</div>';
        nums.forEach((n, idx) => html += `<div class="cell label ${idx === s.j ? 'active-white' : ''}">${n}</div>`);
        html += '<div style="width: 40px;"></div><div class="dp-title">DP</div></div>';

        for (let i = 0; i < nums.length; i++) {
            html += `<div class="row-container">`;
            html += `<div class="cell label ${i === s.i ? 'active-white' : ''}">${nums[i]}</div>`;
            for (let j = 0; j < nums.length; j++) {
                let cls = 'cell', content = '';
                if (j < i) {
                    const stIdx = steps.findIndex(x => x.i === i && x.j === j);
                    if (stIdx !== -1 && stIdx <= curStep) {
                        content = steps[stIdx].dp[i];
                        cls += steps[stIdx].isMatch ? ' match' : ' no-match';
                    } else content = '1';
                    if (i === s.i && j === s.j) cls += ' active-white';
                } else cls += ' empty';
                html += `<div class="${cls}">${content}</div>`;
            }
            html += `<div style="width: 40px;"></div>`;
            let dpCls = 'cell dp-cell' + (i === s.i ? ' dp-target' : '') + (i === s.j ? ' active-white' : '');
            html += `<div class="${dpCls}">${s.dp[i]}</div></div>`;
        }
        container.innerHTML = html;
        syncCode();
    }

    function step(dir) { if (curStep + dir >= 0 && curStep + dir < steps.length) { curStep += dir; render(); } }
    init();
</script>
</body>
</html>
