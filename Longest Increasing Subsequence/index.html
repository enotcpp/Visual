<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LIS Lab | Step-by-Step Logic</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-main: #141416; --bg-card: #1e1e22; --bg-input: #26262a;
            --text-main: #e1e1e3; --text-secondary: #9ba1a6;
            --accent: #7f77dd; --border: #313136; --green: #1d9e75;
            --cell-size: 50px; --gap: 12px;
        }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); }
        .container { max-width: 950px; margin: 0 auto; }
        
        .visualizer-card { background: var(--bg-card); border-radius: 20px; padding: 30px; border: 1px solid var(--border); margin-bottom: 24px; }
        .header { display: flex; gap: 10px; margin-bottom: 30px; }
        input { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; flex-grow: 1; outline: none; }
        
        .info-box { background: rgba(255,255,255,0.03); border-left: 4px solid var(--accent); padding: 18px; border-radius: 4px; min-height: 60px; margin-bottom: 40px; font-size: 15px; line-height: 1.5; }
        .info-box b { color: #fff; }
        .info-box .formula { color: var(--accent); font-family: monospace; font-weight: bold; }

        .workspace { display: flex; justify-content: center; gap: 30px; }
        .main-grid { display: flex; flex-direction: column; gap: var(--gap); }
        .row-container { display: flex; gap: var(--gap); align-items: center; }
        
        .cell { width: var(--cell-size); height: var(--cell-size); display: flex; align-items: center; justify-content: center; background: #26262a; border-radius: 10px; border: 1px solid var(--border); font-size: 14px; transition: 0.15s; color: var(--text-secondary); box-sizing: border-box; }
        .cell.empty { background: transparent; border: none; }
        .cell.label { color: var(--text-secondary); font-weight: bold; background: transparent; border: none; }

        .active-white { border: 2px solid #fff !important; color: #fff !important; transform: scale(1.05); z-index: 10; }
        .match { background: #085041 !important; border-color: var(--green) !important; color: #fff !important; }
        .no-match { background: #3d1c1c !important; opacity: 0.5; }
        
        .dp-cell { background: var(--bg-input); font-weight: bold; color: var(--text-main); }
        .dp-target { border: 2px solid var(--accent) !important; color: var(--accent) !important; box-shadow: 0 0 15px rgba(127,119,221,0.3); }
        .dp-title { color: var(--accent); font-size: 11px; font-weight: 800; text-align: center; width: var(--cell-size); }

        .controls { display: flex; gap: 10px; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        button.main-btn { padding: 12px 24px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: 600; cursor: pointer; }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px; cursor: pointer;}
    </style>
</head>
<body>

<div class="container">
    <div class="visualizer-card">
        <div class="header">
            <input id="numsInput" type="text" value="10, 22, 9, 33, 21, 50">
            <button class="main-btn" onclick="init()">Apply</button>
        </div>

        <div id="info" class="info-box">Нажмите "Next Step", чтобы начать разбор алгоритма.</div>

        <div class="workspace">
            <div id="visual-area" class="main-grid"></div>
        </div>

        <div class="controls">
            <button class="secondary" onclick="step(-1)">← Back</button>
            <button class="main-btn" id="nextBtn" onclick="step(1)">Next Step →</button>
            <button class="secondary" onclick="init()">Reset</button>
            <div id="stepCounter" style="margin-left: auto; color: var(--text-secondary); font-size: 12px; align-self: center;"></div>
        </div>
    </div>
</div>

<script>
    let nums = [], steps = [], curStep = 0;

    function init() {
        nums = document.getElementById('numsInput').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        let dp = Array(nums.length).fill(1);
        steps = [{ 
            i: 0, j: -1, dp: [...dp], 
            msg: `<b>Базовый случай:</b> Первый элемент <b>${nums[0]}</b>. <br>Его собственная длина LIS всегда равна 1. Записываем <span class="formula">DP[0] = 1</span>.` 
        }];

        for (let i = 1; i < nums.length; i++) {
            for (let j = 0; j < i; j++) {
                let oldVal = dp[i];
                let isMatch = nums[i] > nums[j];
                let msg = "";

                if (isMatch) {
                    let candidate = dp[j] + 1;
                    dp[i] = Math.max(dp[i], candidate);
                    msg = `Сравниваем <b>${nums[i]}</b> (i) и <b>${nums[j]}</b> (j). <br>` +
                          `Так как <b>${nums[i]} > ${nums[j]}</b>, берем длину из <span class="formula">DP[j] (${dp[j]}) + 1</span>. <br>` +
                          `Результат <span class="formula">${candidate}</span> записываем в <b>DP[${i}]</b>.`;
                } else {
                    msg = `Сравниваем <b>${nums[i]}</b> (i) и <b>${nums[j]}</b> (j). <br>` +
                          `Число <b>${nums[i]}</b> не больше <b>${nums[j]}</b>. Пропускаем, <b>DP[${i}]</b> остается прежним.`;
                }
                
                steps.push({ i, j, dp: [...dp], isMatch, msg });
            }
        }
        curStep = 0; render();
    }

    function render() {
        const s = steps[curStep];
        const container = document.getElementById('visual-area');
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('stepCounter').textContent = `Step ${curStep} / ${steps.length - 1}`;

        let html = '';
        
        // Header
        html += `<div class="row-container"><div class="cell label">i \\ j</div>`;
        nums.forEach((n, idx) => html += `<div class="cell label ${idx === s.j ? 'active-white' : ''}">${n}</div>`);
        html += `<div style="width: 40px;"></div><div class="dp-title">DP</div></div>`;

        // Rows
        for (let i = 0; i < nums.length; i++) {
            html += `<div class="row-container">`;
            html += `<div class="cell label ${i === s.i ? 'active-white' : ''}">${nums[i]}</div>`;
            
            for (let j = 0; j < nums.length; j++) {
                let cls = 'cell', content = '';
                if (j < i) {
                    const stIdx = steps.findIndex(x => x.i === i && x.j === j);
                    if (stIdx !== -1 && stIdx <= curStep) {
                        content = steps[stIdx].dp[i];
                        cls += steps[stIdx].isMatch ? ' match' : ' no-match';
                    } else content = '1';
                    if (i === s.i && j === s.j) cls += ' active-white';
                } else {
                    cls += ' empty';
                }
                html += `<div class="${cls}">${content}</div>`;
            }

            html += `<div style="width: 40px;"></div>`;

            let dpCls = 'cell dp-cell';
            if (i === s.i) dpCls += ' dp-target'; // Куда пишем
            if (i === s.j && s.i !== 0) dpCls += ' active-white'; // Откуда берем (+1)
            html += `<div class="${dpCls}">${s.dp[i]}</div></div>`;
        }
        
        container.innerHTML = html;
    }

    function step(dir) { if (curStep + dir >= 0 && curStep + dir < steps.length) { curStep += dir; render(); } }
    init();
</script>
</body>
</html>
