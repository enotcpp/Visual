<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LIS Final Lab | AlgoView</title>
    <style>
        :root {
            --bg-main: #141416; --bg-card: #1e1e22; --bg-input: #26262a;
            --text-main: #e1e1e3; --text-secondary: #9ba1a6;
            --accent: #7f77dd; --border: #313136; --green: #1d9e75;
            --cell-size: 50px; --gap: 12px;
        }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); }
        .container { max-width: 900px; margin: 0 auto; }
        .visualizer-card { background: var(--bg-card); border-radius: 20px; padding: 30px; border: 1px solid var(--border); }
        
        .workspace { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .main-grid { display: flex; flex-direction: column; gap: var(--gap); }
        .row-container { display: flex; gap: var(--gap); align-items: center; min-height: var(--cell-size); }
        
        .cell { width: var(--cell-size); height: var(--cell-size); display: flex; align-items: center; justify-content: center; background: #26262a; border-radius: 12px; border: 1px solid var(--border); font-size: 14px; transition: 0.2s; color: var(--text-secondary); box-sizing: border-box; }
        .label { color: var(--text-secondary); font-weight: bold; background: transparent; border: none; }

        /* Состояния ячеек */
        .active-white { border: 2px solid #fff !important; color: #fff !important; transform: scale(1.05); z-index: 10; }
        .match { background: #085041 !important; border-color: var(--green) !important; color: #fff !important; }
        .no-match { background: #3d1c1c !important; opacity: 0.5; }
        
        /* DP колонки */
        .dp-cell { background: var(--bg-input); font-weight: bold; color: var(--text-main); }
        .dp-target { border: 2px solid var(--accent) !important; color: var(--accent) !important; box-shadow: 0 0 15px rgba(127,119,221,0.3); }
        .dp-title { color: var(--accent); font-size: 11px; font-weight: 800; text-align: center; margin-bottom: 5px; }

        .controls { display: flex; gap: 10px; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        button { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .main-btn { background: var(--accent); color: white; }
        .secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div class="visualizer-card">
        <div id="info" style="margin-bottom: 20px; color: var(--text-secondary);">
            Каждая строка <b>i</b> вычисляет значение <b>DP[i]</b>, сравнивая текущее число с предыдущими.
        </div>

        <div class="workspace">
            <div id="visual-area" class="main-grid"></div>
        </div>

        <div class="controls">
            <button class="secondary" onclick="step(-1)">← Back</button>
            <button class="main-btn" onclick="step(1)">Next Step →</button>
            <button class="secondary" onclick="init()">Reset</button>
        </div>
    </div>
</div>

<script>
    let nums = [10, 22, 9, 33, 21, 50];
    let steps = [], curStep = 0;

    function init() {
        steps = [{ i: 0, j: 0, dp: [1, 1, 1, 1, 1, 1], msg: "Начинаем с первого элемента. DP[0] = 1." }];
        let dp = [1, 1, 1, 1, 1, 1];

        for (let i = 1; i < nums.length; i++) {
            for (let j = 0; j <= i; j++) {
                if (j < i) {
                    let isMatch = nums[i] > nums[j];
                    if (isMatch) dp[i] = Math.max(dp[i], dp[j] + 1);
                    steps.push({ i, j, dp: [...dp], isMatch, msg: isMatch ? `Обновляем DP[${i}] через DP[${j}]` : "Пропускаем..." });
                } else {
                    steps.push({ i, j, dp: [...dp], isMatch: null, msg: `Завершили строку для ${nums[i]}.` });
                }
            }
        }
        curStep = 0; render();
    }

    function render() {
        const s = steps[curStep];
        const container = document.getElementById('visual-area');
        let html = '';
        
        // Header
        html += `<div class="row-container"><div class="cell label">i \\ j</div>`;
        nums.forEach((n, idx) => html += `<div class="cell label ${idx === s.j ? 'active-white' : ''}">${n}</div>`);
        html += `<div style="width: 40px;"></div><div class="dp-title">DP</div></div>`;

        // Rows
        for (let i = 0; i < nums.length; i++) {
            html += `<div class="row-container">`;
            html += `<div class="cell label ${i === s.i ? 'active-white' : ''}">${nums[i]}</div>`;
            
            for (let j = 0; j < nums.length; j++) {
                if (j <= i) {
                    let cls = 'cell', val = '1';
                    const stIdx = steps.findIndex(x => x.i === i && x.j === j);
                    if (stIdx !== -1 && stIdx <= curStep) {
                        val = steps[stIdx].dp[i];
                        if (i !== j) cls += steps[stIdx].isMatch ? ' match' : ' no-match';
                    }
                    if (i === s.i && j === s.j) cls += ' active-white';
                    html += `<div class="${cls}">${val}</div>`;
                } else {
                    html += `<div style="width: var(--cell-size);"></div>`; // Просто пустота вместо ячеек
                }
            }

            html += `<div style="width: 40px;"></div>`;
            let dpCls = 'cell dp-cell';
            if (i === s.i) dpCls += ' dp-target';
            if (i === s.j && s.i !== s.j) dpCls += ' active-white';
            html += `<div class="${dpCls}">${s.dp[i]}</div></div>`;
        }
        container.innerHTML = html;
    }

    function step(dir) { if (curStep + dir >= 0 && curStep + dir < steps.length) { curStep += dir; render(); } }
    init();
</script>
</body>
</html>
