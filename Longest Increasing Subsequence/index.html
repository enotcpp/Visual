<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LIS Visualizer | AlgoView</title>
    <style>
        :root {
            --bg-main: #141416; --bg-card: #1e1e22; --bg-input: #26262a;
            --text-main: #e1e1e3; --text-secondary: #9ba1a6;
            --accent: #7f77dd; --border: #313136; --orange: #e67e22; --green: #1d9e75;
        }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); }
        .container { max-width: 800px; margin: 0 auto; background: var(--bg-card); border-radius: 20px; padding: 30px; border: 1px solid var(--border); }
        
        /* Header & Info */
        .header { display: flex; gap: 10px; margin-bottom: 20px; }
        input { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; flex-grow: 1; outline: none; }
        .info-box { background: rgba(255,255,255,0.03); border-left: 4px solid var(--accent); padding: 20px; border-radius: 4px; min-height: 50px; margin-bottom: 30px; font-size: 15px; }

        /* Unified Grid System */
        .grid-row { display: grid; grid-template-columns: 50px repeat(auto-fill, 45px); gap: 8px; justify-content: center; margin-bottom: 8px; }
        .cell { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: #26262a; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; transition: all 0.2s; position: relative; }
        .label { color: var(--text-secondary); font-weight: bold; background: transparent; border: none; }

        /* Statuses */
        .cell.compare-target { border: 2px solid #fff !important; z-index: 10; transform: scale(1.05); } /* White border for active compare */
        .cell.match { background: #085041; border-color: var(--green); }
        .cell.no-match { background: #3d1c1c; opacity: 0.6; }
        
        .dp-cell { background: var(--bg-input); font-weight: bold; }
        .dp-cell.writing { border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(127, 119, 221, 0.4); color: var(--accent); }
        .dp-cell.source { border: 2px solid var(--orange); color: var(--orange); }

        .controls { display: flex; gap: 10px; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        button { padding: 10px 20px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <input id="numsInput" type="text" value="10, 22, 9, 33, 21, 50">
        <button onclick="init()">Apply</button>
    </div>

    <div id="info" class="info-box">Press "Next Step" to begin.</div>

    <div id="matrix-container"></div>

    <div style="height: 2px; background: var(--border); margin: 25px 0;"></div>

    <div id="dp-container"></div>
    <p style="text-align: center; font-size: 11px; color: var(--text-secondary); margin-top: 10px; letter-spacing: 2px;">DP ARRAY (MAX LENGTHS)</p>

    <div class="controls">
        <button class="secondary" onclick="step(-1)">← Back</button>
        <button id="nextBtn" onclick="step(1)">Next Step →</button>
        <button class="secondary" onclick="init()">Reset</button>
        <div id="stepCounter" style="margin-left: auto; color: var(--text-secondary); font-size: 13px; align-self: center;"></div>
    </div>
</div>

<script>
    let nums = [], steps = [], curStep = 0;

    function init() {
        nums = document.getElementById('numsInput').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        steps = [];
        let dp = Array(nums.length).fill(1);
        
        // Initial state
        steps.push({ i: 0, j: -1, dp: [...dp], msg: "Initialize: Every element has a minimum LIS length of 1." });

        for (let i = 1; i < nums.length; i++) {
            for (let j = 0; j < i; j++) {
                let prevVal = dp[i];
                let isGreater = nums[i] > nums[j];
                if (isGreater) dp[i] = Math.max(dp[i], dp[j] + 1);
                
                steps.push({
                    i, j, dp: [...dp],
                    isGreater,
                    updated: dp[i] !== prevVal,
                    msg: isGreater 
                        ? `Checking: <b>${nums[i]} > ${nums[j]}</b>. Updating DP[${i}] = max(current, DP[${j}] + 1) → <b>${dp[i]}</b>`
                        : `Checking: <b>${nums[i]} ≤ ${nums[j]}</b>. No update for DP[${i}].`
                });
            }
        }
        curStep = 0;
        render();
    }

    function render() {
        const s = steps[curStep];
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('stepCounter').textContent = `Step ${curStep} / ${steps.length - 1}`;
        document.getElementById('nextBtn').disabled = curStep >= steps.length - 1;

        // Render Matrix
        let mHtml = `<div class="grid-row"><div class="cell label">i \\ j</div>`;
        nums.forEach(n => mHtml += `<div class="cell label">${n}</div>`);
        mHtml += `</div>`;

        for (let i = 0; i < nums.length; i++) {
            mHtml += `<div class="grid-row"><div class="cell label">${nums[i]}</div>`;
            for (let j = 0; j < nums.length; j++) {
                let cls = 'cell';
                let content = '';
                if (j < i) {
                    const pastStepIdx = steps.findIndex(st => st.i === i && st.j === j);
                    if (pastStepIdx !== -1 && pastStepIdx <= curStep) {
                        cls += steps[pastStepIdx].isGreater ? ' match' : ' no-match';
                        content = steps[pastStepIdx].dp[i];
                    }
                    if (i === s.i && j === s.j) cls += ' compare-target';
                }
                mHtml += `<div class="${cls}">${content}</div>`;
            }
            mHtml += `</div>`;
        }
        document.getElementById('matrix-container').innerHTML = mHtml;

        // Render DP (Aligned with j columns)
        let dpHtml = `<div class="grid-row"><div class="cell label">DP</div>`;
        s.dp.forEach((val, idx) => {
            let cls = 'cell dp-cell';
            if (idx === s.i) cls += ' writing'; // Highlight where we write
            if (idx === s.j) cls += ' source';  // Highlight where we read from
            dpHtml += `<div class="${cls}">${val}</div>`;
        });
        dpHtml += `</div>`;
        document.getElementById('dp-container').innerHTML = dpHtml;
    }

    function step(dir) {
        if (curStep + dir >= 0 && curStep + dir < steps.length) {
            curStep += dir;
            render();
        }
    }

    init();
</script>
</body>
</html>
