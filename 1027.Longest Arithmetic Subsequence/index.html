<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arithmetic Progression DP Visualizer</title>
  <style>
    :root {
      --bg-main: #1a1a1c;
      --bg-card: #242426;
      --bg-input: #2d2d30;
      --text-main: #e1e1e3;
      --text-secondary: #9ba1a6;
      --accent: #7f77dd;
      --accent-secondary: #1d9e75;
      --border: #3e3e42;
    }

    * { box-sizing: border-box; }
    body { 
      margin: 0; padding: 2rem 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: var(--bg-main); color: var(--text-main); 
    }
    
    .wrap { max-width: 900px; margin: 0 auto; padding: 0 20px; }
    
    .inputs { display: flex; gap: 12px; margin: 0 0 20px; align-items: center; flex-wrap: wrap; }
    .inputs label { font-size: 14px; color: var(--text-secondary); }
    .inputs input { 
      background: var(--bg-input); border: 1px solid var(--border);
      color: var(--text-main); padding: 10px 14px; border-radius: 8px;
      width: 300px; font-family: monospace; font-size: 14px;
    }
    
    button {
      padding: 12px 24px; border-radius: 8px; border: none;
      background: var(--accent); color: white; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s; font-size: 14px;
    }
    button:hover { opacity: 0.9; }
    button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }

    .info-box {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; font-size: 14px; line-height: 1.6;
      min-height: 80px; margin: 0 0 20px;
    }
    .info-box b { color: var(--accent); }
    .info-box code { background: #3e3e42; padding: 2px 6px; border-radius: 4px; font-family: monospace; }

    .legend { display: flex; gap: 15px; flex-wrap: wrap; font-size: 12px; color: var(--text-secondary); margin: 0 0 20px; }
    .leg { display: flex; align-items: center; gap: 6px; }
    .ldot { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }

    .nums-row { display: flex; gap: 8px; margin: 0 0 20px; flex-wrap: wrap; }
    .nbox {
      width: 50px; height: 44px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg-card);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 600; transition: all 0.25s;
    }
    .nbox .nidx { font-size: 10px; font-weight: 400; color: var(--text-secondary); }
    .nbox.hi-i { border: 2px solid var(--accent); background: #3c3489; color: white; }
    .nbox.hi-j { border: 2px solid var(--accent-secondary); background: #085041; color: white; }

    .tbl-wrap { overflow-x: auto; margin: 0 0 20px; border-radius: 8px; border: 1px solid var(--border); }
    table { border-collapse: separate; border-spacing: 4px; font-size: 12px; min-width: 100%; background: var(--bg-main); table-layout: fixed; }
    
    th { font-size: 11px; color: var(--text-secondary); padding: 8px; background: var(--bg-card); width: 50px; }
    
    /* ФИКСИРОВАННЫЙ ПЕРВЫЙ СТОЛБЕЦ */
    .row-lbl { 
      font-size: 11px; color: var(--text-secondary); 
      text-align: center; padding: 4px; 
      background: var(--bg-card);
      width: 60px; min-width: 60px; max-width: 60px; /* Жесткий размер */
      position: sticky; left: 0; z-index: 2;
    }

    .cell {
      width: 50px; height: 38px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg-card);
      text-align: center; vertical-align: middle; color: var(--text-secondary);
    }
    .cell.has { background: var(--bg-input); color: var(--text-main); font-weight: 500; }
    .cell.updated { background: var(--accent); border: 2px solid white; color: white; font-weight: bold; }
    .cell.cur-i { border: 1.5px solid var(--accent); }
    .cell.cur-j { border: 1.5px solid var(--accent-secondary); }

    .ctrls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .ctr-lbl { font-size: 13px; color: var(--text-secondary); margin-left: auto; }
    
    .res { font-size: 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border); padding-top: 20px; }
    .res-val { font-size: 24px; font-weight: bold; color: var(--accent); }
    .best-seq { font-size: 14px; color: var(--accent-secondary); margin-top: 8px; font-family: monospace; }
    .err { color: #ff6b6b; font-size: 12px; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="wrap">
  <div class="inputs">
    <label>Sequence:</label>
    <input id="seq-in" type="text" value="20, 1, 15, 3, 10, 5, 8" placeholder="e.g. 1, 3, 5, 2, 4">
    <button onclick="rebuild()">Apply</button>
  </div>
  <div id="err-msg" class="err"></div>

  <div class="legend">
    <div class="leg"><div class="ldot" style="background:#3c3489;border:2px solid var(--accent)"></div>current i</div>
    <div class="leg"><div class="ldot" style="background:#085041;border:2px solid var(--accent-secondary)"></div>current j</div>
    <div class="leg"><div class="ldot" style="background:var(--accent);border:1px solid white"></div>updated cell</div>
  </div>

  <div class="nums-row" id="nums-row"></div>
  <div class="info-box" id="info">Click "Next Step" to begin.</div>
  
  <div class="tbl-wrap"><div id="tbl"></div></div>

  <div class="ctrls">
    <button class="secondary" onclick="go(-1)">← Back</button>
    <button onclick="go(1)">Next Step →</button>
    <button class="secondary" onclick="jumpEnd()">Finish »</button>
    <button class="secondary" onclick="resetAll()">Reset</button>
    <span class="ctr-lbl" id="ctr"></span>
  </div>
  
  <div class="res">Max Length: <span class="res-val" id="resv">—</span></div>
  <div class="best-seq" id="bestseq"></div>
</div>

<script>
let nums = [20, 1, 15, 3, 10, 5, 8];
let n = nums.length;
let DIFFS = [];
let steps = [];
let cur = 0;

function dfmt(d) { return (d >= 0 ? '+' : '') + d; }

function rebuild() {
  const input = document.getElementById('seq-in').value;
  const parsed = input.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
  
  if (parsed.length < 2) {
    document.getElementById('err-msg').textContent = "Please enter at least 2 numbers.";
    return;
  }
  if (parsed.length > 20) {
    document.getElementById('err-msg').textContent = "Max 20 numbers for visualization.";
    return;
  }
  
  document.getElementById('err-msg').textContent = "";
  nums = parsed;
  n = nums.length;
  init();
}

function init() {
  const s = new Set();
  for (let i = 1; i < n; i++) for (let j = 0; j < i; j++) s.add(nums[i] - nums[j]);
  DIFFS = [...s].sort((a, b) => a - b);
  
  steps = buildSteps();
  cur = 0;
  render();
}

function buildSteps() {
  const _steps = [];
  let dp = Array.from({ length: n }, () => ({}));
  let res = 1;
  let bestI = 0, bestD = null;

  _steps.push({ i: -1, j: -1, diff: null, dp: dp.map(o => ({ ...o })), res, msg: 'Starting point. DP table is empty.', bestI, bestD });

  for (let i = 1; i < n; i++) {
    for (let j = 0; j < i; j++) {
      const d = nums[i] - nums[j];
      const prev = dp[j][d] !== undefined ? dp[j][d] : 1;
      const nv = prev + 1;
      
      dp = dp.map(o => ({ ...o }));
      dp[i] = { ...dp[i], [d]: Math.max(dp[i][d] || 1, nv) };
      
      if (dp[i][d] > res) { res = dp[i][d]; bestI = i; bestD = d; }
      
      _steps.push({
        i, j, diff: d,
        dp: dp.map(o => ({ ...o })),
        res, bestI, bestD,
        msg: `Checking <b>nums[${i}]=${nums[i]}</b> and <b>nums[${j}]=${nums[j]}</b>.<br>Common difference <b>d = ${dfmt(d)}</b>.<br>Length at j was ${prev} → New length at i is <b>${nv}</b>.`
      });
    }
  }

  _steps.push({ i: -1, j: -1, diff: null, dp: dp.map(o => ({ ...o })), res, bestI, bestD, msg: `<b>Finished.</b> Max progression length is <b>${res}</b>.` });
  return _steps;
}

function recoverSeq(dp, bi, bd) {
  const seq = [nums[bi]];
  let ci = bi;
  while (true) {
    let found = false;
    for (let j = 0; j < ci; j++) {
      if (nums[ci] - nums[j] === bd && dp[j][bd] === (dp[ci][bd] || 1) - 1) {
        seq.unshift(nums[j]); ci = j; found = true; break;
      }
    }
    if (!found) break;
  }
  return seq;
}

function render() {
  const s = steps[cur];
  document.getElementById('ctr').textContent = `step ${cur} / ${steps.length - 1}`;
  document.getElementById('resv').textContent = cur === 0 ? '—' : s.res;

  if (cur > 0 && s.res > 1 && s.bestD !== null) {
    const seq = recoverSeq(s.dp, s.bestI, s.bestD);
    document.getElementById('bestseq').textContent = `Best sequence found: [${seq.join(', ')}] (diff: ${dfmt(s.bestD)})`;
  } else {
    document.getElementById('bestseq').textContent = '';
  }

  document.getElementById('info').innerHTML = s.msg;

  const nr = document.getElementById('nums-row');
  nr.innerHTML = nums.map((v, idx) => {
    let cls = 'nbox';
    if (idx === s.i) cls += ' hi-i';
    else if (idx === s.j) cls += ' hi-j';
    return `<div class="${cls}"><span class="nidx">[${idx}]</span>${v}</div>`;
  }).join('');

  let html = '<table><thead><tr><th class="row-lbl">i \\ d</th>';
  for (const d of DIFFS) html += `<th>${dfmt(d)}</th>`;
  html += '</tr></thead><tbody>';

  for (let i = 0; i < n; i++) {
    html += `<tr><td class="row-lbl"><b>i=${i}</b><br>(${nums[i]})</td>`;
    for (const d of DIFFS) {
      const val = s.dp[i][d];
      let cls = 'cell';
      if (val !== undefined) cls += ' has';
      if (i === s.i && d === s.diff) cls += ' updated';
      else if (i === s.i) cls += ' cur-i';
      else if (i === s.j && d === s.diff) cls += ' cur-j';
      html += `<td class="${cls}">${val !== undefined ? val : ''}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('tbl').innerHTML = html;
}

function go(dir) { const nx = cur + dir; if (nx >= 0 && nx < steps.length) { cur = nx; render(); } }
function jumpEnd() { cur = steps.length - 1; render(); }
function resetAll() { cur = 0; render(); }

init();
</script>
</body>
</html>
