<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AlgoView Lab | Strict Reverse List</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-main: #141416; --bg-card: #1e1e22; --bg-input: #26262a;
            --text-main: #e1e1e3; --text-secondary: #9ba1a6;
            --accent: #7f77dd; --border: #313136;
            --node-prev: #1D9E75; --node-curr: #ffffff; --node-next: #e5484d;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body { margin: 0; padding: 20px; font-family: sans-serif; background: var(--bg-main); color: var(--text-main); }
        .container { max-width: 1000px; margin: 0 auto; }
        .visualizer-card { background: var(--bg-card); border-radius: 20px; padding: 35px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        input { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 14px; border-radius: 10px; width: 300px; outline: none; font-family: var(--font-mono); }
        .info-box { background: rgba(255,255,255,0.03); border-left: 4px solid var(--node-curr); padding: 20px; margin: 20px 0; min-height: 40px; font-size: 16px; }
        canvas { display: block; background: #111113; border-radius: 16px; border: 1px solid var(--border); width: 100%; height: 400px; }
        .controls { display: flex; gap: 12px; margin-top: 25px; align-items: center; }
        button { padding: 12px 24px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
        .btn-primary { background: var(--node-curr); color: #000; }
        .btn-secondary { background: var(--bg-input); color: white; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div class="visualizer-card">
        <div style="display:flex; gap:10px;">
            <input id="listInput" type="text" value="10, 20, 30, 40, 50">
            <button class="btn-primary" onclick="init()">Build List</button>
        </div>

        <div id="info" class="info-box">Press Next to start reversal.</div>
        
        <canvas id="canvas"></canvas>

        <div class="controls">
            <button class="btn-secondary" onclick="move(-1)">← Back</button>
            <button class="btn-primary" onclick="move(1)">Next Step →</button>
            <span id="stepCtr" style="margin-left:auto; font-family:var(--font-mono)">STEP 0/0</span>
        </div>
    </div>
</div>

<script>
    let steps = [];
    let curIdx = 0;
    const cvs = document.getElementById('canvas');
    const ctx = cvs.getContext('2d');
    const R = 40; // Крупные узлы
    const SPACING = 150; // Большое расстояние

    function init() {
        const vals = document.getElementById('listInput').value.split(',').map(v => v.trim()).filter(v => v);
        steps = generateSteps(vals);
        curIdx = 0;
        draw();
        updateUI();
    }

    function generateSteps(vals) {
        let s = [];
        let nodes = vals.map((v, i) => ({ val: v, next: i < vals.length - 1 ? i + 1 : -1 }));
        let p = -1, c = 0;

        s.push({ nodes: JSON.parse(JSON.stringify(nodes)), c, p, n: -1, msg: "Initial state." });

        while (c !== -1) {
            let n = nodes[c].next;
            s.push({ nodes: JSON.parse(JSON.stringify(nodes)), c, p, n, msg: `Save <b>next</b> (Node ${n !== -1 ? vals[n] : 'NULL'}).` });
            
            nodes[c].next = p;
            s.push({ nodes: JSON.parse(JSON.stringify(nodes)), c, p, n, msg: `Reverse: <b>curr.next = prev</b>. Pointer flips!` });

            p = c;
            s.push({ nodes: JSON.parse(JSON.stringify(nodes)), c, p, n, msg: "Move <b>prev</b> forward." });

            c = n;
            s.push({ nodes: JSON.parse(JSON.stringify(nodes)), c, p, n, msg: "Move <b>curr</b> forward." });
        }
        s.push({ nodes: JSON.parse(JSON.stringify(nodes)), c: -1, p, n: -1, done: true, msg: "Done! <b>prev</b> is the new Head." });
        return s;
    }

    function draw() {
        const W = cvs.offsetWidth, H = cvs.offsetHeight;
        cvs.width = W * 2; cvs.height = H * 2; // HiDPI
        ctx.scale(2, 2);
        ctx.clearRect(0, 0, W, H);

        if (!steps.length) return;
        const state = steps[curIdx];
        const startX = (W - (state.nodes.length - 1) * SPACING) / 2;
        const centerY = H / 2;

        // 1. СТРЕЛКИ (БЕЛЫЕ, ПО ЦЕНТРУ)
        state.nodes.forEach((node, i) => {
            if (node.next !== -1) {
                const x1 = startX + i * SPACING;
                const x2 = startX + node.next * SPACING;
                // Направление
                const isForward = node.next > i;
                const fromX = isForward ? x1 + R : x1 - R;
                const toX = isForward ? x2 - R : x2 + R;
                
                drawArrow(fromX, centerY, toX, centerY, "#FFFFFF");
            }
        });

        // 2. УЗЛЫ
        state.nodes.forEach((node, i) => {
            const x = startX + i * SPACING;
            const y = centerY;
            const isC = state.c === i, isP = state.p === i, isN = state.n === i;

            // Тело узла
            ctx.beginPath();
            ctx.arc(x, y, R, 0, Math.PI * 2);
            
            if (isC) {
                ctx.fillStyle = "#FFFFFF"; ctx.strokeStyle = "#FFFFFF"; 
            } else if (isP) {
                ctx.fillStyle = "#1D9E75"; ctx.strokeStyle = "#1D9E75";
            } else {
                ctx.fillStyle = "#222226"; ctx.strokeStyle = "#333338";
            }
            
            ctx.lineWidth = isN ? 4 : 2;
            if (isN) ctx.strokeStyle = "#e5484d"; // Красная обводка для NEXT
            
            ctx.fill(); ctx.stroke();

            // Текст внутри
            ctx.fillStyle = isC ? "#000" : "#FFF";
            ctx.font = "bold 18px monospace";
            ctx.textAlign = "center";
            ctx.fillText(node.val, x, y + 7);

            // Метки указателей (строго сверху и снизу)
            ctx.font = "bold 12px sans-serif";
            if (isC) { ctx.fillStyle = "#FFF"; ctx.fillText("curr", x, y - R - 15); }
            if (isN) { ctx.fillStyle = "#e5484d"; ctx.fillText("next", x, y - R - (isC ? 32 : 15)); }
            if (isP) { ctx.fillStyle = "#1D9E75"; ctx.fillText(state.done ? "NEW HEAD" : "prev", x, y + R + 25); }
        });
    }

    function drawArrow(x1, y1, x2, y2, color) {
        ctx.strokeStyle = ctx.fillStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        const angle = Math.atan2(y2 - y1, x2 - x1);
        const headSize = 12;
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - headSize * Math.cos(angle - Math.PI/6), y2 - headSize * Math.sin(angle - Math.PI/6));
        ctx.lineTo(x2 - headSize * Math.cos(angle + Math.PI/6), y2 - headSize * Math.sin(angle + Math.PI/6));
        ctx.fill();
    }

    function move(dir) {
        if (curIdx + dir >= 0 && curIdx + dir < steps.length) {
            curIdx += dir; draw(); updateUI();
        }
    }

    function updateUI() {
        document.getElementById('info').innerHTML = steps[curIdx].msg;
        document.getElementById('stepCtr').textContent = `STEP ${curIdx}/${steps.length-1}`;
    }

    window.onresize = draw;
    init();
</script>
</body>
</html>
