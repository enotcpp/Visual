<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AlgoView Lab | Code-Sync Reverse</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-main: #141416; --bg-card: #1e1e22; --bg-input: #26262a;
            --text-main: #e1e1e3; --text-secondary: #9ba1a6;
            --accent: #7f77dd; --border: #313136; 
            --font-sans: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --code-highlight: rgba(127, 119, 221, 0.3);
        }
        body { margin: 0; padding: 20px; font-family: var(--font-sans); background: var(--bg-main); color: var(--text-main); }
        .container { max-width: 1100px; margin: 0 auto; }
        .visualizer-card { background: var(--bg-card); border-radius: 20px; padding: 35px; border: 1px solid var(--border); margin-bottom: 24px; }
        
        canvas { display: block; background: #111113; border-radius: 16px; border: 1px solid var(--border); width: 100%; height: 400px; margin-bottom: 30px; }

        .code-section { position: relative; background: #0d0d0f; border-radius: 12px; padding: 20px; border: 1px solid var(--border); font-family: var(--font-mono); }
        .line { padding: 2px 10px; border-radius: 4px; transition: 0.2s; white-space: pre; font-size: 15px; color: #9ba1a6; }
        .line.active { background: var(--code-highlight); color: #ffffff; box-shadow: inset 4px 0 0 var(--accent); }

        .controls { display: flex; gap: 12px; margin-top: 30px; align-items: center; }
        button { padding: 12px 28px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--bg-input); color: white; border: 1px solid var(--border); }
        .step-counter { margin-left: auto; color: var(--text-secondary); font-family: var(--font-mono); }
    </style>
</head>
<body>

<div class="container">
    <div class="visualizer-card">
        <canvas id="mainCanvas"></canvas>

        <div class="code-section" id="codeBlock">
            <div class="line" data-line="1">ListNode* reverseList(ListNode* head) {</div>
            <div class="line" data-line="2">    ListNode *prev = nullptr, *curr = head;</div>
            <div class="line" data-line="3">    while (curr) {</div>
            <div class="line" data-line="4">        ListNode* next = curr->next; // SAVE</div>
            <div class="line" data-line="5">        curr->next = prev;           // REVERSE</div>
            <div class="line" data-line="6">        prev = curr;                 // SHIFT PREV</div>
            <div class="line" data-line="7">        curr = next;                 // SHIFT CURR</div>
            <div class="line" data-line="8">    }</div>
            <div class="line" data-line="9">    return prev;</div>
            <div class="line" data-line="10">}</div>
        </div>

        <div class="controls">
            <button class="btn-secondary" onclick="move(-1)">← Back</button>
            <button class="btn-primary" onclick="move(1)">Next Step →</button>
            <button class="btn-secondary" onclick="reset()">Reset</button>
            <span class="step-counter" id="stepIdx">STEP: 0 / 0</span>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let steps = [];
    let curIdx = 0;
    const R = 42; // Еще крупнее

    function reset() {
        const vals = [10, 20, 30, 40, 50];
        steps = [];
        let nodes = vals.map((v, i) => ({ val: v, next: i < vals.length - 1 ? i + 1 : -1 }));
        let p = -1, c = 0;

        // Step 0: Init
        steps.push({ nodes: clone(nodes), c, p, n: -1, line: 2 });

        while (c !== -1) {
            steps.push({ nodes: clone(nodes), c, p, n: -1, line: 3 }); // Check while
            
            let n = nodes[c].next;
            steps.push({ nodes: clone(nodes), c, p, n, line: 4 }); // Save next
            
            nodes[c].next = p;
            steps.push({ nodes: clone(nodes), c, p, n, line: 5 }); // Reverse link
            
            p = c;
            steps.push({ nodes: clone(nodes), c, p, n, line: 6 }); // Shift prev
            
            c = n;
            steps.push({ nodes: clone(nodes), c, p, n, line: 7 }); // Shift curr
        }
        steps.push({ nodes: clone(nodes), c: -1, p, n: -1, line: 9 }); // Return
        curIdx = 0;
        draw();
    }

    function draw() {
        const W = canvas.offsetWidth, H = canvas.offsetHeight;
        canvas.width = W * 2; canvas.height = H * 2;
        ctx.scale(2, 2);
        ctx.clearRect(0, 0, W, H);

        const s = steps[curIdx];
        const spacing = 160;
        const startX = (W - (s.nodes.length - 1) * spacing) / 2;
        const centerY = H / 2;

        // 1. СТРЕЛКИ (БЕЛЫЕ)
        s.nodes.forEach((node, i) => {
            if (node.next !== -1) {
                const x1 = startX + i * spacing;
                const x2 = startX + node.next * spacing;
                const isBack = node.next < i;
                drawArrow(isBack ? x1 - R : x1 + R, centerY, isBack ? x2 + R : x2 - R, centerY);
            }
        });

        // 2. УЗЛЫ
        s.nodes.forEach((node, i) => {
            const x = startX + i * spacing;
            const isC = s.c === i, isP = s.p === i, isN = s.n === i;

            // Тело
            ctx.beginPath();
            ctx.arc(x, centerY, R, 0, Math.PI * 2);
            ctx.fillStyle = '#2d2d30';
            ctx.strokeStyle = (isC || isP) ? '#ffffff' : '#444';
            ctx.lineWidth = (isC || isP) ? 3 : 2;
            ctx.fill(); ctx.stroke();

            // Крупный текст
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 24px var(--font-mono)';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(node.val, x, centerY);

            // Указатели сверху (next выше всех)
            ctx.font = 'bold 13px var(--font-sans)';
            if (isP) { ctx.fillStyle = '#7f77dd'; ctx.fillText('PREV', x, centerY - R - 15); }
            if (isC) { ctx.fillStyle = '#ffffff'; ctx.fillText('CURR', x, centerY - R - (isP ? 35 : 15)); }
            if (isN) { ctx.fillStyle = '#e5484d'; ctx.fillText('NEXT', x, centerY - R - (isC && isP ? 55 : isC || isP ? 35 : 15)); }
        });

        updateCodeUI(s.line);
    }

    function drawArrow(x1, y1, x2, y2) {
        ctx.strokeStyle = ctx.fillStyle = '#ffffff';
        ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        const ang = Math.atan2(y2 - y1, x2 - x1);
        ctx.beginPath(); ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - 12 * Math.cos(ang - 0.5), y2 - 12 * Math.sin(ang - 0.5));
        ctx.lineTo(x2 - 12 * Math.cos(ang + 0.5), y2 - 12 * Math.sin(ang + 0.5));
        ctx.fill();
    }

    function updateCodeUI(lineNum) {
        document.querySelectorAll('.line').forEach(l => l.classList.remove('active'));
        const activeLine = document.querySelector(`.line[data-line="${lineNum}"]`);
        if (activeLine) activeLine.classList.add('active');
        document.getElementById('stepIdx').textContent = `STEP: ${curIdx} / ${steps.length - 1}`;
    }

    function move(d) {
        if (curIdx + d >= 0 && curIdx + d < steps.length) { curIdx += d; draw(); }
    }

    function clone(obj) { return JSON.parse(JSON.stringify(obj)); }
    window.onresize = draw;
    reset();
</script>
</body>
</html>
