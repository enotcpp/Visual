<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Binary Search Visualizer - Styled</title>
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --accent-secondary: #1d9e75;
            --border: #3e3e42;
            --range-border: #4a4a4d;
        }

        body { 
            margin: 0; padding: 2rem 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        
        .inputs { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        .inputs label { font-size: 13px; color: var(--text-secondary); }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 8px; font-size: 14px;
            outline: none; transition: border-color 0.2s;
        }
        .inputs input:focus { border-color: var(--accent); }
        
        /* ОБНОВЛЕННЫЙ СТИЛЬ КНОПОК */
        button {
            padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-main); 
            font-weight: 600; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex; align-items: center; justify-content: center;
        }

        button:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
            background: #36363a;
        }

        button:active { transform: translateY(0); }

        button.primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        button.primary:hover {
            background: #8e87e5;
            box-shadow: 0 4px 12px rgba(127, 119, 221, 0.3);
        }

        .info-box {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; min-height: 80px; margin-bottom: 50px;
            border-left: 4px solid var(--accent);
            line-height: 1.5;
        }

        .search-area {
            display: flex; justify-content: center; gap: 10px;
            margin: 60px 0; padding: 20px;
        }

        .cell {
            width: 55px; height: 55px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; position: relative;
            transition: all 0.3s ease;
        }

        .cell.in-range {
            border-color: var(--range-border);
            background: #2a2a2d;
            box-shadow: 0 0 0 2px var(--range-border);
        }

        .cell.out { opacity: 0.2; transform: scale(0.9); }
        .cell.mid-active { border: 3px solid #e67e22; color: #e67e22; }
        .cell.match { background: var(--accent-secondary); border-color: white; color: white; }

        /* Буквы-указатели */
        .ptr {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-size: 11px; font-weight: 800; padding: 2px 6px;
            border-radius: 4px; color: white; z-index: 10;
            text-transform: uppercase;
        }
        .ptr-l { top: -38px; background: var(--accent); }
        .ptr-r { top: -38px; background: #555; }
        .ptr-r.overlap { top: -58px; } 
        .ptr-m { bottom: -38px; background: #e67e22; }

        .ctrls { display: flex; align-items: center; gap: 12px; margin-top: 40px; }
        .ctr-lbl { font-size: 13px; color: var(--text-secondary); margin-left: auto; }
    </style>
</head>
<body>

<div class="wrap">
    <h1>🔍 Binary Search</h1>
    <div class="inputs">
        <input id="arr-input" type="text" value="1, 3, 5, 8, 12, 15, 18, 21" style="width: 250px;">
        <label>Target:</label>
        <input id="target-input" type="number" value="1" style="width: 60px;">
        <button onclick="rebuild()">Update</button>
    </div>

    <div class="info-box" id="info">Ready to search.</div>

    <div class="search-area" id="search-area"></div>

    <div class="ctrls">
        <button onclick="go(-1)">← Back</button>
        <button onclick="go(1)" class="primary">Next Step →</button>
        <button onclick="resetAll()">Reset</button>
        <span class="ctr-lbl" id="ctr"></span>
    </div>
</div>

<script>
let arr = [];
let target = 0;
let steps = [];
let cur = 0;

function rebuild() {
    arr = document.getElementById('arr-input').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x)).sort((a,b)=>a-b);
    target = parseInt(document.getElementById('target-input').value);
    init();
}

function init() {
    steps = [];
    let l = 0, r = arr.length - 1;
    steps.push({ l, r, m: null, msg: "Initial search range defined by <b>L</b> and <b>R</b>." });

    while (l <= r) {
        let m = Math.floor((l + r) / 2);
        steps.push({ l, r, m, msg: `Calculate middle: <b>M = ${m}</b>. Value is <b>${arr[m]}</b>.` });

        if (arr[m] === target) {
            steps.push({ l, r, m, msg: `<b>Match found!</b> Value ${target} is at index ${m}.`, found: true });
            break;
        }
        if (arr[m] < target) {
            let oldL = l;
            l = m + 1;
            steps.push({ l, r, m: null, msg: `${arr[m]} < ${target}. Target is to the right. Move <b>L</b> to ${l}.` });
        } else {
            let oldR = r;
            r = m - 1;
            steps.push({ l, r, m: null, msg: `${arr[m]} > ${target}. Target is to the left. Move <b>R</b> to ${r}.` });
        }
    }
    if (!steps[steps.length-1].found) {
        steps.push({ l: -1, r: -1, m: null, msg: "Target not found in the array." });
    }
    cur = 0;
    render();
}

function render() {
    const s = steps[cur];
    const container = document.getElementById('search-area');
    document.getElementById('info').innerHTML = s.msg;
    document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;
    
    container.innerHTML = '';
    arr.forEach((val, i) => {
        const div = document.createElement('div');
        div.className = 'cell';
        
        if (i >= s.l && i <= s.r) div.classList.add('in-range');
        else div.classList.add('out');
        
        if (i === s.m) div.classList.add('mid-active');
        if (s.found && i === s.m) div.classList.add('match');
        
        div.textContent = val;

        if (i === s.l) div.innerHTML += `<div class="ptr ptr-l">L</div>`;
        if (i === s.r) {
            const isOverlap = (s.l === s.r);
            div.innerHTML += `<div class="ptr ptr-r ${isOverlap ? 'overlap' : ''}">R</div>`;
        }
        if (i === s.m) div.innerHTML += `<div class="ptr ptr-m">M</div>`;

        container.appendChild(div);
    });
}

function go(dir) { if (cur+dir >= 0 && cur+dir < steps.length) { cur+=dir; render(); } }
function resetAll() { cur=0; render(); }

rebuild();
</script>
</body>
</html>
