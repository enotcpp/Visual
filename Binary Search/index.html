<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search | Lab Module</title>
    <style>
        :root {
            --bg-main: #141416;
            --bg-card: #1e1e22;
            --bg-input: #26262a;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --border: #313136;
            --code-bg: #0d0d0f;
        }

        body { 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        /* ВИЗУАЛИЗАТОР (Твой готовый код) */
        .visualizer-section {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 40px;
        }
        .inputs { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 8px; outline: none;
        }
        button {
            padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-main); font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { border-color: var(--accent); }
        button.primary { background: var(--accent); color: white; border: none; }

        .search-area { display: flex; justify-content: center; gap: 10px; margin: 60px 0; }
        .cell {
            width: 55px; height: 55px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; position: relative; transition: all 0.3s;
        }
        .cell.in-range { border-color: #4a4a4d; background: #2a2a2d; }
        .cell.out { opacity: 0.2; transform: scale(0.9); }
        .cell.mid-active { border: 3px solid #e67e22; color: #e67e22; }
        .cell.match { background: #1d9e75; border-color: white; color: white; }

        .ptr { position: absolute; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 800; padding: 2px 6px; border-radius: 4px; color: white; }
        .ptr-l { top: -38px; background: var(--accent); }
        .ptr-r { top: -38px; background: #555; }
        .ptr-m { bottom: -38px; background: #e67e22; }

        /* ПАНЕЛЬ ИНФОРМАЦИИ */
        .lab-info {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
        }
        .tabs-nav {
            display: flex; background: #141416; border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            background: none; border: none; padding: 18px 25px; color: var(--text-secondary);
            font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer;
        }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }

        /* Контекстные переключатели (Правая часть табов) */
        .context-controls {
            margin-left: auto; display: flex; align-items: center; gap: 8px; padding-right: 20px;
        }
        .sub-btn {
            font-size: 10px; padding: 4px 8px; opacity: 0.6; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); border-radius: 4px; cursor: pointer;
        }
        .sub-btn.active { opacity: 1; border-color: var(--accent); color: var(--accent); }

        .tab-content { display: none; padding: 30px; min-height: 200px; }
        .tab-content.active { display: block; }
        pre { background: var(--code-bg); padding: 20px; border-radius: 10px; color: #a6accd; overflow-x: auto; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-section">
        <h1>🔍 Binary Search</h1>
        <div class="inputs">
            <input id="arr-input" type="text" value="1, 3, 5, 8, 12, 15, 18, 21" style="width: 250px;">
            <label>Target:</label>
            <input id="target-input" type="number" value="8" style="width: 60px;">
            <button onclick="rebuild()">Update</button>
        </div>
        <div class="info-box" id="info" style="margin-bottom: 20px; color: var(--text-secondary);">Ready.</div>
        <div class="search-area" id="search-area"></div>
        <div class="inputs">
            <button onclick="go(-1)">← Back</button>
            <button onclick="go(1)" class="primary">Next Step →</button>
            <button onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto; font-size: 13px; color: var(--text-secondary);"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>

            <div class="context-controls" id="context-panel">
                </div>
        </div>

        <div id="theory" class="tab-content active">
            <div id="theory-display"></div>
        </div>

        <div id="python" class="tab-content">
            <pre><code id="python-display"></code></pre>
        </div>

        <div id="cpp" class="tab-content">
            <pre><code id="cpp-display"></code></pre>
        </div>
    </div>
</div>

<script>
    // БАЗА ДАННЫХ
    const db = {
        theory: {
            EN: "<h3>Binary Search</h3><p>Binary search follows the 'divide and conquer' approach...</p>",
            DE: "<h3>Binäre Suche</h3><p>Die binäre Suche folgt dem Prinzip 'Teile und herrsche'...</p>",
            UKR: "<h3>Бінарний пошук</h3><p>Бінарний пошук працює за принципом 'розділяй і володарюй'...</p>",
            RU: "<h3>Бинарный поиск</h3><p>Бинарный поиск работает по принципу 'разделяй и властвуй'...</p>"
        },
        python: {
            v1: "def binary_search(arr, target):\n    # Iterative version\n    ...",
            v2: "def binary_search_rec(arr, target, low, high):\n    # Recursive version\n    ..."
        },
        cpp: {
            v1: "int binarySearch(int arr[], int n, int x) {\n    // Standard version\n    ...",
            v2: "// STL version\nstd::binary_search(arr.begin(), arr.end(), x);"
        }
    };

    let currentMainTab = 'theory';

    function switchMainTab(btn, tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        
        renderContextControls();
    }

    function renderContextControls() {
        const panel = document.getElementById('context-panel');
        panel.innerHTML = '';

        if (currentMainTab === 'theory') {
            ['EN', 'DE', 'UKR', 'RU'].forEach(lang => {
                const b = document.createElement('button');
                b.className = 'sub-btn' + (lang === 'EN' ? ' active' : '');
                b.textContent = lang;
                b.onclick = () => {
                    document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                    b.classList.add('active');
                    document.getElementById('theory-display').innerHTML = db.theory[lang];
                };
                panel.appendChild(b);
            });
            document.getElementById('theory-display').innerHTML = db.theory['EN'];
        } else {
            // Для кода показываем v1, v2
            ['v1', 'v2'].forEach(ver => {
                const b = document.createElement('button');
                b.className = 'sub-btn' + (ver === 'v1' ? ' active' : '');
                b.textContent = ver;
                b.onclick = () => {
                    document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                    b.classList.add('active');
                    document.getElementById(currentMainTab + '-display').textContent = db[currentMainTab][ver];
                };
                panel.appendChild(b);
            });
            document.getElementById(currentMainTab + '-display').textContent = db[currentMainTab]['v1'];
        }
    }

    // --- ЛОГИКА ДИАГРАММЫ (Твой неизмененный код) ---
    let arr = [], target = 0, steps = [], cur = 0;
    function rebuild() {
        arr = document.getElementById('arr-input').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x)).sort((a,b)=>a-b);
        target = parseInt(document.getElementById('target-input').value);
        init();
    }
    function init() {
        steps = []; let l = 0, r = arr.length - 1;
        steps.push({ l, r, m: null, msg: "Initial search range." });
        while (l <= r) {
            let m = Math.floor((l + r) / 2);
            steps.push({ l, r, m, msg: `Check M=${m}` });
            if (arr[m] === target) { steps.push({ l, r, m, msg: "Found!", found: true }); break; }
            if (arr[m] < target) l = m + 1; else r = m - 1;
        }
        cur = 0; render();
    }
    function render() {
        const s = steps[cur];
        const container = document.getElementById('search-area');
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;
        container.innerHTML = '';
        arr.forEach((val, i) => {
            const div = document.createElement('div');
            div.className = 'cell ' + (i >= s.l && i <= s.r ? 'in-range' : 'out');
            if (i === s.m) div.classList.add('mid-active');
            if (s.found && i === s.m) div.classList.add('match');
            div.textContent = val;
            if (i === s.l) div.innerHTML += `<div class="ptr ptr-l">L</div>`;
            if (i === s.r) div.innerHTML += `<div class="ptr ptr-r">R</div>`;
            if (i === s.m) div.innerHTML += `<div class="ptr ptr-m">M</div>`;
            container.appendChild(div);
        });
    }
    function go(dir) { if (cur+dir >= 0 && cur+dir < steps.length) { cur+=dir; render(); } }
    function resetAll() { cur=0; render(); }

    // Инициализация
    renderContextControls();
    rebuild();
</script>
</body>
</html>
