<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upper Bound | AlgoView Lab</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --accent-secondary: #1d9e75;
            --border: #3e3e42;
            --code-bg: #0d0d0f;
            --range-border: #4a4a4d;
            --mid-color: #e67e22;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 2rem 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 850px; margin: 0 auto; padding: 0 20px; }
        
        /* VISUALIZER CARD */
        .visualizer-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 30px;
        }

        .inputs { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 8px; font-size: 14px;
            outline: none; font-family: monospace;
        }
        
        button {
            padding: 10px 18px; border-radius: 8px; border: none;
            background: var(--accent); color: white; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s; font-size: 14px;
        }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }
        button:hover { opacity: 0.9; }

        .info-box {
            background: var(--bg-main); border-left: 4px solid var(--accent);
            padding: 20px; min-height: 85px; margin-bottom: 40px; font-size: 14px; line-height: 1.6;
        }
        .info-box b { color: var(--accent); }

        /* SEARCH AREA */
        .search-area { display: flex; justify-content: center; gap: 10px; margin: 60px 0; min-height: 100px; }

        .cell {
            width: 55px; height: 55px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; position: relative;
            transition: all 0.3s ease;
        }

        .cell.in-range { border-color: var(--range-border); background: #2a2a2d; }
        .cell.out { opacity: 0.2; transform: scale(0.9); }
        .cell.mid-active { border: 3px solid var(--mid-color); color: var(--mid-color); }

        .cell.final-ans { 
            background: var(--accent-secondary) !important; 
            border-color: #fff !important; 
            color: white !important;
            opacity: 1 !important;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(29, 158, 117, 0.6);
            z-index: 10;
        }

        /* POINTERS */
        .ptr {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-size: 10px; font-weight: 800; padding: 2px 6px;
            border-radius: 4px; color: white; z-index: 10;
        }
        .ptr-l { top: -38px; background: var(--accent); }
        .ptr-r { top: -38px; background: #555; }
        .ptr-m { bottom: -38px; background: var(--mid-color); }

        /* LAB TABS */
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; padding: 15px 22px; color: var(--text-secondary); font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }
        .context-controls { margin-left: auto; display: flex; align-items: center; gap: 6px; padding-right: 15px; }
        .sub-btn { font-size: 10px; padding: 4px 8px; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); border-radius: 4px; cursor: pointer; }
        .sub-btn.active { border-color: var(--accent); color: var(--accent); }
        .tab-content { display: none; padding: 25px; line-height: 1.6; }
        .tab-content.active { display: block; }
        pre[class*="language-"] { margin: 0; border-radius: 10px; background: var(--code-bg) !important; font-size: 13px; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-card">
        <div class="inputs">
            <input id="arr-input" type="text" value="1, 2, 4, 4, 4, 6, 7" style="width: 250px;">
            <span style="font-size: 14px; color: var(--text-secondary);">Target:</span>
            <input id="target-input" type="number" value="4" style="width: 60px;">
            <button onclick="rebuild()">Update</button>
        </div>

        <div class="info-box" id="info">Ready to start searching.</div>
        
        <div class="search-area" id="search-area"></div>

        <div class="inputs" style="margin-top: 20px; margin-bottom: 0;">
            <button class="secondary" onclick="go(-1)">< Back</button>
            <button onclick="go(1)">Next Step ></button>
            <button class="secondary" onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto; font-size: 12px; color: var(--text-secondary);"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div class="context-controls" id="context-panel"></div>
        </div>
        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content"><pre><code class="language-python" id="python-display"></code></pre></div>
        <div id="cpp" class="tab-content"><pre><code class="language-cpp" id="cpp-display"></code></pre></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
    const db = {
        theory: {
            EN: "<h3>Upper Bound</h3><p>Finds the first element strictly <b>greater than</b> target. If the target is not found, it returns where the element would be inserted while maintaining order. <b>Complexity:</b> O(log N).</p>",
            RU: "<h3>Upper Bound</h3><p>Находит первый элемент, который строго <b>больше</b> заданного значения. Если искомого значения нет, возвращает позицию, куда его можно вставить, сохранив порядок. <b>Сложность:</b> O(log N).</p>"
        },
        python: {
            v1: "def upper_bound(arr, target):\n    l, r = 0, len(arr) - 1\n    ans = len(arr)\n    while l <= r:\n        mid = (l + r) // 2\n        if arr[mid] > target:\n            ans = mid\n            r = mid - 1\n        else:\n            l = mid + 1\n    return ans",
            v2: "import bisect\n\n# Standard library version\nidx = bisect.bisect_right(arr, target)"
        },
        cpp: {
            v1: "int upper_bound(vector<int>& arr, int target) {\n    int l = 0, r = arr.size() - 1;\n    int ans = arr.size();\n    while (l <= r) {\n        int mid = l + (r - l) / 2;\n        if (arr[mid] > target) {\n            ans = mid;\n            r = mid - 1;\n        } else {\n            l = mid + 1;\n        }\n    }\n    return ans;\n}",
            v2: "#include <algorithm>\n\n// STL version\nauto it = std::upper_bound(arr.begin(), arr.end(), target);"
        }
    };

    let arr = [], target = 0, steps = [], cur = 0, currentMainTab = 'theory';

    function switchMainTab(btn, tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active'); document.getElementById(tabId).classList.add('active');
        renderContextControls();
    }

    function renderContextControls() {
        const panel = document.getElementById('context-panel'); panel.innerHTML = '';
        const list = currentMainTab === 'theory' ? ['EN', 'RU'] : ['v1', 'v2'];
        list.forEach((item, idx) => {
            const b = document.createElement('button');
            b.className = 'sub-btn' + (idx === 0 ? ' active' : '');
            b.textContent = item;
            b.onclick = () => {
                document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                b.classList.add('active'); updateContent(item);
            };
            panel.appendChild(b);
        });
        updateContent(currentMainTab === 'theory' ? 'EN' : 'v1');
    }

    function updateContent(key) {
        const display = document.getElementById(currentMainTab + '-display');
        if (currentMainTab === 'theory') display.innerHTML = db.theory[key];
        else {
            display.textContent = db[currentMainTab][key];
            Prism.highlightElement(display);
        }
    }

    function rebuild() {
        arr = document.getElementById('arr-input').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x)).sort((a,b)=>a-b);
        target = parseInt(document.getElementById('target-input').value);
        init();
    }

    function init() {
        steps = [];
        let l = 0, r = arr.length - 1, ans = arr.length;
        steps.push({ l, r, m: null, ans: null, msg: "Upper Bound starts. Range L to R." });

        while (l <= r) {
            let m = Math.floor((l + r) / 2);
            steps.push({ l, r, m, ans: null, msg: `Check middle: arr[${m}] = ${arr[m]}.` });

            if (arr[m] > target) {
                ans = m; r = m - 1;
                steps.push({ l, r, m: null, ans, msg: `<b>${arr[m]} > ${target}</b>. Potential answer found at ${m}, looking left.` });
            } else {
                l = m + 1;
                steps.push({ l, r, m: null, ans: ans < arr.length ? ans : null, msg: `<b>${arr[m]} ≤ ${target}</b>. Target must be to the right.` });
            }
        }
        steps.push({ l: -1, r: -1, m: null, ans, isFinal: true, msg: `<b>Finished!</b> First element > ${target} at index <b>${ans}</b>.` });
        cur = 0; render();
    }

    function render() {
        const s = steps[cur], container = document.getElementById('search-area');
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;
        container.innerHTML = '';
        
        arr.forEach((val, i) => {
            const div = document.createElement('div');
            div.className = 'cell';
            if (s.isFinal && i === s.ans) div.classList.add('final-ans');
            else if (i === s.ans && !s.isFinal) div.style.borderColor = "var(--accent-secondary)";
            
            if (i >= s.l && i <= s.r) div.classList.add('in-range');
            else if (!div.classList.contains('final-ans')) div.classList.add('out');
            
            if (i === s.m) div.classList.add('mid-active');
            div.textContent = val;

            if (i === s.l) div.innerHTML += `<div class="ptr ptr-l">L</div>`;
            if (i === s.r) div.innerHTML += `<div class="ptr ptr-r">R</div>`;
            if (i === s.m) div.innerHTML += `<div class="ptr ptr-m">M</div>`;
            container.appendChild(div);
        });
    }

    function go(dir) { if (cur+dir >= 0 && cur+dir < steps.length) { cur+=dir; render(); } }
    function resetAll() { cur=0; render(); }

    renderContextControls(); rebuild();
</script>
</body>
</html>
