<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minimum Path Sum | AlgoView Lab</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --accent-secondary: #1d9e75;
            --border: #3e3e42;
            --code-bg: #0d0d0f;
            --highlight-line: rgba(127, 119, 221, 0.3);
        }

        body { margin: 0; padding: 2rem 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg-main); color: var(--text-main); }
        .wrap { max-width: 1000px; margin: 0 auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 450px; gap: 20px; }
        
        /* Левая колонка - Визуализатор */
        .visualizer-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; }
        .grid-container { display: flex; flex-direction: column; align-items: center; gap: 30px; margin: 25px 0; }
        
        #grid-main, #dp-vector { display: grid; grid-template-columns: repeat(var(--cols, 3), 65px); gap: 10px; }
        
        .cell {
            width: 65px; height: 65px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg-card); position: relative; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        .grid-val { font-size: 10px; color: var(--text-secondary); position: absolute; top: 4px; right: 6px; }
        .dp-val { font-size: 20px; font-weight: 800; }
        
        .cell.active { border: 3px solid var(--accent); background: #3c3489; transform: scale(1.05); z-index: 5; }
        .cell.source { border: 2px solid var(--accent-secondary); background: #085041; }
        .cell.path { background: var(--accent); border-color: #fff; }
        .cell.filled { background: var(--bg-input); }
        .vector-cell { height: 50px; border-style: dashed; }
        .vector-cell.filled { border-style: solid; }

        /* Правая колонка - Код */
        .code-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .tabs { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--text-secondary); cursor: pointer; font-weight: bold; font-size: 12px; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        
        pre { margin: 0 !important; padding: 15px !important; font-size: 12px !important; flex-grow: 1; line-height: 1.5; }
        .line-hl { background: var(--highlight-line); display: block; margin: 0 -15px; padding: 0 15px; border-left: 3px solid var(--accent); }

        .controls { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 10px 15px; border-radius: 8px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: 600; }
        button.sec { background: var(--bg-input); color: var(--text-main); }
        
        .info-box { background: var(--bg-main); border-left: 4px solid var(--accent); padding: 12px; margin-bottom: 15px; font-size: 13px; min-height: 60px; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-card">
        <div class="info-box" id="info">Нажмите "Next Step"</div>
        
        <div class="grid-container">
            <div>
                <div style="font-size: 10px; color: var(--text-secondary); margin-bottom: 5px;">2D GRID / DP TABLE</div>
                <div id="grid-main"></div>
            </div>
            <div>
                <div style="font-size: 10px; color: var(--text-secondary); margin-bottom: 5px;">1D DP VECTOR</div>
                <div id="dp-vector"></div>
            </div>
        </div>

        <div class="controls">
            <button class="sec" onclick="go(-1)">Back</button>
            <button onclick="go(1)">Next Step</button>
            <button class="sec" onclick="reset()">Reset</button>
        </div>
        
        <textarea id="grid-input" style="display:none">1,3,1\n1,5,1\n4,2,1</textarea>
    </div>

    <div class="code-section">
        <div class="tabs">
            <button class="tab-btn active" onclick="setLang('cpp')">C++ (O(N) Space)</button>
            <button class="tab-btn" onclick="setLang('python')">Python</button>
        </div>
        <pre id="code-block"></pre>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

<script>
    const codeData = {
        cpp: [
            "class Solution {",
            "public:",
            "    int minPathSum(vector<vector<int>>& grid) {",
            "        int m = grid.size(), n = grid[0].size();",
            "        vector<int> dp(n, grid[0][0]);", // index 4
            "",
            "        for (int j = 1; j < n; j++) ",
            "            dp[j] = dp[j-1] + grid[0][j];", // index 7
            "",
            "        for (int i = 1; i < m; i++) {",
            "            dp[0] += grid[i][0];", // index 10
            "            for (int j = 1; j < n; j++) {",
            "                dp[j] = grid[i][j] + min(dp[j], dp[j-1]);", // index 12
            "            }",
            "        }",
            "        return dp[n-1];", // index 15
            "    }",
            "};"
        ],
        python: [
            "def minPathSum(grid):",
            "    m, n = len(grid), len(grid[0])",
            "    dp = [grid[0][0]] * n",
            "    for j in range(1, n):",
            "        dp[j] = dp[j-1] + grid[0][j]",
            "    for i in range(1, m):",
            "        dp[0] += grid[i][0]",
            "        for j in range(1, n):",
            "            dp[j] = grid[i][j] + min(dp[j], dp[j-1])",
            "    return dp[-1]"
        ]
    };

    let lang = 'cpp';
    let grid = [[1,3,1],[1,5,1],[4,2,1]];
    let steps = [];
    let cur = 0;

    function setLang(l) { 
        lang = l; 
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(l)));
        render(); 
    }

    function buildSteps() {
        const M = grid.length, N = grid[0].length;
        let s = [];
        let dpTable = Array.from({length:M}, ()=>Array(N).fill(null));
        let dpVec = Array(N).fill('∞');

        // Step 0: Init
        dpTable[0][0] = grid[0][0];
        dpVec[0] = grid[0][0];
        s.push({ r:0, c:0, table: dpTable.map(r=>[...r]), vec:[...dpVec], line: {cpp:4, python:2}, msg: "Инициализируем dp[0] значением grid[0][0]" });

        // Step 1: First Row
        for(let j=1; j<N; j++) {
            dpTable[0][j] = dpTable[0][j-1] + grid[0][j];
            dpVec[j] = dpTable[0][j];
            s.push({ r:0, c:j, table: dpTable.map(r=>[...r]), vec:[...dpVec], src:[{r:0,c:j-1}], line: {cpp:7, python:4}, msg: `Заполняем первую строку: dp[${j}] = dp[${j-1}] + grid[0][${j}]` });
        }

        // Step 2: Rows
        for(let i=1; i<M; i++) {
            // First col of row
            dpTable[i][0] = dpTable[i-1][0] + grid[i][0];
            dpVec[0] = dpTable[i][0];
            s.push({ r:i, c:0, table: dpTable.map(r=>[...r]), vec:[...dpVec], src:[{r:i-1,c:0}], line: {cpp:10, python:6}, msg: `Первый элемент строки ${i}: только сверху.` });

            for(let j=1; j<N; j++) {
                dpTable[i][j] = grid[i][j] + Math.min(dpTable[i-1][j], dpTable[i][j-1]);
                dpVec[j] = dpTable[i][j];
                s.push({ r:i, c:j, table: dpTable.map(r=>[...r]), vec:[...dpVec], src:[{r:i-1,c:j}, {r:i,c:j-1}], line: {cpp:12, python:8}, msg: `Сравниваем: сверху (был в dp[${j}]) и слева (уже в dp[${j-1}])` });
            }
        }

        // Final path
        let path = []; let r = M-1, c = N-1;
        while(r>=0 && c>=0) {
            path.push({r,c});
            if(r==0 && c==0) break;
            if(r==0) c--; else if(c==0) r--;
            else (dpTable[r-1][c] < dpTable[r][c-1]) ? r-- : c--;
        }
        s.push({ r:M-1, c:N-1, table: dpTable.map(r=>[...r]), vec:[...dpVec], path, line: {cpp:15, python:9}, msg: "Путь найден!" });
        return s;
    }

    function render() {
        const step = steps[cur];
        const M = grid.length, N = grid[0].length;
        document.getElementById('info').innerHTML = step.msg;

        // Grid
        const gridEl = document.getElementById('grid-main');
        gridEl.style.setProperty('--cols', N);
        gridEl.innerHTML = step.table.flatMap((row, r) => row.map((val, c) => {
            let cls = 'cell';
            if(val !== null) cls += ' filled';
            if(r === step.r && c === step.c && !step.path) cls += ' active';
            if(step.src?.some(s => s.r === r && s.c === c)) cls += ' source';
            if(step.path?.some(p => p.r === r && p.c === c)) cls += ' path';
            return `<div class="${cls}"><div class="grid-val">${grid[r][c]}</div><div class="dp-val">${val||''}</div></div>`;
        })).join('');

        // Vector
        const vecEl = document.getElementById('dp-vector');
        vecEl.style.setProperty('--cols', N);
        vecEl.innerHTML = step.vec.map((val, idx) => {
            let cls = 'cell vector-cell';
            if(val !== '∞') cls += ' filled';
            if(idx === step.c && !step.path) cls += ' active';
            return `<div class="${cls}"><div class="dp-val">${val}</div></div>`;
        }).join('');

        // Code Highlight
        const codeBlock = document.getElementById('code-block');
        const lines = codeData[lang].map((l, i) => i === step.line[lang] ? `<span class="line-hl">${l}</span>` : l).join('\n');
        codeBlock.innerHTML = `<code class="language-${lang}">${lines}</code>`;
        Prism.highlightElement(codeBlock.querySelector('code'));
    }

    function go(d) { cur = Math.max(0, Math.min(steps.length-1, cur + d)); render(); }
    function reset() { cur = 0; render(); }

    steps = buildSteps();
    render();
</script>
</body>
</html>
