<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minimum Path Sum | AlgoView Lab</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --accent-secondary: #1d9e75;
            --border: #3e3e42;
            --code-bg: #0d0d0f;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 2rem 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        .visualizer-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .inputs { display: flex; gap: 15px; margin-bottom: 25px; align-items: flex-end; }
        textarea { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: var(--text-main); padding: 12px; border-radius: 10px;
            width: 250px; height: 80px; font-family: 'JetBrains Mono', monospace; font-size: 13px; resize: none; outline: none;
        }
        
        button {
            padding: 10px 20px; border-radius: 8px; border: none;
            background: var(--accent); color: white; font-weight: 700; cursor: pointer;
            transition: 0.2s ease; font-size: 14px;
        }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .info-box {
            background: var(--bg-main); border-left: 4px solid var(--accent);
            padding: 16px; min-height: 85px; margin-bottom: 25px; font-size: 14px; line-height: 1.6;
        }

        .section-label {
            font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--text-secondary); margin-bottom: 12px; font-weight: 800;
        }

        /* GRID & VECTOR */
        .grid-container { display: flex; flex-direction: column; align-items: center; gap: 35px; margin-bottom: 30px; }
        #grid-main, #dp-vector {
            display: grid;
            grid-template-columns: repeat(var(--cols, 3), 75px);
            gap: 12px;
        }
        
        .cell {
            width: 75px; height: 75px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg-card);
            position: relative; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }
        
        .grid-val { font-size: 11px; color: var(--text-secondary); position: absolute; top: 6px; right: 8px; }
        .dp-val { font-size: 22px; font-weight: 800; color: var(--text-main); }
        
        .cell.filled { background: var(--bg-input); }
        .cell.active { 
            border: 3px solid var(--accent); 
            background: #3c3489; 
            transform: scale(1.1); z-index: 10;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .cell.source { border: 2.5px solid var(--accent-secondary); background: #085041; }
        .cell.path { background: #5c54c7; border-color: #fff; box-shadow: 0 0 15px var(--accent); }

        .vector-cell { height: 65px; border-style: dashed; background: transparent; }
        .vector-cell.filled { border-style: solid; background: var(--bg-input); border-color: var(--accent-secondary); }

        /* TABS */
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; padding: 15px 22px; color: var(--text-secondary); font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }
        .context-controls { margin-left: auto; display: flex; align-items: center; gap: 6px; padding-right: 15px; }
        .sub-btn { font-size: 10px; padding: 4px 8px; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); border-radius: 4px; cursor: pointer; }
        .sub-btn.active { border-color: var(--accent); color: var(--accent); }
        .tab-content { display: none; padding: 25px; }
        .tab-content.active { display: block; }
        pre[class*="language-"] { margin: 0 !important; border-radius: 12px; background: var(--code-bg) !important; font-size: 13px; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-card">
        <div class="inputs">
            <textarea id="grid-input">1,3,1
1,5,1
4,2,1</textarea>
            <button onclick="rebuild()">Update Grid</button>
        </div>

        <div class="info-box" id="info">Готов к работе.</div>

        <div class="grid-container">
            <div>
                <div class="section-label">2D DP Table</div>
                <div id="grid-main"></div>
            </div>

            <div>
                <div class="section-label">1D DP Vector (Space Optimized)</div>
                <div id="dp-vector"></div>
            </div>
        </div>

        <div class="inputs" style="margin-top: 20px; margin-bottom: 0;">
            <button class="secondary" onclick="go(-1)">< Back</button>
            <button onclick="go(1)">Next Step ></button>
            <button class="secondary" onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto; font-size: 12px; color: var(--text-secondary);"></span>
        </div>
        
        <div style="margin-top: 20px;">
            <span style="color:var(--text-secondary)">Min Path Sum:</span>
            <span id="resv" style="font-size: 28px; font-weight: 800; color: var(--accent-secondary); margin-left: 10px;">—</span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div class="context-controls" id="context-panel"></div>
        </div>
        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content"><pre><code class="language-python" id="python-display"></code></pre></div>
        <div id="cpp" class="tab-content"><pre><code class="language-cpp" id="cpp-display"></code></pre></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
    const db = {
        theory: {
            EN: "<h3>Minimum Path Sum</h3><p>The space-optimized approach uses a 1D vector. <code>dp[j]</code> represents the minimum path sum to the current cell. It is updated using its own previous value (from the cell above) and <code>dp[j-1]</code> (from the cell to the left).</p>",
            RU: "<h3>Минимальная сумма пути</h3><p>Оптимизация по памяти $O(N)$ использует одномерный вектор. Значение <code>dp[j]</code> обновляется «на месте»: оно одновременно хранит результат для клетки сверху (до обновления) и становится результатом для текущей клетки после сложения.</p>"
        },
        python: {
            v1: "def minPathSum(grid):\n    C = len(grid[0])\n    dp = [float('inf')] * C\n    dp[0] = 0\n    for row in grid:\n        for c in range(C):\n            if c == 0: dp[c] += row[c]\n            else: dp[c] = min(dp[c], dp[c-1]) + row[c]\n    return dp[-1]",
            v2: "# Classic 2D DP\ndef minPathSum2D(grid):\n    R, C = len(grid), len(grid[0])\n    for i in range(R):\n        for j in range(C):\n            if i == 0 and j == 0: continue\n            elif i == 0: grid[i][j] += grid[i][j-1]\n            elif j == 0: grid[i][j] += grid[i-1][j]\n            else: grid[i][j] += min(grid[i-1][j], grid[i][j-1])\n    return grid[-1][-1]"
        },
        cpp: {
            v1: `class Solution {
public:
    int minPathSum(vector<vector<int>>& grid) 
    {
        int m = grid.size();
        int n = grid[0].size();
        vector<int> dp(n, grid[0][0]);

        // Инициализируем первую строку
        for (int j = 1; j < n; j++) dp[j] = dp[j - 1] + grid[0][j];

        for (int i = 1; i < m; i++) {
            // Первый элемент строки может прийти только сверху
            dp[0] += grid[i][0]; 
            for (int j = 1; j < n; j++) {
                // Выбираем: либо сверху (dp[j]), либо слева (dp[j-1])
                dp[j] = grid[i][j] + min(dp[j], dp[j - 1]);
            }
        }
        return dp[n - 1];        
    }
};`,
            v2: `// In-place O(1) space optimization
int minPathSum(vector<vector<int>>& grid) {
    int m = grid.size(), n = grid[0].size();
    for (int i = 0; i < m; i++) {
        for (int j = 0; j < n; j++) {
            if (i == 0 && j == 0) continue;
            if (i == 0) grid[i][j] += grid[i][j-1];
            else if (j == 0) grid[i][j] += grid[i-1][j];
            else grid[i][j] += min(grid[i-1][j], grid[i][j-1]);
        }
    }
    return grid[m-1][n-1];
}`
        }
    };

    let grid = [[1,3,1],[1,5,1],[4,2,1]], steps = [], cur = 0, currentMainTab = 'theory';

    function switchMainTab(btn, tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active'); document.getElementById(tabId).classList.add('active');
        renderContextControls();
    }

    function renderContextControls() {
        const panel = document.getElementById('context-panel'); panel.innerHTML = '';
        const list = currentMainTab === 'theory' ? ['EN', 'RU'] : ['v1', 'v2'];
        list.forEach((item, idx) => {
            const b = document.createElement('button');
            b.className = 'sub-btn' + (idx === 0 ? ' active' : '');
            b.textContent = item;
            b.onclick = () => {
                document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                b.classList.add('active'); updateContent(item);
            };
            panel.appendChild(b);
        });
        updateContent(currentMainTab === 'theory' ? 'EN' : 'v1');
    }

    function updateContent(key) {
        const display = document.getElementById(currentMainTab + '-display');
        if (currentMainTab === 'theory') display.innerHTML = db.theory[key];
        else {
            display.textContent = db[currentMainTab][key];
            Prism.highlightElement(display);
        }
    }

    function rebuild() {
        const text = document.getElementById('grid-input').value.trim();
        try {
            const newGrid = text.split('\n').map(r => r.split(',').map(v => parseInt(v.trim())).filter(v => !isNaN(v)));
            if (newGrid.length > 0) { grid = newGrid; init(); }
        } catch(e) { alert("Format error"); }
    }

    function init() { steps = buildSteps(); cur = 0; render(); }

    function buildSteps() {
        const R = grid.length, C = grid[0].length;
        let _steps = [];
        let dpTable = Array.from({length: R}, () => Array(C).fill(null));
        let dpVec = Array(C).fill('∞');

        _steps.push({ r:-1, c:-1, dpTable: dpTable.map(row=>[...row]), dpVec: [...dpVec], sources:[], msg: "Начало: инициализация 1D вектора." });

        for (let r = 0; r < R; r++) {
            for (let c = 0; c < C; c++) {
                let sources = [];
                if (r === 0 && c === 0) {
                    dpTable[r][c] = grid[0][0];
                } else {
                    let fromTop = r > 0 ? dpTable[r-1][c] : Infinity;
                    let fromLeft = c > 0 ? dpTable[r][c-1] : Infinity;
                    if (r > 0) sources.push({r: r-1, c});
                    if (c > 0) sources.push({r, c: c-1});
                    dpTable[r][c] = grid[r][c] + Math.min(fromTop, fromLeft);
                }
                dpVec[c] = dpTable[r][c];

                _steps.push({ 
                    r, c, 
                    dpTable: dpTable.map(row=>[...row]), 
                    dpVec: [...dpVec],
                    sources, 
                    msg: `Шаг [${r},${c}]: <code>dp[${c}]</code> обновлен значением <b>${dpTable[r][c]}</b>` 
                });
            }
        }

        let path = [];
        let cr = R - 1, cc = C - 1;
        while (cr >= 0 && cc >= 0) {
            path.push({r: cr, c: cc});
            if (cr === 0 && cc === 0) break;
            if (cr === 0) cc--;
            else if (cc === 0) cr--;
            else (dpTable[cr-1][cc] < dpTable[cr][cc-1]) ? cr-- : cc--;
        }
        _steps.push({ r: R-1, c: C-1, dpTable: dpTable.map(row=>[...row]), dpVec: [...dpVec], sources:[], path, done: true, msg: "<b>Готово!</b> Минимальный путь найден." });
        return _steps;
    }

    function render() {
        const s = steps[cur], R = grid.length, C = grid[0].length;
        document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('resv').textContent = s.done ? s.dpTable[R-1][C-1] : '...';

        const viz = document.getElementById('grid-main');
        viz.style.setProperty('--cols', C);
        let html = '';
        for (let r = 0; r < R; r++) {
            for (let c = 0; c < C; c++) {
                let cls = 'cell';
                if (s.dpTable[r][c] !== null) cls += ' filled';
                if (r === s.r && c === s.c && !s.done) cls += ' active';
                if (s.sources.some(src => src.r === r && src.c === c)) cls += ' source';
                if (s.path && s.path.some(p => p.r === r && p.c === c)) cls += ' path';
                html += `<div class="${cls}"><div class="grid-val">${grid[r][c]}</div><div class="dp-val">${s.dpTable[r][c] !== null ? s.dpTable[r][c] : ''}</div></div>`;
            }
        }
        viz.innerHTML = html;

        const vecViz = document.getElementById('dp-vector');
        vecViz.style.setProperty('--cols', C);
        let vHtml = '';
        s.dpVec.forEach((v, idx) => {
            let cls = 'cell vector-cell';
            if (v !== '∞') cls += ' filled';
            if (idx === s.c && !s.done) cls += ' active';
            vHtml += `<div class="${cls}"><div class="grid-val">dp[${idx}]</div><div class="dp-val">${v}</div></div>`;
        });
        vecViz.innerHTML = vHtml;
    }

    function go(dir) { if (cur+dir >= 0 && cur+dir < steps.length) { cur+=dir; render(); } }
    function resetAll() { cur = 0; render(); }

    renderContextControls(); init();
</script>
</body>
</html>
