<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadane's Algorithm | Lab Module</title>
    <style>
        :root {
            --bg-main: #141416;
            --bg-card: #1e1e22;
            --bg-input: #26262a;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd; /* Purple */
            --accent-soft: rgba(127, 119, 221, 0.1);
            --border: #313136;
            --code-bg: #0d0d0f;
            --pos: #1d9e75; /* Green */
            --neg: #e74c3c; /* Red */
            --highlight: #e67e22; /* Orange for selection */
        }

        body { 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        /* VISUALIZER SECTION */
        .visualizer-section {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 40px;
        }
        .inputs { display: flex; gap: 12px; margin-bottom: 25px; align-items: center; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 8px; outline: none; flex-grow: 1;
            font-family: monospace; font-size: 14px;
        }
        button {
            padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-main); font-weight: 600;
            cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        button:hover { border-color: var(--accent); }
        button.primary { background: var(--accent); color: white; border: none; }

        /* STATS PANEL */
        .stats-panel {
            display: flex; justify-content: flex-end; gap: 20px; margin-bottom: 20px;
        }
        .stat-item { text-align: right; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; font-weight: 800; }
        .stat-val { font-size: 22px; font-weight: 800; color: white; font-family: monospace; }
        .stat-val.new-max { color: var(--accent); animation: pulse-blue 0.5s; }

        /* KADANE AREA (Two honest grids) */
        .viz-container { display: flex; flex-direction: column; gap: 20px; margin: 40px 0; }
        .row-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-secondary); margin-bottom: 10px; font-weight: 800; }
        
        .grid-area { display: flex; justify-content: center; gap: 10px; }
        
        .cell {
            width: 55px; height: 55px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; font-family: monospace; transition: all 0.2s;
            color: var(--text-main); position: relative;
        }
        
        /* Cell States */
        .grid-a .cell.active { border: 3px solid var(--highlight); color: var(--highlight); transform: scale(1.05); }
        .grid-a .cell.in-global-max { border: 3px solid var(--accent); box-shadow: 0 0 15px rgba(127, 119, 221, 0.4); }

        .grid-dp .cell { opacity: 0.3; }
        .grid-dp .cell.processed { opacity: 1; border-color: #4a4a4d; background: #2a2a2d; }
        .grid-dp .cell.current-dp { opacity: 1; border: 3px solid var(--accent); background: var(--bg-card); color: var(--accent); font-weight: 800; }
        
        /* Highlight selection logic: continuation (green) or reset (red/orange) */
        .cell.option-continue { border: 2px solid var(--pos); color: var(--pos); }
        .cell.option-reset { border: 2px solid var(--highlight); color: var(--highlight); }
        .cell.selected-option { background: var(--accent-soft); }

        /* Pointer labels */
        .ptr { position: absolute; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; color: white; text-transform: uppercase; }
        .ptr-i { top: -35px; background: var(--highlight); }

        /* LAB INFO PANEL */
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn {
            background: none; border: none; padding: 18px 25px; color: var(--text-secondary);
            font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer;
        }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }

        .context-controls { margin-left: auto; display: flex; align-items: center; gap: 8px; padding-right: 20px; }
        .sub-btn {
            font-size: 10px; padding: 4px 8px; opacity: 0.6; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); border-radius: 4px; cursor: pointer;
        }
        .sub-btn.active { opacity: 1; border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

        .tab-content { display: none; padding: 30px; min-height: 200px; line-height: 1.6; }
        .tab-content.active { display: block; }
        pre { background: var(--code-bg); padding: 20px; border-radius: 10px; color: #a6accd; overflow-x: auto; font-size: 14px; }
        .math { color: var(--accent); font-family: monospace; font-weight: bold; }

        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(127, 119, 221, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(127, 119, 221, 0); }
            100% { box-shadow: 0 0 0 0 rgba(127, 119, 221, 0); }
        }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-section">
        <h1>∑ Kadane's Algorithm</h1>
        
        <div class="inputs">
            <input id="arr-input" type="text" value="-2, 1, -3, 4, -1, 2, 1, -5, 4">
            <button onclick="rebuild()" class="primary">Load Data</button>
            <button onclick="randomize()">Random</button>
        </div>
        
        <div class="stats-panel">
            <div class="stat-item">
                <div class="stat-label">Global Max (res)</div>
                <div class="stat-val" id="global-max-val">-∞</div>
            </div>
        </div>

        <div class="info-box" id="info" style="margin-bottom: 20px; color: var(--text-secondary); border-left: 3px solid var(--border); padding-left: 15px; font-size: 14px; min-height: 40px;">Ready.</div>
        
        <div class="viz-container">
            <div>
                <div class="row-label">Input Array A</div>
                <div class="grid-area grid-a" id="input-grid"></div>
            </div>
            <div>
                <div class="row-label">DP Array (current_max sums)</div>
                <div class="grid-area grid-dp" id="dp-grid"></div>
            </div>
        </div>

        <div class="inputs" style="margin-top: 30px; margin-bottom: 0;">
            <button onclick="go(-1)">← Back</button>
            <button onclick="go(1)" class="primary">Next Step →</button>
            <button onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto; font-size: 13px; color: var(--text-secondary);"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div class="context-controls" id="context-panel"></div>
        </div>

        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content"><pre><code id="python-display"></code></pre></div>
        <div id="cpp" class="tab-content"><pre><code id="cpp-display"></code></pre></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
    // DATABASE - Strict Lab Module Style
    const db = {
        theory: {
            v1: "<h3>Maximum Subarray Sum</h3><p>Kadane's algorithm is a greedy/dynamic programming approach that finds the maximum sum of a contiguous subarray in $O(N)$ time. In one pass, it decides at each element whether to append it to the current running sum or start a new subarray from that element.</p><p>Formula: <span class='math'>cur = max(A[i], cur + A[i])</span></p>",
            v2: "<h3>Why it works</h3><p>The core idea is that if the running sum (<span class='math'>cur</span>) becomes negative, it will only drag down any future elements. In that case, we are better off starting a 'fresh' subarray from the current element <span class='math'>A[i]</span>.</p>"
        },
        python: {
            v1: "def kadane(A):\n    # Standard greedy implementation\n    res = A[0] # Global max\n    cur = A[0] # Local max\n    \n    for i in range(1, len(A)):\n        # Decide: continue chain or start new\n        cur = max(A[i], cur + A[i])\n        res = max(res, cur)\n        \n    return res",
            v2: "# Concise version\ndef kadane(A):\n    cur = res = A[0]\n    for x in A[1:]: \n        cur = max(x, cur + x)\n        res = max(res, cur)\n    return res"
        },
        cpp: {
            v1: "// Using vectors\nint maxSubArray(vector<int>& nums) {\n    int res = nums[0], cur = nums[0];\n    for(int i = 1; i < nums.size(); i++) {\n        // Formula applied directly\n        cur = max(nums[i], cur + nums[i]);\n        res = max(res, cur);\n    }\n    return res;\n}"
        }
    };

    let currentMainTab = 'theory';
    function switchMainTab(btn, tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        renderContextControls();
    }

    function renderContextControls() {
        const panel = document.getElementById('context-panel');
        panel.innerHTML = '';
        const options = currentMainTab === 'theory' ? ['Theory', 'Greedy Logic'] : ['v1', 'v2'];
        
        options.forEach((opt, idx) => {
            const b = document.createElement('button');
            b.className = 'sub-btn' + (idx === 0 ? ' active' : '');
            b.textContent = opt;
            b.onclick = () => {
                document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                b.classList.add('active');
                if (currentMainTab === 'theory') {
                    document.getElementById('theory-display').innerHTML = (opt === 'Theory' ? db.theory.v1 : db.theory.v2);
                } else {
                    document.getElementById(currentMainTab + '-display').textContent = db[currentMainTab][opt] || db[currentMainTab]['v1'];
                    Prism.highlightElement(document.getElementById(currentMainTab + '-display'));
                }
            };
            panel.appendChild(b);
        });
        // Initial load
        if (currentMainTab === 'theory') document.getElementById('theory-display').innerHTML = db.theory.v1;
        else {
            document.getElementById(currentMainTab + '-display').textContent = db[currentMainTab][options[0]];
            Prism.highlightElement(document.getElementById(currentMainTab + '-display'));
        }
    }

    // VISUALIZATION LOGIC
    let A = [], dp = [], steps = [], cur = 0;

    function randomize() {
        const r = Array.from({length: 10}, () => Math.floor(Math.random() * 21) - 10);
        document.getElementById('arr-input').value = r.join(', ');
        rebuild();
    }

    function rebuild() {
        A = document.getElementById('arr-input').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        // Simple default if empty
        if (A.length === 0) A = [1, -2, 3];
        init();
    }

    function init() {
        steps = [];
        dp = Array(A.length).fill(null);
        let res = A[0];
        let cur_max = A[0];
        let start = 0, end = 0, tempStart = 0;

        // Step 0: Initialize
        steps.push({ 
            idx: -1, cur_max: null, global_max: null, dp: [...dp], range: [-1, -1],
            msg: "Initialize: <span class='math'>res = A[0]</span>, <span class='math'>cur = A[0]</span>." 
        });

        dp[0] = A[0];
        // Step 0.5: First element handled
        steps.push({ 
            idx: 0, cur_max: A[0], global_max: A[0], dp: [...dp], range: [0, 0],
            msg: `Index 0: Local max is <b>${A[0]}</b>. res is initialized.` 
        });

        for (let i = 1; i < A.length; i++) {
            let prev_cur_max = cur_max;
            let valA = A[i];
            
            // --- SUB-STEP: DECISION TIME ---
            let choiceContinue = prev_cur_max + valA;
            let choiceReset = valA;
            
            let reset = (choiceReset > choiceContinue);
            cur_max = Math.max(choiceReset, choiceContinue);
            dp[i] = cur_max;

            // Step I.1: The Comparison
            steps.push({
                idx: i, cur_max: cur_max, global_max: res, dp: [...dp], range: [start, end], 
                comp: { continue: choiceContinue, reset: choiceReset, resetSelected: reset, currentK: i },
                msg: `Step ${i}: Is it better to start a new subarray (<b>${choiceReset}</b>) or continue (<b>${choiceContinue}</b>)?`
            });

            // Step I.2: The decision and assignment
            let stepMsg = `Local max is now <b>${cur_max}</b>. `;
            if (reset) {
                stepMsg += `Started new chain from A[${i}].`;
                tempStart = i;
            } else {
                stepMsg += `Extended chain.`;
            }

            let newGlobalMax = false;
            if (cur_max > res) {
                res = cur_max;
                start = tempStart;
                end = i;
                newGlobalMax = true;
                stepMsg += ` <span style="color:var(--accent)">New Global Max res = <b>${res}</b>!</span>`;
            }

            steps.push({
                idx: i, cur_max: cur_max, global_max: res, dp: [...dp], range: [start, end],
                highlightGlobalMax: newGlobalMax,
                msg: stepMsg
            });
        }
        steps.push({ ...steps[steps.length-1], done: true, msg: `Finished! Maximum Subarray Sum is <b>${res}</b>.` });
        cur = 0; render();
    }

    function createGrid(containerId, data, s, type) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if (!data || data.length === 0) return;

        data.forEach((val, i) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.textContent = val === null ? '' : val;

            if (type === 'A') {
                if (i === s.idx) {
                    cell.classList.add('active');
                    cell.innerHTML += `<div class="ptr ptr-i">A[${i}]</div>`;
                }
                // Check if inside global max range
                if (s.range && i >= s.range[0] && i <= s.range[1]) {
                    cell.classList.add('in-global-max');
                }
                // Highlight comparison options
                if (s.comp && s.comp.currentK === i) {
                    cell.classList.add('option-reset'); // Compare against A[i]
                }
            } else if (type === 'DP') {
                if (val !== null) cell.classList.add('processed');
                if (i === s.idx) cell.classList.add('current-dp');
                
                // Highlight comparison option (previous DP cell)
                if (s.comp && i === s.comp.currentK - 1) {
                    cell.classList.add('option-continue');
                }
            }

            container.appendChild(cell);
        });
    }

    function render() {
        const s = steps[cur];
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;

        // Create grids for A and DP
        createGrid('input-grid', A, s, 'A');
        createGrid('dp-grid', s.dp, s, 'DP');

        // Global Max Panel
        const gMaxEl = document.getElementById('global-max-val');
        gMaxEl.textContent = s.global_max === null ? '-∞' : s.global_max;
        if (s.highlightGlobalMax) gMaxEl.classList.add('new-max');
        else gMaxEl.classList.remove('new-max');
    }

    function go(dir) { if (cur+dir >= 0 && cur+dir < steps.length) { cur+=dir; render(); } }
    function resetAll() { cur=0; render(); }

    renderContextControls();
    rebuild();
</script>
</body>
</html>
