<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadane's Algorithm | Lab Module</title>
    <style>
        :root {
            --bg-main: #141416;
            --bg-card: #1e1e22;
            --bg-input: #26262a;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --border: #313136;
            --pos: #1d9e75; /* Зеленый */
            --highlight: #e67e22; /* Оранжевый */
        }

        body { 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        .visualizer-section {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 40px;
        }

        .inputs { display: flex; gap: 12px; margin-bottom: 25px; align-items: center; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 8px; outline: none; flex-grow: 1;
            font-family: monospace;
        }

        .stats-panel { display: flex; justify-content: flex-end; gap: 25px; margin-bottom: 20px; }
        .stat-item { text-align: right; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: var(--text-secondary); font-weight: 800; }
        .stat-val { font-size: 22px; font-weight: 800; font-family: monospace; }
        .stat-val.orange { color: var(--highlight); }

        .viz-container { display: flex; flex-direction: column; gap: 20px; margin: 40px 0; }
        .row-label { font-size: 11px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 10px; font-weight: 800; }
        .grid-area { display: flex; justify-content: center; gap: 10px; }
        
        .cell {
            width: 55px; height: 55px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; font-family: monospace; transition: 0.2s;
        }
        
        /* Стили для верхнего массива A */
        .grid-a .cell.active { border: 3px solid var(--highlight); }
        .grid-a .cell.in-max-range { border: 3px solid var(--pos); color: var(--pos); }

        /* Стили для нижнего массива DP */
        .grid-dp .cell { opacity: 0.3; }
        .grid-dp .cell.processed { opacity: 1; }
        
        /* ТА САМАЯ ОРАНЖЕВАЯ РАМКА ДЛЯ ЛОКАЛЬНОГО МИНИМУМА */
        .grid-dp .cell.local-min-frame { border: 3px solid var(--highlight); opacity: 1; }
        
        /* Оранжевая заливка для точки сброса (нового старта) */
        .grid-dp .cell.reset-trigger { background: var(--highlight); color: white; border-color: white; opacity: 1; }
        
        /* Зеленая заливка для глобального рекорда */
        .grid-dp .cell.is-global-winner { background: var(--pos); color: white; border-color: white; opacity: 1; }

        button {
            padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-input); color: white; cursor: pointer; font-weight: 600;
        }
        button.primary { background: var(--accent); border: none; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>∑ Kadane's Algorithm</h1>
            <div class="stats-panel">
                <div class="stat-item">
                    <div class="stat-label">Local Min (Start Point)</div>
                    <div class="stat-val orange" id="local-min-display">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Global Max (res)</div>
                    <div class="stat-val" id="global-max-display">0</div>
                </div>
            </div>
        </div>
        
        <div class="inputs">
            <input id="arr-input" type="text" value="-2, 1, -3, 4, -1, 2, 1, -5, 4">
            <button onclick="rebuild()" class="primary">Загрузить</button>
            <button onclick="randomize()">Случайные</button>
        </div>

        <div id="info" style="margin-bottom: 20px; color: var(--text-secondary); border-left: 3px solid var(--border); padding-left: 15px;"></div>
        
        <div class="viz-container">
            <div>
                <div class="row-label">Массив A (Источник)</div>
                <div class="grid-area grid-a" id="input-grid"></div>
            </div>
            <div>
                <div class="row-label">DP Array (Оранжевая рамка: локальный минимум)</div>
                <div class="grid-area grid-dp" id="dp-grid"></div>
            </div>
        </div>

        <div style="display: flex; gap: 12px;">
            <button onclick="go(-1)">← Назад</button>
            <button onclick="go(1)" class="primary">Следующий шаг →</button>
            <button onclick="resetAll()">Сброс</button>
            <span id="step-counter" style="margin-left: auto; align-self: center; color: var(--text-secondary);"></span>
        </div>
    </div>
</div>

<script>
    let A = [];
    let steps = [];
    let currentStep = 0;

    function randomize() {
        const r = Array.from({length: 9}, () => Math.floor(Math.random() * 21) - 10);
        document.getElementById('arr-input').value = r.join(', ');
        rebuild();
    }

    function rebuild() {
        A = document.getElementById('arr-input').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        if (A.length === 0) A = [-2, 1, -3, 4, -1, 2, 1, -5, 4];
        initSteps();
    }

    function initSteps() {
        steps = [];
        let dp = Array(A.length).fill(null);
        let res = A[0];
        let cur_max = A[0];
        let start = 0, end = 0, tempStart = 0;
        let localMinIdx = 0; // Индекс ячейки локального минимума

        // Начальное состояние
        dp[0] = A[0];
        steps.push({
            idx: 0, dp: [...dp], res, range: [0, 0], 
            localMinIdx: 0, reset: false, winnerIdx: 0,
            msg: `Инициализация: res = ${A[0]}`
        });

        for (let i = 1; i < A.length; i++) {
            let restart = (A[i] > cur_max + A[i]);
            
            if (restart) {
                localMinIdx = i - 1; // Предыдущая ячейка была "дном"
                tempStart = i;
                cur_max = A[i];
            } else {
                cur_max += A[i];
            }

            dp[i] = cur_max;

            if (cur_max > res) {
                res = cur_max;
                start = tempStart;
                end = i;
            }

            steps.push({
                idx: i, 
                dp: [...dp], 
                res, 
                range: [start, end], 
                localMinIdx: localMinIdx, 
                reset: restart,
                winnerIdx: dp.indexOf(res),
                msg: restart ? `Сброс! Новая цепочка с A[${i}]` : `Добавляем A[${i}] к сумме`
            });
        }
        currentStep = 0;
        render();
    }

    function render() {
        const s = steps[currentStep];
        const gridA = document.getElementById('input-grid');
        const gridDP = document.getElementById('dp-grid');
        gridA.innerHTML = ''; gridDP.innerHTML = '';

        document.getElementById('global-max-display').textContent = s.res;
        document.getElementById('local-min-display').textContent = A[s.localMinIdx];
        document.getElementById('info').textContent = s.msg;
        document.getElementById('step-counter').textContent = `Шаг ${currentStep + 1} / ${steps.length}`;

        A.forEach((val, i) => {
            // Отрисовка верхнего ряда (A)
            const cellA = document.createElement('div');
            cellA.className = 'cell';
            if (i === s.idx) cellA.classList.add('active');
            if (i >= s.range[0] && i <= s.range[1]) cellA.classList.add('in-max-range');
            cellA.textContent = val;
            gridA.appendChild(cellA);

            // Отрисовка нижнего ряда (DP)
            const cellD = document.createElement('div');
            cellD.className = 'cell';
            if (s.dp[i] !== null) cellD.classList.add('processed');
            
            // 1. Оранжевая рамка на локальный минимум
            if (i === s.localMinIdx) cellD.classList.add('local-min-frame');
            
            // 2. Оранжевая заливка на текущий элемент при сбросе
            if (i === s.idx && s.reset) cellD.classList.add('reset-trigger');
            
            // 3. Зеленая заливка для лучшего результата
            if (i === s.winnerIdx && s.dp[i] !== null) cellD.classList.add('is-global-winner');

            cellD.textContent = s.dp[i] === null ? '' : s.dp[i];
            gridDP.appendChild(cellD);
        });
    }

    function go(dir) { if (currentStep + dir >= 0 && currentStep + dir < steps.length) { currentStep += dir; render(); } }
    function resetAll() { currentStep = 0; render(); }

    rebuild();
</script>
</body>
</html>
