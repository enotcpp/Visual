<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Kadane's Correct Visual</title>
    <style>
        :root { --bg: #141416; --card: #1e1e22; --text: #e1e1e3; --accent: #7f77dd; --border: #313136; --pos: #1d9e75; --orange: #e67e22; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 40px; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); max-width: 900px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stat-label { font-size: 10px; color: #9ba1a6; text-transform: uppercase; font-weight: 800; }
        .stat-val { font-size: 24px; font-weight: bold; font-family: monospace; }
        .grid { display: flex; gap: 10px; justify-content: center; margin: 15px 0 30px; }
        .cell {
            width: 55px; height: 55px; background: #26262a; border: 1px solid var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; font-family: monospace; position: relative;
        }

        /* БЕЛАЯ РАМКА ТОЛЬКО ДЛЯ ТОЧКИ СБРОСА (-2) */
        .drop-node { border: 3px solid #ffffff !important; }
        
        /* ЗЕЛЕНАЯ ЗАЛИВКА ДЛЯ ТЕКУЩЕЙ СУММЫ (БЕЗ РАМКИ) */
        .dp-current-sum { background: var(--pos) !important; color: white; border: 1px solid var(--border) !important; }
        
        /* ОРАНЖЕВАЯ РАМКА ДЛЯ ТЕКУЩЕГО ИНДЕКСА В МАССИВЕ А */
        .a-current { border: 3px solid var(--orange) !important; }
        
        .dim { opacity: 0.3; }
        .controls { display: flex; gap: 10px; }
        button { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--accent); color: white; }
        button.sec { background: var(--bg); border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>∑ Kadane's Algorithm</h1>
        <div style="display: flex; gap: 30px;">
            <div><div class="stat-label">Local Min (Drop Point)</div><div class="stat-val" style="color:var(--orange)">-2</div></div>
            <div><div class="stat-label">Global Max (res)</div><div class="stat-val" id="g-max">0</div></div>
        </div>
    </div>

    <div class="stat-label">INPUT ARRAY A</div>
    <div class="grid" id="grid-a"></div>

    <div class="stat-label">DP ARRAY (White border: -2 | Green fill: Current Sum)</div>
    <div class="grid" id="grid-dp"></div>

    <div class="controls">
        <button class="sec" onclick="move(-1)">← Back</button>
        <button onclick="move(1)">Next Step →</button>
        <button class="sec" onclick="reset()">Reset</button>
    </div>
</div>

<script>
    const A = [-2, 1, -3, 4, -1, 2, 1, -5, 4];
    let stepIdx = 0, history = [];

    function init() {
        let dp = Array(A.length).fill(null), curSum = A[0], res = A[0];
        dp[0] = A[0];
        history.push({ dp: [...dp], curI: 0, res: res, dropIdx: -1 });

        for(let i=1; i<A.length; i++) {
            let restart = A[i] > (curSum + A[i]);
            curSum = restart ? A[i] : curSum + A[i];
            dp[i] = curSum;
            if (curSum > res) res = curSum;

            history.push({
                dp: [...dp], curI: i, res: res,
                // Фиксируем белую рамку на -2 (индекс 2), если мы прошли этот момент
                dropIdx: i >= 3 ? 2 : -1 
            });
        }
        render();
    }

    function render() {
        const s = history[stepIdx];
        const gA = document.getElementById('grid-a'), gDP = document.getElementById('grid-dp');
        gA.innerHTML = ''; gDP.innerHTML = '';
        document.getElementById('g-max').textContent = s.res;

        A.forEach((v, i) => {
            // МАССИВ A
            const cA = document.createElement('div');
            cA.className = `cell ${i === s.curI ? 'a-current' : ''}`;
            cA.textContent = v;
            gA.appendChild(cA);

            // МАССИВ DP
            const cD = document.createElement('div');
            cD.className = `cell ${s.dp[i] === null ? 'dim' : ''}`;
            
            // Белая рамка на точку сброса
            if (i === s.dropIdx) cD.classList.add('drop-node');
            
            // Зеленая заливка на текущую сумму (без белой рамки)
            if (i === s.curI) cD.classList.add('dp-current-sum');
            
            cD.textContent = s.dp[i] === null ? '' : s.dp[i];
            gDP.appendChild(cD);
        });
    }

    function move(d) { if(stepIdx+d >=0 && stepIdx+d < history.length) { stepIdx+=d; render(); } }
    function reset() { stepIdx=0; render(); }
    init();
</script>
</body>
</html>
