<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadane's Algorithm | Lab Module</title>
    <style>
        :root {
            --bg-main: #141416;
            --bg-card: #1e1e22;
            --bg-input: #26262a;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --border: #313136;
            --code-bg: #0d0d0f;
            --pos: #1d9e75;
            --neg: #e74c3c;
        }

        body { 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        /* VISUALIZER SECTION */
        .visualizer-section {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 40px;
        }
        .inputs { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 8px; outline: none; flex-grow: 1;
        }
        button {
            padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-main); font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { border-color: var(--accent); }
        button.primary { background: var(--accent); color: white; border: none; }

        /* KADANE AREA */
        .viz-container { display: flex; flex-direction: column; gap: 40px; margin: 60px 0; }
        .row-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 10px; font-weight: 800; }
        
        .bars-area { display: flex; justify-content: center; align-items: flex-end; gap: 8px; height: 100px; }
        
        .bar-stack { display: flex; flex-direction: column; align-items: center; width: 45px; }
        .bar { 
            width: 100%; border-radius: 6px; position: relative;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; transition: all 0.3s;
            border: 1px solid var(--border); background: var(--bg-input);
        }
        
        /* State Styles */
        .bar.active { border-color: var(--accent); transform: scale(1.05); z-index: 2; box-shadow: 0 0 15px rgba(127, 119, 221, 0.3); }
        .bar.in-max { border: 2px solid white; }
        .bar.current-chain { background: var(--accent); color: white; border: none; }
        .bar.pos { border-color: var(--pos); color: var(--pos); }
        .bar.neg { border-color: var(--neg); color: var(--neg); }

        /* LAB INFO PANEL */
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn {
            background: none; border: none; padding: 18px 25px; color: var(--text-secondary);
            font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer;
        }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }

        .context-controls { margin-left: auto; display: flex; align-items: center; gap: 8px; padding-right: 20px; }
        .sub-btn {
            font-size: 10px; padding: 4px 8px; opacity: 0.6; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); border-radius: 4px; cursor: pointer;
        }
        .sub-btn.active { opacity: 1; border-color: var(--accent); color: var(--accent); }

        .tab-content { display: none; padding: 30px; min-height: 200px; line-height: 1.6; }
        .tab-content.active { display: block; }
        pre { background: var(--code-bg); padding: 20px; border-radius: 10px; color: #a6accd; overflow-x: auto; font-size: 14px; }
        .math { color: var(--accent); font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-section">
        <h1>∑ Kadane's Algorithm</h1>
        <div class="inputs">
            <input id="arr-input" type="text" value="-2, 1, -3, 4, -1, 2, 1, -5, 4">
            <button onclick="rebuild()" class="primary">Update</button>
            <button onclick="randomize()">Random</button>
        </div>
        
        <div class="info-box" id="info" style="margin-bottom: 20px; color: var(--text-secondary);">Ready.</div>
        
        <div class="viz-container">
            <div>
                <div class="row-label">Input Array (Current Element i)</div>
                <div class="bars-area" id="input-area"></div>
            </div>
            <div>
                <div class="row-label">Current Accumulation (Local Max)</div>
                <div class="bars-area" id="acc-area"></div>
            </div>
        </div>

        <div class="inputs">
            <button onclick="go(-1)">← Back</button>
            <button onclick="go(1)" class="primary">Next Step →</button>
            <button onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto; font-size: 13px; color: var(--text-secondary);"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div class="context-controls" id="context-panel"></div>
        </div>

        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content"><pre><code id="python-display"></code></pre></div>
        <div id="cpp" class="tab-content"><pre><code id="cpp-display"></code></pre></div>
    </div>
</div>

<script>
    // DATABASE - Strict Lab Module Style
    const db = {
        theory: {
            EN: "<h3>Kadane's Algorithm</h3><p>Used to find the maximum sum of a contiguous subarray. It operates in $O(N)$ time by maintaining a <span class='math'>local_max</span> (best sum ending at current index) and a <span class='math'>global_max</span> (best sum seen so far).</p>",
            RU: "<h3>Алгоритм Кадана</h3><p>Используется для поиска подмассива с максимальной суммой за $O(N)$. Алгоритм сравнивает, что выгоднее: прибавить текущее число к накопленной сумме или начать новый подмассив с текущего числа.</p>"
        },
        python: {
            v1: "def kadane(arr):\n    max_so_far = arr[0]\n    current_max = arr[0]\n    \n    for i in range(1, len(arr)):\n        current_max = max(arr[i], current_max + arr[i])\n        max_so_far = max(max_so_far, current_max)\n        \n    return max_so_far",
            v2: "# Concise version\ndef kadane(arr):\n    cur = res = arr[0]\n    for x in arr[1:]: \n        cur = max(x, cur + x)\n        res = max(res, cur)\n    return res"
        },
        cpp: {
            v1: "int maxSubArray(vector<int>& nums) {\n    int res = nums[0], cur = nums[0];\n    for(int i = 1; i < nums.size(); i++) {\n        cur = max(nums[i], cur + nums[i]);\n        res = max(res, cur);\n    }\n    return res;\n}"
        }
    };

    let currentMainTab = 'theory';
    function switchMainTab(btn, tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        renderContextControls();
    }

    function renderContextControls() {
        const panel = document.getElementById('context-panel');
        panel.innerHTML = '';
        const options = currentMainTab === 'theory' ? ['EN', 'RU'] : ['v1', 'v2'];
        
        options.forEach((opt, idx) => {
            const b = document.createElement('button');
            b.className = 'sub-btn' + (idx === 0 ? ' active' : '');
            b.textContent = opt;
            b.onclick = () => {
                document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                b.classList.add('active');
                if (currentMainTab === 'theory') document.getElementById('theory-display').innerHTML = db.theory[opt];
                else document.getElementById(currentMainTab + '-display').textContent = db[currentMainTab][opt] || db[currentMainTab]['v1'];
            };
            panel.appendChild(b);
        });
        // Initial load
        if (currentMainTab === 'theory') document.getElementById('theory-display').innerHTML = db.theory[options[0]];
        else document.getElementById(currentMainTab + '-display').textContent = db[currentMainTab][options[0]];
    }

    // VISUALIZATION LOGIC
    let arr = [], steps = [], cur = 0;

    function randomize() {
        const r = Array.from({length: 10}, () => Math.floor(Math.random() * 21) - 10);
        document.getElementById('arr-input').value = r.join(', ');
        rebuild();
    }

    function rebuild() {
        arr = document.getElementById('arr-input').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        init();
    }

    function init() {
        steps = [];
        let currentMax = -Infinity;
        let globalMax = -Infinity;
        let start = 0, end = 0, tempStart = 0;

        steps.push({ idx: -1, curSum: 0, bestSum: -Infinity, range: [-1, -1], msg: "Click Next to start scanning." });

        for (let i = 0; i < arr.length; i++) {
            let prevSum = currentMax;
            if (currentMax < 0) {
                currentMax = arr[i];
                tempStart = i;
            } else {
                currentMax += arr[i];
            }

            let msg = `Step ${i}: Value is <b>${arr[i]}</b>. `;
            if (arr[i] > prevSum + arr[i] && i > 0) msg += `Discarding previous negative sum. New chain starts here.`;
            else msg += `Adding to current chain. Total: <b>${currentMax}</b>.`;

            if (currentMax > globalMax) {
                globalMax = currentMax;
                start = tempStart;
                end = i;
                msg += ` <span style="color:var(--accent)">New Global Max!</span>`;
            }

            steps.push({ idx: i, curSum: currentMax, bestSum: globalMax, range: [start, end], msg: msg });
        }
        steps.push({ ...steps[steps.length-1], msg: `Finished. Max Subarray Sum is <b>${globalMax}</b>.` });
        cur = 0; render();
    }

    function render() {
        const s = steps[cur];
        const inputArea = document.getElementById('input-area');
        const accArea = document.getElementById('acc-area');
        inputArea.innerHTML = ''; accArea.innerHTML = '';
        
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;

        arr.forEach((val, i) => {
            // Row 1: Input
            const b1 = document.createElement('div');
            b1.className = 'bar ' + (val >= 0 ? 'pos' : 'neg');
            if (i === s.idx) b1.classList.add('active');
            if (i >= s.range[0] && i <= s.range[1]) b1.classList.add('in-max');
            b1.style.height = (Math.abs(val) * 3 + 30) + 'px';
            b1.textContent = val;
            inputArea.appendChild(b1);

            // Row 2: Accumulation
            const b2 = document.createElement('div');
            b2.className = 'bar';
            if (i <= s.idx) {
                // We show the "local_max" history for each step
                // To keep it simple, we only show the value at current step i
                if (i === s.idx) {
                    b2.classList.add('current-chain');
                    b2.style.height = (Math.abs(s.curSum) * 2 + 30) + 'px';
                    b2.textContent = s.curSum;
                } else {
                    b2.style.height = '10px';
                    b2.style.opacity = '0.1';
                }
            } else {
                b2.style.height = '2px';
                b2.style.opacity = '0.1';
            }
            accArea.appendChild(b2);
        });
    }

    function go(dir) { if (cur+dir >= 0 && cur+dir < steps.length) { cur+=dir; render(); } }
    function resetAll() { cur=0; render(); }

    renderContextControls();
    rebuild();
</script>
</body>
</html>
