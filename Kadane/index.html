<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadane's Algorithm | Lab Module</title>
    <style>
        :root {
            --bg-main: #141416;
            --bg-card: #1e1e22;
            --bg-input: #26262a;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd; 
            --accent-soft: rgba(127, 119, 221, 0.1);
            --border: #313136;
            --code-bg: #0d0d0f;
            --pos: #1d9e75; /* GREEN for Global Max */
            --neg: #e74c3c; 
            --highlight: #e67e22; /* ORANGE for current i */
        }

        body { 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        .visualizer-section {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 40px;
        }
        .inputs { display: flex; gap: 12px; margin-bottom: 25px; align-items: center; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 8px; outline: none; flex-grow: 1;
            font-family: monospace; font-size: 14px;
        }
        button {
            padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-main); font-weight: 600;
            cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        button.primary { background: var(--accent); color: white; border: none; }

        .stats-panel { display: flex; justify-content: flex-end; gap: 20px; margin-bottom: 20px; }
        .stat-item { text-align: right; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; font-weight: 800; }
        .stat-val { font-size: 22px; font-weight: 800; color: white; font-family: monospace; }
        .stat-val.new-max { color: var(--pos); animation: pulse-green 0.5s; }

        .viz-container { display: flex; flex-direction: column; gap: 30px; margin: 40px 0; }
        .row-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-secondary); margin-bottom: 10px; font-weight: 800; }
        
        .grid-area { display: flex; justify-content: center; gap: 10px; }
        
        .cell {
            width: 55px; height: 55px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; font-family: monospace; transition: all 0.2s;
            color: var(--text-main); position: relative;
        }
        
        /* Клетка текущего индекса */
        .grid-a .cell.active { border: 3px solid var(--highlight); color: var(--highlight); transform: scale(1.05); }
        
        /* ЗЕЛЕНЫЕ РАМКИ для исходных чисел, формирующих максимум */
        .grid-a .cell.is-in-range { border: 3px solid var(--pos); box-shadow: 0 0 10px rgba(29, 158, 117, 0.2); }

        .grid-dp .cell { opacity: 0.3; }
        .grid-dp .cell.processed { opacity: 1; border-color: #4a4a4d; background: #2a2a2d; }
        .grid-dp .cell.current-dp { opacity: 1; border: 3px solid var(--highlight); background: var(--bg-card); color: var(--highlight); }
        
        /* ЗЕЛЕНАЯ ЗАЛИВКА для рекордной ячейки в DP */
        .grid-dp .cell.is-global-winner { background: var(--pos); border-color: white; color: white; opacity: 1; box-shadow: 0 0 15px rgba(29, 158, 117, 0.4); }

        .ptr { position: absolute; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; color: white; text-transform: uppercase; }
        .ptr-i { top: -35px; background: var(--highlight); }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(29, 158, 117, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(29, 158, 117, 0); }
            100% { box-shadow: 0 0 0 0 rgba(29, 158, 117, 0); }
        }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-section">
        <h1>∑ Kadane's Algorithm</h1>
        
        <div class="inputs">
            <input id="arr-input" type="text" value="-2, 1, -3, 4, -1, 2, 1, -5, 4">
            <button onclick="rebuild()" class="primary">Load Data</button>
            <button onclick="randomize()">Random</button>
        </div>
        
        <div class="stats-panel">
            <div class="stat-item">
                <div class="stat-label">Global Max (res)</div>
                <div class="stat-val" id="global-max-val">-∞</div>
            </div>
        </div>

        <div id="info" style="margin-bottom: 20px; color: var(--text-secondary); border-left: 3px solid var(--border); padding-left: 15px; font-size: 14px; min-height: 40px;">Ready.</div>
        
        <div class="viz-container">
            <div>
                <div class="row-label">Input Array A (Subarray source in Green)</div>
                <div class="grid-area" id="input-grid"></div>
            </div>
            <div>
                <div class="row-label">DP Array (Global max cell in Green)</div>
                <div class="grid-area" id="dp-grid"></div>
            </div>
        </div>

        <div class="inputs" style="margin-top: 30px; margin-bottom: 0;">
            <button onclick="go(-1)">← Back</button>
            <button onclick="go(1)" class="primary">Next Step →</button>
            <button onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto; font-size: 13px; color: var(--text-secondary);"></span>
        </div>
    </div>
</div>

<script>
    let A = [], steps = [], cur = 0;

    function randomize() {
        const r = Array.from({length: 9}, () => Math.floor(Math.random() * 21) - 10);
        document.getElementById('arr-input').value = r.join(', ');
        rebuild();
    }

    function rebuild() {
        A = document.getElementById('arr-input').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        if (A.length === 0) A = [1, -2, 3];
        init();
    }

    function init() {
        steps = [];
        let dpArr = Array(A.length).fill(null);
        let res = A[0];
        let cur_max = A[0];
        let start = 0, end = 0, tempStart = 0;
        let bestDPIdx = 0;

        // Step 0: Init
        dpArr[0] = A[0];
        steps.push({ 
            idx: 0, dp: [...dpArr], range: [0, 0], res: res, bestDP: 0,
            msg: `Initial state: Global max is <b>${res}</b>.` 
        });

        for (let i = 1; i < A.length; i++) {
            let choiceContinue = cur_max + A[i];
            let choiceReset = A[i];
            let isReset = choiceReset > choiceContinue;

            // Сначала показываем шаг выбора
            steps.push({
                idx: i, dp: [...dpArr], range: [start, end], res: res, bestDP: bestEndIdx(steps),
                isComparing: true,
                msg: `Step ${i}: Compare reset (<b>${choiceReset}</b>) vs continue (<b>${choiceContinue}</b>).`
            });

            cur_max = Math.max(choiceReset, choiceContinue);
            if (isReset) tempStart = i;
            dpArr[i] = cur_max;

            let isNewGlobal = false;
            if (cur_max > res) {
                res = cur_max;
                start = tempStart;
                end = i;
                bestDPIdx = i;
                isNewGlobal = true;
            }

            steps.push({
                idx: i, dp: [...dpArr], range: [start, end], res: res, bestDP: bestDPIdx,
                newRecord: isNewGlobal,
                msg: isNewGlobal ? `<span style="color:var(--pos)">New Global Max: <b>${res}</b>!</span>` : `Current max ending at index ${i} is ${cur_max}.`
            });
        }
        cur = 0; render();
    }

    function bestEndIdx(sList) {
        return sList.length > 0 ? sList[sList.length-1].bestDP : 0;
    }

    function render() {
        const s = steps[cur];
        const aGrid = document.getElementById('input-grid');
        const dGrid = document.getElementById('dp-grid');
        aGrid.innerHTML = ''; dGrid.innerHTML = '';

        A.forEach((val, i) => {
            // Render A
            const cellA = document.createElement('div');
            cellA.className = 'cell';
            cellA.textContent = val;
            if (i === s.idx) {
                cellA.classList.add('active');
                cellA.innerHTML += `<div class="ptr ptr-i">i=${i}</div>`;
            }
            // ЗЕЛЕНАЯ РАМКА для диапазона
            if (i >= s.range[0] && i <= s.range[1]) cellA.classList.add('is-in-range');
            aGrid.appendChild(cellA);

            // Render DP
            const cellD = document.createElement('div');
            cellD.className = 'cell';
            const vDP = s.dp[i];
            cellD.textContent = vDP === null ? '' : vDP;
            if (vDP !== null) cellD.classList.add('processed');
            if (i === s.idx) cellD.classList.add('current-dp');
            // ЗЕЛЕНАЯ ЗАЛИВКА для лучшей ячейки
            if (i === s.bestDP) cellD.classList.add('is-global-winner');
            dGrid.appendChild(cellD);
        });

        const gMaxEl = document.getElementById('global-max-val');
        gMaxEl.textContent = s.res;
        if (s.newRecord) gMaxEl.classList.add('new-max'); else gMaxEl.classList.remove('new-max');
        
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('ctr').textContent = `Step ${cur + 1}/${steps.length}`;
    }

    function go(dir) { if (cur+dir >= 0 && cur+dir < steps.length) { cur+=dir; render(); } }
    function resetAll() { cur=0; render(); }
    rebuild();
</script>
</body>
</html>
