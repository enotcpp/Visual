<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadane's Algorithm | Lab Module</title>
    <style>
        :root {
            --bg-main: #141416;
            --bg-card: #1e1e22;
            --bg-input: #26262a;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --border: #313136;
            --code-bg: #0d0d0f;
            --pos: #1d9e75;
            --orange: #e67e22;
            --line-hl: rgba(127, 119, 221, 0.25);
        }

        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-main); color: var(--text-main); }
        .wrap { max-width: 950px; margin: 0 auto; padding: 40px 20px; }
        .visualizer-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 40px; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .stats { display: flex; gap: 30px; }
        .stat-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        .stat-val { font-size: 24px; font-weight: bold; font-family: 'JetBrains Mono', monospace; min-height: 28px; }

        .inputs { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        .inputs input { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; outline: none; width: 320px; font-family: monospace; }
        
        button { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text-main); font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { border-color: var(--accent); background: #2d2d32; }
        button.primary { background: var(--accent); color: white; border: none; }
        button.primary:hover { background: #6b62c4; }

        .grid-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 10px; font-weight: 700; opacity: 0.8; }
        .grid-area { display: flex; justify-content: flex-start; gap: 10px; margin-bottom: 35px; min-height: 60px; flex-wrap: wrap; }
        
        .cell {
            width: 55px; height: 55px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; font-family: 'JetBrains Mono', monospace; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* СОСТОЯНИЯ ЯЧЕЕК */
        .a-chain { border: 3px solid var(--pos) !important; box-shadow: 0 0 10px rgba(29, 158, 117, 0.2); } 
        .a-current { border: 3px solid var(--orange) !important; transform: translateY(-5px); }
        .drop-point { border: 3px solid #ffffff !important; box-shadow: 0 0 15px rgba(255,255,255,0.3); } 
        .dp-active { background: var(--pos) !important; color: white; border-color: transparent !important; } 
        .dim { opacity: 0.2; transform: scale(0.95); }

        /* ТАБЫ И КОД */
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; padding: 18px 25px; color: var(--text-secondary); font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); border-top: 2px solid var(--accent); }
        .context-controls { margin-left: auto; display: flex; align-items: center; gap: 8px; padding-right: 20px; }
        .sub-btn { font-size: 10px; padding: 4px 10px; opacity: 0.6; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); border-radius: 4px; cursor: pointer; }
        .sub-btn.active { opacity: 1; border-color: var(--accent); color: var(--accent); background: rgba(127, 119, 221, 0.1); }

        .tab-content { display: none; padding: 30px; min-height: 200px; }
        .tab-content.active { display: block; }
        
        pre { background: var(--code-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin: 0; overflow-x: auto; }
        code { font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.7; color: #a6accd; display: block; }
        .code-line { display: block; padding: 0 12px; border-left: 3px solid transparent; transition: 0.2s; }
        .code-line.active { background: var(--line-hl); border-left-color: var(--accent); color: #fff; }
        .indent { display: inline-block; width: 24px; }
        
        /* ЦВЕТА СИНТАКСИСА */
        .kw { color: #cc99cd; } /* Keyword */
        .fn { color: #e67e22; } /* Function */
        .cm { color: #676e95; font-style: italic; } /* Comment */
        .num { color: #f8c555; } /* Number */
        .type { color: #f07178; } /* Type */
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-section">
        <div class="header-top">
            <h1>∑ Kadane's Algorithm</h1>
            <div class="stats">
                <div><div class="stat-label">Min So Far (Drop)</div><div class="stat-val" id="drop-val" style="color:#fff">0</div></div>
                <div><div class="stat-label">Global Max</div><div class="stat-val" id="g-max" style="color:var(--pos)">0</div></div>
            </div>
        </div>

        <div class="inputs">
            <input id="arr-input" type="text" value="-2, 1, -3, 4, -1, 2, 1, -5, 4">
            <button onclick="rebuild()" class="primary">Update Array</button>
            <button onclick="generateRandom()">Random</button>
        </div>

        <div class="grid-label">Input Array A (Green: Active Subarray | Orange: Cursor)</div>
        <div class="grid-area" id="grid-a"></div>

        <div class="grid-label">State / Prefix Sums (White: Min Point | Green: Current)</div>
        <div class="grid-area" id="grid-dp"></div>

        <div class="inputs">
            <button onclick="go(-1)">← Back</button>
            <button onclick="go(1)" class="primary">Next Step →</button>
            <button onclick="autoPlay()" id="play-btn">Auto Play</button>
            <button onclick="resetAll()">Reset</button>
            <span id="step-info" style="margin-left: auto; color: var(--text-secondary); font-size: 13px; font-family: monospace;"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div class="context-controls" id="context-panel"></div>
        </div>
        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content"><pre><code id="python-display"></code></pre></div>
        <div id="cpp" class="tab-content"><pre><code id="cpp-display"></code></pre></div>
    </div>
</div>

<script>
    const db = {
        theory: {
            EN: "<h3>Kadane's Algorithm</h3><p>Calculates the maximum subarray sum in O(n). There are two main ways to think about it: 1) Local Max optimization, and 2) Difference between current prefix sum and minimum prefix sum seen so far.</p>",
            RU: "<h3>Алгоритм Кадана</h3><p>Находит подмассив с максимальной суммой за O(n). В версии V2 мы используем подход с префиксными суммами: ищем максимальную разность между текущей суммой и минимальной суммой, встреченной ранее ($sum[i] - min\\_prefix$).</p>"
        },
        python: {
            v1: `<span class="code-line" data-l="1"><span class="kw">def</span> <span class="fn">max_subarray</span>(arr):</span>` +
                `<span class="code-line" data-l="2"><span class="indent"></span>cur = res = arr[<span class="num">0</span>]</span>` +
                `<span class="code-line" data-l="3"><span class="indent"></span><span class="kw">for</span> x <span class="kw">in</span> arr[<span class="num">1</span>:]:</span>` +
                `<span class="code-line" data-l="4"><span class="indent"></span><span class="indent"></span>cur = <span class="fn">max</span>(x, cur + x)</span>` +
                `<span class="code-line" data-l="5"><span class="indent"></span><span class="indent"></span>res = <span class="fn">max</span>(res, cur)</span>` +
                `<span class="code-line" data-l="6"><span class="indent"></span><span class="kw">return</span> res</span>`,
            v2: `<span class="code-line" data-l="1"><span class="cm"># Alternative logic similar to prefix sums</span></span>`
        },
        cpp: {
            v1: `<span class="code-line" data-l="1"><span class="kw">int</span> <span class="fn">kadane</span>(vector&lt;<span class="kw">int</span>&gt;&amp; arr) {</span>` +
                `<span class="code-line" data-l="2"><span class="indent"></span><span class="kw">int</span> cur = <span class="num">0</span>, res = arr[<span class="num">0</span>];</span>` +
                `<span class="code-line" data-l="3"><span class="indent"></span><span class="kw">for</span> (<span class="kw">int</span> x : arr) {</span>` +
                `<span class="code-line" data-l="4"><span class="indent"></span><span class="indent"></span>cur = <span class="fn">max</span>(x, cur + x);</span>` +
                `<span class="code-line" data-l="5"><span class="indent"></span><span class="indent"></span>res = <span class="fn">max</span>(res, cur);</span>` +
                `<span class="code-line" data-l="6"><span class="indent"></span>}</span>` +
                `<span class="code-line" data-l="7"><span class="indent"></span><span class="kw">return</span> res;</span>` +
                `<span class="code-line" data-l="8">}</span>`,
            v2: `<span class="code-line" data-l="1"><span class="kw">long long</span> <span class="fn">max_sub_array</span>(<span class="kw">const</span> vector&lt;<span class="kw">int</span>&gt;&amp; nums) {</span>` +
                `<span class="code-line" data-l="2"><span class="indent"></span><span class="type">long long</span> sum = <span class="num">0</span>, min_p = <span class="num">0</span>, res = INT_MIN;</span>` +
                `<span class="code-line" data-l="3"><span class="indent"></span><span class="kw">for</span>(<span class="kw">int</span> x : nums) {</span>` +
                `<span class="code-line" data-l="4"><span class="indent"></span><span class="indent"></span>sum += x;</span>` +
                `<span class="code-line" data-l="5"><span class="indent"></span><span class="indent"></span><span class="kw">if</span> (sum - min_p > res) res = sum - min_p;</span>` +
                `<span class="code-line" data-l="6"><span class="indent"></span><span class="indent"></span><span class="kw">if</span> (sum < min_p) min_p = sum;</span>` +
                `<span class="code-line" data-l="7"><span class="indent"></span>}</span>` +
                `<span class="code-line" data-l="8"><span class="indent"></span><span class="kw">return</span> res;</span>` +
                `<span class="code-line" data-l="9">}</span>`
        }
    };

    let A = [], steps = [], curIdx = 0, playTimer = null;
    let currentMainTab = 'theory';
    let currentVer = 'v1';

    function generateRandom() {
        const res = Array.from({length: 8}, () => Math.floor(Math.random() * 21) - 10);
        document.getElementById('arr-input').value = res.join(', ');
        rebuild();
    }

    function rebuild() {
        A = document.getElementById('arr-input').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        if (A.length > 0) initKadane();
    }

    function initKadane() {
        clearInterval(playTimer); playTimer = null;
        document.getElementById('play-btn').textContent = "Auto Play";
        steps = [];
        
        let curSum = 0, gMax = -Infinity, minP = 0, start = 0, bestStart = 0, bestEnd = 0;
        let dp = Array(A.length).fill(null);
        let lastMinIdx = -1;

        // Step 0: Init
        steps.push({ i: -1, dp: [...dp], res: "-", minP: 0, chain: [-1, -1], drop: -1, line: 2 });

        for (let i = 0; i < A.length; i++) {
            curSum += A[i];
            dp[i] = curSum;
            
            // Шаг обновления суммы (строка 4)
            steps.push({ i, dp: [...dp], res: gMax === -Infinity ? "-" : gMax, minP, chain: [start, i], drop: lastMinIdx, line: 4 });

            // Шаг обновления результата (строка 5)
            if (curSum - minP > gMax) {
                gMax = curSum - minP;
                bestStart = (lastMinIdx === -1) ? 0 : lastMinIdx + 1;
                bestEnd = i;
            }
            steps.push({ i, dp: [...dp], res: gMax, minP, chain: [bestStart, i], drop: lastMinIdx, line: 5 });

            // Шаг обновления минимума (строка 6)
            if (curSum < minP) {
                minP = curSum;
                lastMinIdx = i;
            }
            steps.push({ i, dp: [...dp], res: gMax, minP, chain: [bestStart, i], drop: lastMinIdx, line: 6 });
        }
        
        // Финал
        steps.push({ i: -1, dp: [...dp], res: gMax, minP, chain: [bestStart, bestEnd], drop: lastMinIdx, line: 8 });
        
        curIdx = 0; render();
    }

    function syncCodeHighlight() {
        if (currentMainTab === 'theory') return;
        const containerId = currentMainTab + '-display';
        const lines = document.getElementById(containerId).querySelectorAll('.code-line');
        lines.forEach(l => l.classList.remove('active'));
        
        const s = steps[curIdx];
        if (s) {
            const target = document.querySelector(`#${containerId} [data-l="${s.line}"]`);
            if (target) target.classList.add('active');
        }
    }

    function render() {
        const s = steps[curIdx];
        if (!s) return;
        
        const gA = document.getElementById('grid-a'), gDP = document.getElementById('grid-dp');
        gA.innerHTML = ''; gDP.innerHTML = '';
        
        document.getElementById('g-max').textContent = s.res;
        document.getElementById('drop-val').textContent = s.minP;
        document.getElementById('step-info').textContent = `STEP ${curIdx + 1} / ${steps.length}`;

        A.forEach((val, i) => {
            const cA = document.createElement('div');
            cA.className = 'cell' + (i >= s.chain[0] && i <= s.chain[1] ? ' a-chain' : '') + (i === s.i ? ' a-current' : '');
            cA.textContent = val;
            gA.appendChild(cA);

            const cD = document.createElement('div');
            cD.className = 'cell' + (s.dp[i] === null ? ' dim' : '') + (i === s.drop ? ' drop-point' : '') + (i === s.i ? ' dp-active' : '');
            cD.textContent = s.dp[i] ?? '';
            gDP.appendChild(cD);
        });
        syncCodeHighlight();
    }

    function go(d) {
        if(curIdx+d >= 0 && curIdx+d < steps.length) { curIdx+=d; render(); }
        else { clearInterval(playTimer); playTimer = null; document.getElementById('play-btn').textContent = "Auto Play"; }
    }

    function autoPlay() {
        if (playTimer) { 
            clearInterval(playTimer); playTimer = null; 
            document.getElementById('play-btn').textContent = "Auto Play";
        } else {
            if (curIdx >= steps.length - 1) curIdx = -1;
            document.getElementById('play-btn').textContent = "Stop";
            playTimer = setInterval(() => go(1), 700);
        }
    }

    function resetAll() { 
        clearInterval(playTimer); playTimer = null; 
        document.getElementById('play-btn').textContent = "Auto Play";
        curIdx = 0; render(); 
    }

    function switchMainTab(btn, id) {
        currentMainTab = id;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        renderContext();
    }

    function renderContext() {
        const panel = document.getElementById('context-panel');
        panel.innerHTML = '';
        const opts = currentMainTab === 'theory' ? ['EN', 'RU'] : ['v1', 'v2'];
        opts.forEach((opt, idx) => {
            const b = document.createElement('button');
            b.className = 'sub-btn' + (opt === currentVer || idx === 0 ? ' active' : '');
            b.textContent = opt;
            b.onclick = () => {
                currentVer = opt;
                document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                b.classList.add('active');
                if(currentMainTab === 'theory') {
                    document.getElementById('theory-display').innerHTML = db.theory[opt];
                } else {
                    document.getElementById(currentMainTab + '-display').innerHTML = db[currentMainTab][opt];
                    syncCodeHighlight();
                }
            };
            panel.appendChild(b);
        });
        
        const initialOpt = currentMainTab === 'theory' ? 'RU' : 'v2';
        if(currentMainTab === 'theory') document.getElementById('theory-display').innerHTML = db.theory['RU'];
        else {
            document.getElementById(currentMainTab + '-display').innerHTML = db[currentMainTab][currentVer];
            syncCodeHighlight();
        }
    }

    rebuild(); renderContext();
</script>
</body>
</html>
