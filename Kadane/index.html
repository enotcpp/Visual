<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadane's Algorithm | Lab Module</title>
    <style>
        :root {
            --bg-main: #141416;
            --bg-card: #1e1e22;
            --bg-input: #26262a;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd; /* Purple */
            --accent-soft: rgba(127, 119, 221, 0.1);
            --border: #313136;
            --code-bg: #0d0d0f;
            --pos: #1d9e75; /* Green */
            --neg: #e74c3c; /* Red */
            --highlight: #e67e22; /* Orange */
        }

        body { 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        /* VISUALIZER SECTION */
        .visualizer-section {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 40px;
        }
        .inputs { display: flex; gap: 12px; margin-bottom: 25px; align-items: center; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 8px; outline: none; flex-grow: 1;
            font-family: monospace; font-size: 14px;
        }
        button {
            padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-main); font-weight: 600;
            cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        button.primary { background: var(--accent); color: white; border: none; }

        .stats-panel { display: flex; justify-content: flex-end; gap: 20px; margin-bottom: 20px; }
        .stat-item { text-align: right; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; font-weight: 800; }
        .stat-val { font-size: 22px; font-weight: 800; color: white; font-family: monospace; }

        /* KADANE AREA (Two honest grids) */
        .viz-container { display: flex; flex-direction: column; gap: 20px; margin: 40px 0; }
        .row-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-secondary); margin-bottom: 10px; font-weight: 800; }
        
        .grid-area { display: flex; justify-content: center; gap: 10px; }
        
        .cell {
            width: 55px; height: 55px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; font-family: monospace; transition: all 0.2s;
            color: var(--text-main); position: relative;
        }
        
        /* Cell States */
        /* Array A: Current element being processed */
        .grid-a .cell.active { border: 3px solid var(--highlight); color: var(--highlight); transform: scale(1.05); }
        
        /* Array A: Part of the global maximum subarray */
        .grid-a .cell.in-max-range { border: 3px solid var(--pos); color: var(--pos); }

        .grid-dp .cell { opacity: 0.3; }
        .grid-dp .cell.processed { opacity: 1; border-color: #4a4a4d; background: #2a2a2d; }
        
        /* The Pivot Point (The Reset) */
        .grid-dp .cell.processed.option-reset { background: var(--highlight); color: white; border-color: white; opacity: 1; }
        
        /* Current DP cell being calculated */
        .grid-dp .cell.current-dp { border: 3px solid var(--highlight); opacity: 1; background: var(--bg-card); color: var(--highlight); }
        
        /* Cell storing the current best global sum */
        .grid-dp .cell.is-global-winner { background: var(--pos); border-color: white; color: white; opacity: 1; box-shadow: 0 0 15px rgba(29, 158, 117, 0.4); }

        /* NO POINTER LABELS REQUIRED */

        /* LAB INFO PANEL */
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn {
            background: none; border: none; padding: 18px 25px; color: var(--text-secondary);
            font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer;
        }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }

        .context-controls { margin-left: auto; display: flex; align-items: center; gap: 8px; padding-right: 20px; }
        .sub-btn {
            font-size: 10px; padding: 4px 8px; opacity: 0.6; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); border-radius: 4px; cursor: pointer;
        }
        .sub-btn.active { opacity: 1; border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

        .tab-content { display: none; padding: 30px; min-height: 200px; line-height: 1.6; }
        .tab-content.active { display: block; }
        pre { background: var(--code-bg); padding: 20px; border-radius: 10px; color: #a6accd; overflow-x: auto; font-size: 14px; }
        .math { color: var(--accent); font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-section">
        <h1>∑ Kadane's Algorithm</h1>
        
        <div class="inputs">
            <input id="arr-input" type="text" value="-2, 1, -3, 4, -1, 2, 1, -5, 4">
            <button onclick="rebuild()" class="primary">Load Data</button>
            <button onclick="randomize()">Random</button>
        </div>
        
        <div class="stats-panel">
            <div class="stat-item">
                <div class="stat-label">Global Max (res)</div>
                <div class="stat-val" id="global-max-val">-∞</div>
            </div>
        </div>

        <div class="info-box" id="info" style="margin-bottom: 20px; color: var(--text-secondary); border-left: 3px solid var(--border); padding-left: 15px; font-size: 14px; min-height: 40px;">Ready.</div>
        
        <div class="viz-container">
            <div>
                <div class="row-label">Input Array A (Subarray source in Green)</div>
                <div class="grid-area grid-a" id="input-grid"></div>
            </div>
            <div>
                <div class="row-label">DP Array (Orange indicates new subarray)</div>
                <div class="grid-area grid-dp" id="dp-grid"></div>
            </div>
        </div>

        <div class="inputs" style="margin-top: 30px; margin-bottom: 0;">
            <button onclick="go(-1)">← Back</button>
            <button onclick="go(1)" class="primary">Next Step →</button>
            <button onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto; font-size: 13px; color: var(--text-secondary);"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div class="context-controls" id="context-panel"></div>
        </div>

        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content"><pre><code id="python-display"></code></pre></div>
        <div id="cpp" class="tab-content"><pre><code id="cpp-display"></code></pre></div>
    </div>
</div>

<script>
    // DATABASE - Strict Lab Module Style
    const db = {
        theory: {
            RU: "<h3>Алгоритм Кадана</h3><p>Greedy/Dynamic Programming подход для поиска максимальной суммы подмассива. На каждом шаге мы решаем: прибавить текущее число к накопленной сумме (<span class='math'>cur + A[i]</span>) или начать заново с текущего элемента (<span class='math'>A[i]</span>). Если <span class='math'>cur</span> становится отрицательным, выгоднее начать заново.</p><p>Визуально перезагрузка цепи обозначается <b>оранжевым цветом</b> в массиве DP.</p>",
            EN: "<h3>Kadane's Algorithm</h3><p>Greedy/Dynamic Programming approach. At each step, it decides whether to extend the current chain (<span class='math'>cur + A[i]</span>) or start a new one from the current element (<span class='math'>A[i]</span>). If the accumulated sum (<span class='math'>cur</span>) is negative, it's better to restart fresh.</p><p>Visual restart of the chain is indicated by an <b>Orange background</b> in the DP array.</p>"
        },
        python: {
            v1: "def kadane(A):\n    # res = Global max\n    # cur = Local max\n    res = cur = A[0]\n    \n    for x in A[1:]:\n        # Is continuing better than starting over?\n        cur = max(x, cur + x)\n        res = max(res, cur)\n        \n    return res"
        },
        cpp: {
            v1: "// Simple 1-pass loop\nint maxSubArray(vector<int>& nums) {\n    int res = nums[0], cur = nums[0];\n    for(int i = 1; i < nums.size(); i++) {\n        cur = max(nums[i], cur + nums[i]);\n        res = max(res, cur);\n    }\n    return res;\n}"
        }
    };

    let currentMainTab = 'theory';
    function switchMainTab(btn, tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        renderContextControls();
    }

    function renderContextControls() {
        const panel = document.getElementById('context-panel');
        panel.innerHTML = '';
        const options = currentMainTab === 'theory' ? ['RU', 'EN'] : ['v1'];
        
        options.forEach((opt, idx) => {
            const b = document.createElement('button');
            b.className = 'sub-btn' + (idx === 0 ? ' active' : '');
            b.textContent = opt;
            b.onclick = () => {
                document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                b.classList.add('active');
                if (currentMainTab === 'theory') document.getElementById('theory-display').innerHTML = db.theory[opt];
                else document.getElementById(currentMainTab + '-display').textContent = db[currentMainTab][opt];
            };
            panel.appendChild(b);
        });
        // Initial load
        if (currentMainTab === 'theory') document.getElementById('theory-display').innerHTML = db.theory[options[0]];
        else document.getElementById(currentMainTab + '-display').textContent = db[currentMainTab][options[0]];
    }

    // VISUALIZATION LOGIC
    let A = [], dp = [], steps = [], cur = 0;

    function randomize() {
        const r = Array.from({length: 10}, () => Math.floor(Math.random() * 21) - 10);
        document.getElementById('arr-input').value = r.join(', ');
        rebuild();
    }

    function rebuild() {
        A = document.getElementById('arr-input').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        // Simple default if empty
        if (A.length === 0) A = [1, -2, 3];
        init();
    }

    function init() {
        steps = [];
        dp = Array(A.length).fill(null);
        let res = A[0];
        let cur_max = A[0];
        let start = 0, end = 0, tempStart = 0;
        let global_winner_idx = 0;

        // Step 0: Initialize
        dp[0] = A[0];
        steps.push({ 
            idx: 0, cur_max: A[0], res: A[0], dp: [...dp], range: [0, 0], global_idx: 0,
            msg: `Initialize: <span class='math'>res = A[0]</span>. Start from index 0.` 
        });

        for (let i = 1; i < A.length; i++) {
            let choiceContinue = cur_max + A[i];
            let choiceReset = A[i];
            let chainReset = (choiceReset > choiceContinue);
            
            cur_max = Math.max(choiceReset, choiceContinue);
            dp[i] = cur_max;

            let msg = `i=${i}: Value <b>${A[i]}</b>. `;
            if (chainReset) {
                msg += `<span style="color:var(--highlight)">Current sum negative. Restarting subarr from A[${i}].</span>`;
                tempStart = i;
            } else {
                msg += `Continuing chain. cur=${cur_max}.`;
            }

            if (cur_max > res) {
                res = cur_max;
                start = tempStart;
                end = i;
                global_winner_idx = i;
                msg += ` <span style="color:var(--pos)">New res = <b>${res}</b>!</span>`;
            }

            steps.push({
                idx: i, cur_max: cur_max, res: res, dp: [...dp], range: [start, end], global_idx: global_winner_idx,
                restart: chainReset,
                msg: msg
            });
        }
        steps.push({ ...steps[steps.length-1], done: true, msg: `Finished! Maximum Subarray Sum is <b>${res}</b>.` });
        cur = 0; render();
    }

    function render() {
        const s = steps[cur];
        const gridA = document.getElementById('input-grid');
        const gridDP = document.getElementById('dp-grid');
        gridA.innerHTML = ''; gridDP.innerHTML = '';
        
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('ctr').textContent = `Step ${cur + 1}/${steps.length}`;

        A.forEach((val, i) => {
            // Matrix A - Strict Divider Style
            const cellA = document.createElement('div');
            cellA.className = 'cell';
            cellA.textContent = val;
            if (i === s.idx) cellA.classList.add('active'); // Oранжевая рамка для текущего i
            if (i >= s.range[0] && i <= s.range[1]) cellA.classList.add('in-max-range'); // Зеленая рамка для диапазона
            gridA.appendChild(cellA);

            // DP Matrix
            const cellD = document.createElement('div');
            cellD.className = 'cell';
            cellD.textContent = s.dp[i] === null ? '' : s.dp[i];
            
            if (s.dp[i] !== null) cellD.classList.add('processed');
            if (i === s.idx) cellD.classList.add('current-dp');
            if (i === s.idx && s.restart) cellD.classList.add('option-reset'); // Оранжевая ЗАЛИВКА для сброса

            if (i === s.global_idx) cellD.classList.add('is-global-winner'); // Зеленая ЗАЛИВКА для рекорда
            gridDP.appendChild(cellD);
        });

        document.getElementById('global-max-val').textContent = s.res === null ? '-∞' : s.res;
    }

    function go(dir) { if (cur+dir >= 0 && cur+dir < steps.length) { cur+=dir; render(); } }
    function resetAll() { cur=0; render(); }

    renderContextControls();
    rebuild();
</script>
</body>
</html>
