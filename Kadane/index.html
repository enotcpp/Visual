<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadane's Algorithm | Lab Module</title>
    <style>
        :root {
            --bg-main: #141416;
            --bg-card: #1e1e22;
            --bg-input: #26262a;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --border: #313136;
            --code-bg: #0d0d0f;
            --pos: #1d9e75;
            --orange: #e67e22;
            --line-hl: rgba(127, 119, 221, 0.15);
        }

        body { margin: 0; padding: 0; font-family: sans-serif; background: var(--bg-main); color: var(--text-main); }
        .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .visualizer-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 40px; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .stats { display: flex; gap: 30px; }
        .stat-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; font-weight: 800; }
        .stat-val { font-size: 24px; font-weight: bold; font-family: monospace; min-height: 28px; }

        .inputs { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        .inputs input { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; outline: none; width: 280px; }
        
        button { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text-main); font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { border-color: var(--accent); }
        button.primary { background: var(--accent); color: white; border: none; }

        .grid-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 10px; font-weight: 700; }
        .grid-area { display: flex; justify-content: center; gap: 10px; margin-bottom: 35px; min-height: 60px; flex-wrap: wrap; }
        
        .cell {
            width: 55px; height: 55px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; font-family: monospace; transition: 0.2s;
        }

        /* СОСТОЯНИЯ */
        .a-chain { border: 3px solid var(--pos) !important; } 
        .a-current { border: 3px solid var(--orange) !important; }
        .drop-point { border: 3px solid #ffffff !important; box-shadow: 0 0 15px rgba(255,255,255,0.2); } 
        .dp-active { background: var(--pos) !important; color: white; border-color: transparent !important; } 
        .dim { opacity: 0.3; }

        /* ТАБЫ И НИЖНЯЯ ПАНЕЛЬ */
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; padding: 18px 25px; color: var(--text-secondary); font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }
        .context-controls { margin-left: auto; display: flex; align-items: center; gap: 8px; padding-right: 20px; }
        .sub-btn { font-size: 10px; padding: 4px 8px; opacity: 0.6; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); border-radius: 4px; cursor: pointer; }
        .sub-btn.active { opacity: 1; border-color: var(--accent); color: var(--accent); }

        .tab-content { display: none; padding: 30px; min-height: 150px; }
        .tab-content.active { display: block; }
        
        /* СТИЛИ КОДА */
        code { font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; color: #a6accd; display: block; }
        .code-line { display: block; padding: 0 10px; border-left: 3px solid transparent; transition: 0.2s; }
        .code-line.active { background: var(--line-hl); border-left-color: var(--accent); color: #fff; }
        .indent { display: inline-block; width: 24px; }
        .kw { color: #cc99cd; } .fn { color: #e67e22; } .cm { color: #777; } .num { color: #f8c555; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-section">
        <div class="header-top">
            <h1>∑ Kadane's Algorithm</h1>
            <div class="stats">
                <div><div class="stat-label">Local Min</div><div class="stat-val" id="drop-val" style="color:#fff"></div></div>
                <div><div class="stat-label">Global Max</div><div class="stat-val" id="g-max" style="color:var(--pos)">0</div></div>
            </div>
        </div>

        <div class="inputs">
            <input id="arr-input" type="text" value="-2, 1, -3, 4, -1, 2, 1, -5, 4">
            <button onclick="rebuild()" class="primary">Update</button>
            <button onclick="generateRandom()">Random</button>
        </div>

        <div class="grid-label">Input Array A (Green: Chain | Orange: Cursor)</div>
        <div class="grid-area" id="grid-a"></div>

        <div class="grid-label">DP Array (White: Drop Point | Green: Current Sum)</div>
        <div class="grid-area" id="grid-dp"></div>

        <div class="inputs">
            <button onclick="go(-1)">← Back</button>
            <button onclick="go(1)" class="primary">Next Step →</button>
            <button onclick="autoPlay()">Auto Play</button>
            <button onclick="resetAll()">Reset</button>
            <span id="step-info" style="margin-left: auto; color: var(--text-secondary); font-size: 13px;"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div class="context-controls" id="context-panel"></div>
        </div>
        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content"><pre><code id="python-display"></code></pre></div>
        <div id="cpp" class="tab-content"><pre><code id="cpp-display"></code></pre></div>
    </div>
</div>

<script>
const db = {
const db = {
        theory: {
            EN: "<h3>Kadane's Algorithm</h3><p>Calculates the maximum subarray sum in O(n). If adding an element results in a sum smaller than the element itself, we start a new subarray from that point.</p>",
            RU: "<h3>Алгоритм Кадана</h3><p>Находит подмассив с максимальной суммой за O(n). Если накопленная сумма становится меньше текущего числа, мы «сбрасываем» старую цепочку и начинаем заново.</p>",
            UKR: "<h3>Алгоритм Кадана</h3><p>Знаходить підмасив з максимальною сумою. Якщо сума стає меншою за поточне число, ми скидаємо ланцюжок і починаємо новий.</p>",
            DE: "<h3>Kadane-Algorithmus</h3><p>Findet die maximale Teilarray-Summe. Wenn die Summe kleiner als das aktuelle Element wird, beginnen wir eine neue Kette.</p>"
        },
        python: {
            v1: `<span class="code-line" data-l="1"><span class="kw">def</span> <span class="fn">max_subarray</span>(arr):</span>` +
                `<span class="code-line" data-l="2"><span class="indent"></span>cur = res = arr[<span class="num">0</span>]</span>` +
                `<span class="code-line" data-l="3"><span class="indent"></span><span class="kw">for</span> x <span class="kw">in</span> arr[<span class="num">1</span>:]:</span>` +
                `<span class="code-line" data-l="4"><span class="indent"></span><span class="indent"></span>cur = <span class="fn">max</span>(x, cur + x)</span>` +
                `<span class="code-line" data-l="5"><span class="indent"></span><span class="indent"></span>res = <span class="fn">max</span>(res, cur)</span>` +
                `<span class="code-line" data-l="6"><span class="indent"></span><span class="kw">return</span> res</span>`,
            v2: `<span class="code-line" data-l="1"><span class="kw">def</span> <span class="fn">kadane</span>(nums):</span>` +
                `<span class="code-line" data-l="2"><span class="indent"></span>global_max, local_min = <span class="num">0</span>, <span class="num">0</span></span>` +
                `<span class="code-line" data-l="3"><span class="indent"></span>res = <span class="fn">float</span>(<span class="cm">'-inf'</span>)</span>` +
                `<span class="code-line" data-l="4"><span class="indent"></span><span class="kw">for</span> x <span class="kw">in</span> nums:</span>` +
                `<span class="code-line" data-l="5"><span class="indent"></span><span class="indent"></span>global_max += x</span>` +
                `<span class="code-line" data-l="6"><span class="indent"></span><span class="indent"></span><span class="kw">if</span> global_max - local_min > res:</span>` +
                `<span class="code-line" data-l="7"><span class="indent"></span><span class="indent"></span><span class="indent"></span>res = global_max - local_min</span>` +
                `<span class="code-line" data-l="8"><span class="indent"></span><span class="indent"></span><span class="kw">if</span> global_max < local_min:</span>` +
                `<span class="code-line" data-l="9"><span class="indent"></span><span class="indent"></span><span class="indent"></span>local_min = global_max</span>` +
                `<span class="code-line" data-l="10"><span class="indent"></span><span class="kw">return</span> res</span>`
        },
        cpp: {
            v1: `<span class="code-line" data-l="1"><span class="kw">int</span> <span class="fn">kadane</span>(vector&lt;<span class="kw">int</span>&gt;&amp; arr) {</span>` +
                `<span class="code-line" data-l="2"><span class="indent"></span><span class="kw">int</span> cur = <span class="num">0</span>, res = arr[<span class="num">0</span>];</span>` +
                `<span class="code-line" data-l="3"><span class="indent"></span><span class="kw">for</span> (<span class="kw">int</span> x : arr) {</span>` +
                `<span class="code-line" data-l="4"><span class="indent"></span><span class="indent"></span>cur = <span class="fn">max</span>(x, cur + x);</span>` +
                `<span class="code-line" data-l="5"><span class="indent"></span><span class="indent"></span>res = <span class="fn">max</span>(res, cur);</span>` +
                `<span class="code-line" data-l="6"><span class="indent"></span>}</span>` +
                `<span class="code-line" data-l="7"><span class="indent"></span><span class="kw">return</span> res;</span>` +
                `<span class="code-line" data-l="8">}</span>`,
            v2: `<span class="code-line" data-l="1"><span class="kw">int</span> <span class="fn">kadane</span>(<span class="kw">const</span> vector&lt;<span class="kw">int</span>&gt;&amp; nums) {</span>` +
                `<span class="code-line" data-l="2"><span class="indent"></span><span class="kw">int</span> global_max = <span class="num">0</span>, local_min = <span class="num">0</span>;</span>` +
                `<span class="code-line" data-l="3"><span class="indent"></span><span class="kw">int</span> res = numeric_limits&lt;<span class="kw">int</span>&gt;::min();</span>` +
                `<span class="code-line" data-l="4"><span class="indent"></span><span class="kw">for</span> (<span class="kw">int</span> i = <span class="num">0</span>; i < nums.size(); ++i) {</span>` +
                `<span class="code-line" data-l="5"><span class="indent"></span><span class="indent"></span>global_max += nums[i];</span>` +
                `<span class="code-line" data-l="6"><span class="indent"></span><span class="indent"></span><span class="kw">if</span> (global_max - local_min > res) {</span>` +
                `<span class="code-line" data-l="7"><span class="indent"></span><span class="indent"></span><span class="indent"></span>res = global_max - local_min;</span>` +
                `<span class="code-line" data-l="8"><span class="indent"></span><span class="indent"></span>}</span>` +
                `<span class="code-line" data-l="9"><span class="indent"></span><span class="indent"></span><span class="kw">if</span> (global_max < local_min) {</span>` +
                `<span class="code-line" data-l="10"><span class="indent"></span><span class="indent"></span><span class="indent"></span>local_min = global_max;</span>` +
                `<span class="code-line" data-l="11"><span class="indent"></span><span class="indent"></span>}</span>` +
                `<span class="code-line" data-l="12"><span class="indent"></span>}</span>` +
                `<span class="code-line" data-l="13"><span class="indent"></span><span class="kw">return</span> res;</span>` +
                `<span class="code-line" data-l="14">}</span>`
        }
    };

    let A = [], steps = [], curIdx = 0, playTimer = null;

    function generateRandom() {
        const len = Math.floor(Math.random() * 8) + 5;
        const res = [];
        for(let i=0; i<len; i++) res.push(Math.floor(Math.random() * 21) - 10);
        document.getElementById('arr-input').value = res.join(', ');
        rebuild();
    }

    function rebuild() {
        A = document.getElementById('arr-input').value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
        if (A.length === 0) return;
        initKadane();
    }

    function initKadane() {
        clearInterval(playTimer);
        steps = [];
        let dp = Array(A.length).fill(null), curSum = A[0], gMax = A[0], start = 0, lastDrop = -1;
        
        dp[0] = A[0];
        // Начальное состояние (строка 2 в обоих языках)
        steps.push({ i: 0, dp: [...dp], res: gMax, chain: [0, 0], drop: -1, line: 2 });

        for (let i = 1; i < A.length; i++) {
            let line = 4; // По умолчанию cur = max(x, cur + x)
            if (A[i] > (curSum + A[i])) {
                curSum = A[i]; start = i; lastDrop = i - 1;
            } else {
                curSum += A[i];
            }
            dp[i] = curSum;
            // Шаг cur = max
            steps.push({ i: i, dp: [...dp], res: gMax, chain: [start, i], drop: lastDrop, line: 4 });
            
            // Шаг res = max
            gMax = Math.max(gMax, curSum);
            steps.push({ i: i, dp: [...dp], res: gMax, chain: [start, i], drop: lastDrop, line: 5 });
        }
        // Финальный шаг (return)
        steps.push({ i: -1, dp: [...dp], res: gMax, chain: [start, A.length-1], drop: lastDrop, line: 6 });
        
        curIdx = 0; render();
    }

    function syncCode() {
        if (currentMainTab === 'theory') return;
        const containerId = currentMainTab + '-display';
        const lines = document.getElementById(containerId).querySelectorAll('.code-line');
        lines.forEach(l => l.classList.remove('active'));
        
        const currentStep = steps[curIdx];
        if (currentStep) {
            const target = document.querySelector(`#${containerId} [data-l="${currentStep.line}"]`);
            if (target) target.classList.add('active');
        }
    }

    function render() {
        const s = steps[curIdx];
        if (!s) return;
        const gA = document.getElementById('grid-a'), gDP = document.getElementById('grid-dp');
        gA.innerHTML = ''; gDP.innerHTML = '';
        document.getElementById('g-max').textContent = s.res;
        document.getElementById('drop-val').textContent = s.drop !== -1 ? A[s.drop] : '';
        document.getElementById('step-info').textContent = `Step ${curIdx + 1}/${steps.length}`;

        A.forEach((val, i) => {
            const cA = document.createElement('div');
            cA.className = 'cell' + (i >= s.chain[0] && i <= s.chain[1] ? ' a-chain' : '') + (i === s.i ? ' a-current' : '');
            cA.textContent = val;
            gA.appendChild(cA);

            const cD = document.createElement('div');
            cD.className = 'cell' + (s.dp[i] === null ? ' dim' : '') + (i === s.drop ? ' drop-point' : '') + (i === s.i ? ' dp-active' : '');
            cD.textContent = s.dp[i] ?? '';
            gDP.appendChild(cD);
        });
        syncCode();
    }

    function go(d) {
        if(curIdx+d >= 0 && curIdx+d < steps.length) { curIdx+=d; render(); }
        else { clearInterval(playTimer); playTimer = null; }
    }

    function autoPlay() {
        if (playTimer) { clearInterval(playTimer); playTimer = null; return; }
        if (curIdx === steps.length - 1) curIdx = -1;
        playTimer = setInterval(() => go(1), 800);
    }

    function resetAll() { clearInterval(playTimer); playTimer = null; curIdx = 0; render(); }

    let currentMainTab = 'theory';
    function switchMainTab(btn, id) {
        currentMainTab = id;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(id).classList.add('active');
        renderContext();
    }

    function renderContext() {
        const panel = document.getElementById('context-panel');
        panel.innerHTML = '';
        const opts = currentMainTab === 'theory' ? ['EN', 'RU', 'UKR', 'DE'] : ['v1', 'v2'];
        opts.forEach((opt, idx) => {
            const b = document.createElement('button');
            b.className = 'sub-btn' + (idx === 0 ? ' active' : '');
            b.textContent = opt;
            b.onclick = () => {
                document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                b.classList.add('active');
                if(currentMainTab === 'theory') {
                    document.getElementById('theory-display').innerHTML = db.theory[opt];
                } else {
                    document.getElementById(currentMainTab + '-display').innerHTML = db[currentMainTab][opt];
                    syncCode();
                }
            };
            panel.appendChild(b);
        });
        
        if(currentMainTab === 'theory') {
            document.getElementById('theory-display').innerHTML = db.theory[opts[0]];
        } else {
            document.getElementById(currentMainTab + '-display').innerHTML = db[currentMainTab][opts[0]];
            syncCode();
        }
    }

    rebuild(); renderContext();
</script>
</body>
</html>
