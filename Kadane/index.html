<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Kadane's Final Fix</title>
    <style>
        :root { --bg: #141416; --card: #1e1e22; --text: #e1e1e3; --accent: #7f77dd; --border: #313136; --pos: #1d9e75; --orange: #e67e22; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 40px; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); max-width: 900px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stat-label { font-size: 10px; color: #9ba1a6; text-transform: uppercase; font-weight: 800; }
        .stat-val { font-size: 24px; font-weight: bold; font-family: monospace; }
        .grid { display: flex; gap: 10px; justify-content: center; margin: 15px 0 30px; }
        .cell {
            width: 55px; height: 55px; background: #26262a; border: 1px solid var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; font-family: monospace;
        }

        /* БЕЛЫЕ РАМКИ ДЛЯ ТЕХ САМЫХ ТОЧЕК */
        .drop-point { border: 3px solid #ffffff !important; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .start-point { border: 3px solid #ffffff !important; }
        
        .current { border: 2px solid var(--orange); }
        .is-best { background: var(--pos); color: white; }
        .dim { opacity: 0.3; }

        .controls { display: flex; gap: 10px; }
        button { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--accent); color: white; }
        button.sec { background: var(--bg); border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>∑ Kadane's Algorithm</h1>
        <div style="display: flex; gap: 30px;">
            <div><div class="stat-label">Local Min</div><div class="stat-val" style="color:var(--orange)">-2</div></div>
            <div><div class="stat-label">Global Max</div><div class="stat-val" id="g-max">0</div></div>
        </div>
    </div>

    <div class="stat-label">Input Array A</div>
    <div class="grid" id="grid-a"></div>

    <div class="stat-label">DP Array (White frames: -2 drop & 4 start)</div>
    <div class="grid" id="grid-dp"></div>

    <div class="controls">
        <button class="sec" onclick="move(-1)">← Back</button>
        <button onclick="move(1)">Next Step →</button>
        <button class="sec" onclick="reset()">Reset</button>
    </div>
</div>

<script>
    const A = [-2, 1, -3, 4, -1, 2, 1, -5, 4];
    let stepIdx = 0, history = [];

    function init() {
        let dp = Array(A.length).fill(null), curMax = A[0], globalMax = A[0];
        dp[0] = A[0];
        history.push({ dp: [...dp], curI: 0, res: globalMax, drop: -1, start: 0 });

        for(let i=1; i<A.length; i++) {
            let restart = A[i] > (curMax + A[i]);
            curMax = restart ? A[i] : curMax + A[i];
            dp[i] = curMax;
            if (curMax > globalMax) globalMax = curMax;

            history.push({
                dp: [...dp], curI: i, res: globalMax,
                // Если мы на шаге с индексом 3 (число 4) или дальше, показываем рамки на 2 и 3
                drop: i >= 3 ? 2 : -1, 
                start: i >= 3 ? 3 : -1
            });
        }
        render();
    }

    function render() {
        const s = history[stepIdx];
        const gA = document.getElementById('grid-a'), gDP = document.getElementById('grid-dp');
        gA.innerHTML = ''; gDP.innerHTML = '';
        document.getElementById('g-max').textContent = s.res;

        A.forEach((v, i) => {
            const cA = document.createElement('div');
            cA.className = `cell ${i === s.curI ? 'current' : ''}`;
            cA.textContent = v;
            gA.appendChild(cA);

            const cD = document.createElement('div');
            cD.className = `cell ${s.dp[i] === null ? 'dim' : ''}`;
            if (i === s.drop) cD.classList.add('drop-point');
            if (i === s.start) cD.classList.add('start-point');
            if (s.dp[i] === s.res && s.dp[i] !== null) cD.classList.add('is-best');
            cD.textContent = s.dp[i] === null ? '' : s.dp[i];
            gDP.appendChild(cD);
        });
    }

    function move(d) { if(stepIdx+d >=0 && stepIdx+d < history.length) { stepIdx+=d; render(); } }
    function reset() { stepIdx=0; render(); }
    init();
</script>
</body>
</html>
