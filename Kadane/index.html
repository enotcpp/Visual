<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadane's Algorithm | AlgoView Lab</title>
    <style>
        :root {
            --bg-main: #141416;
            --bg-card: #1e1e22;
            --bg-input: #26262a;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --border: #313136;
            --pos: #1d9e75; /* Green */
            --highlight: #e67e22; /* Orange */
        }

        body { margin: 0; padding: 0; font-family: sans-serif; background: var(--bg-main); color: var(--text-main); }
        .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .visualizer-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; }

        /* STATS PANEL */
        .stats-panel { display: flex; justify-content: flex-end; gap: 30px; margin-bottom: 20px; }
        .stat-item { text-align: right; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; font-weight: 800; }
        .stat-val { font-size: 24px; font-weight: 800; color: white; font-family: monospace; }
        .stat-val.orange { color: var(--highlight); }

        /* GRID */
        .viz-container { display: flex; flex-direction: column; gap: 25px; margin: 30px 0; }
        .row-label { font-size: 11px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 10px; font-weight: 800; }
        .grid-area { display: flex; justify-content: center; gap: 10px; }
        
        .cell {
            width: 55px; height: 55px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; font-family: monospace; position: relative;
        }
        
        /* Состояния ячеек */
        .grid-a .cell.active { border: 3px solid var(--highlight); }
        .grid-a .cell.in-max-range { border: 3px solid var(--pos); color: var(--pos); }

        .grid-dp .cell { opacity: 0.4; }
        .grid-dp .cell.processed { opacity: 1; }
        .grid-dp .cell.is-global-winner { background: var(--pos); color: white; border-color: white; }
        
        /* ТА САМАЯ ОРАНЖЕВАЯ РАМКА ДЛЯ ЛОКАЛЬНОГО МИНИМУМА */
        .grid-dp .cell.chain-start { border: 3px solid var(--highlight); opacity: 1; box-shadow: 0 0 10px rgba(230, 126, 34, 0.3); }
        /* Подсветка текущего шага заливкой при сбросе */
        .grid-dp .cell.current-step.reset-trigger { background: var(--highlight); color: white; }

        button { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: white; cursor: pointer; }
        button.primary { background: var(--accent); border: none; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-section">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <h1>∑ Kadane's Algorithm</h1>
            <div class="stats-panel">
                <div class="stat-item">
                    <div class="stat-label">Local Start Point</div>
                    <div class="stat-val orange" id="local-min-val">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Global Max (res)</div>
                    <div class="stat-val" id="global-max-val">0</div>
                </div>
            </div>
        </div>

        <div id="info" style="color: var(--text-secondary); margin-bottom: 20px; font-size: 14px;"></div>

        <div class="viz-container">
            <div>
                <div class="row-label">Input Array A</div>
                <div id="input-grid" class="grid-area"></div>
            </div>
            <div>
                <div class="row-label">DP Array (Orange frame = Local Minimum start)</div>
                <div id="dp-grid" class="grid-area"></div>
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button onclick="go(-1)">← Back</button>
            <button onclick="go(1)" class="primary">Next Step →</button>
            <button onclick="reset()">Reset</button>
        </div>
    </div>
</div>

<script>
    let A = [-2, 1, -3, 4, -1, 2, 1, -5, 4];
    let steps = [];
    let curStep = 0;

    function init() {
        steps = [];
        let dp = Array(A.length).fill(null);
        let res = A[0], current_sum = A[0];
        let start = 0, end = 0, temp_start = 0;
        let last_reset_idx = 0; // Индекс локального минимума

        // Step 0
        dp[0] = A[0];
        steps.push({ idx: 0, dp: [...dp], res, range: [0, 0], winner: 0, localMinIdx: 0, reset: false, msg: "Initialize with A[0]" });

        for (let i = 1; i < A.length; i++) {
            let restart = A[i] > current_sum + A[i];
            
            if (restart) {
                last_reset_idx = i - 1; // Мы фиксируем точку, ПОСЛЕ которой начался рост
                temp_start = i;
                current_sum = A[i];
            } else {
                current_sum += A[i];
            }
            
            dp[i] = current_sum;
            if (current_sum > res) {
                res = current_sum; start = temp_start; end = i;
            }

            steps.push({
                idx: i, dp: [...dp], res, range: [start, end], 
                winner: (dp[i] === res) ? i : steps[steps.length-1].winner, 
                localMinIdx: last_reset_idx,
                reset: restart,
                msg: restart ? `Reset! Starting new chain from ${A[i]}` : `Adding ${A[i]} to chain`
            });
        }
        render();
    }

    function render() {
        const s = steps[curStep];
        const gridA = document.getElementById('input-grid');
        const gridDP = document.getElementById('dp-grid');
        gridA.innerHTML = ''; gridDP.innerHTML = '';

        document.getElementById('global-max-val').textContent = s.res;
        document.getElementById('local-min-val').textContent = A[s.localMinIdx];
        document.getElementById('info').textContent = s.msg;

        A.forEach((val, i) => {
            const cellA = document.createElement('div');
            cellA.className = 'cell' + (i === s.idx ? ' active' : '') + (i >= s.range[0] && i <= s.range[1] ? ' in-max-range' : '');
            cellA.textContent = val;
            gridA.appendChild(cellA);

            const cellD = document.createElement('div');
            cellD.className = 'cell';
            if (s.dp[i] !== null) cellD.classList.add('processed');
            if (i === s.winner) cellD.classList.add('is-global-winner');
            if (i === s.idx && s.reset) cellD.classList.add('current-step', 'reset-trigger');
            
            // ГЛАВНОЕ: Оранжевая рамка на локальном минимуме
            if (i === s.localMinIdx) cellD.classList.add('chain-start');

            cellD.textContent = s.dp[i] === null ? '' : s.dp[i];
            gridDP.appendChild(cellD);
        });
    }

    function go(dir) { if (curStep + dir >= 0 && curStep + dir < steps.length) { curStep += dir; render(); } }
    function reset() { curStep = 0; render(); }

    init();
</script>
</body>
</html>
