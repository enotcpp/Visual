<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sieve of Eratosthenes | AlgoView Lab</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-main: #141416;
            --bg-card: #1e1e22;
            --bg-input: #26262a;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --accent-soft: rgba(127, 119, 221, 0.1);
            --accent-secondary: #1d9e75;
            --border: #313136;
            --code-bg: #0d0d0f;
            --discard: #36363a;
            --marking: #e67e22;
        }

        body { 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        /* VISUALIZER SECTION */
        .visualizer-section {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { font-size: 22px; margin: 0 0 25px 0; }

        .inputs { display: flex; gap: 12px; margin-bottom: 25px; align-items: center; }
        .inputs label { font-size: 14px; color: var(--text-secondary); }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 8px; width: 70px; outline: none;
        }

        button {
            padding: 10px 18px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-main); font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { border-color: var(--accent); background: #2d2d32; }
        button.primary { background: var(--accent); color: white; border: none; }

        .info-box {
            background: var(--bg-main); border-left: 4px solid var(--accent);
            padding: 15px; min-height: 60px; margin-bottom: 25px;
            font-size: 14px; line-height: 1.6; color: var(--text-secondary);
        }
        .info-box b { color: var(--text-main); }
        .limit-marker { color: var(--marking); font-weight: bold; }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 8px; margin-bottom: 30px;
        }
        .cell {
            aspect-ratio: 1/1; background: var(--bg-main); border: 1px solid var(--border);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cell.prime-active { background: var(--accent); color: white; transform: scale(1.1); z-index: 2; box-shadow: 0 0 15px rgba(127, 119, 221, 0.4); }
        .cell.marking { background: var(--marking); color: white; transform: scale(0.95); }
        .cell.discarded { opacity: 0.2; transform: scale(0.85); background: var(--discard); text-decoration: line-through; }
        .cell.is-prime-final { background: var(--accent-secondary) !important; color: white !important; opacity: 1 !important; transform: scale(1.05); }

        /* LAB INFO SECTION */
        .lab-info { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .tabs-nav { display: flex; background: #141416; border-bottom: 1px solid var(--border); }
        .tab-btn {
            background: none; border: none; padding: 18px 25px; color: var(--text-secondary);
            font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer;
        }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); }
        .context-controls { margin-left: auto; display: flex; align-items: center; gap: 6px; padding-right: 15px; }
        .sub-btn {
            font-size: 10px; padding: 4px 8px; background: transparent; 
            border: 1px solid var(--border); color: var(--text-secondary); border-radius: 4px; cursor: pointer;
        }
        .sub-btn.active { border-color: var(--accent); color: var(--accent); }

        .tab-content { display: none; padding: 25px; line-height: 1.6; }
        .tab-content.active { display: block; }
        pre[class*="language-"] { margin: 0; border-radius: 10px; background: var(--code-bg) !important; font-size: 14px; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="visualizer-section">
        <h1>🧬 Sieve of Eratosthenes</h1>
        
        <div class="inputs">
            <label>Find primes up to:</label>
            <input id="n-input" type="number" value="30" max="200">
            <button onclick="rebuild()" class="primary">Generate Grid</button>
        </div>

        <div class="info-box" id="info">Welcome! Set a limit and start the sieve.</div>

        <div class="grid" id="grid"></div>

        <div class="inputs" style="margin-top: 20px; margin-bottom: 0;">
            <button onclick="go(-1)">← Back</button>
            <button onclick="go(1)" class="primary">Next Step →</button>
            <button id="auto-btn" onclick="toggleAuto()">Auto Play</button>
            <button onclick="resetAll()">Reset</button>
            <span id="ctr" style="margin-left: auto; font-size: 12px; color: var(--text-secondary);"></span>
        </div>
    </div>

    <div class="lab-info">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchMainTab(this, 'theory')">Theory</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'python')">Python</button>
            <button class="tab-btn" onclick="switchMainTab(this, 'cpp')">C++</button>
            <div class="context-controls" id="context-panel"></div>
        </div>
        <div id="theory" class="tab-content active"><div id="theory-display"></div></div>
        <div id="python" class="tab-content"><pre><code class="language-python" id="python-display"></code></pre></div>
        <div id="cpp" class="tab-content"><pre><code class="language-cpp" id="cpp-display"></code></pre></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
    const db = {
        theory: {
            EN: "<h3>Sieve of Eratosthenes</h3><p>An ancient algorithm for finding all prime numbers up to any given limit. It works by marking multiples of each prime starting from 2.</p>",
            RU: "<h3>Решето Эратосфена</h3><p>Древний алгоритм для поиска всех простых чисел до заданного предела. Он работает путем последовательного вычеркивания чисел, кратных каждому найденному простому числу.</p>"
        },
        python: {
            v1: "def sieve(n):\n    isPrime = [True] * (n + 1)\n    isPrime[0] = isPrime[1] = False\n    for p in range(2, int(n**0.5) + 1):\n        if isPrime[p]:\n            for i in range(p * p, n + 1, p):\n                isPrime[i] = False\n    return [p for p in range(n + 1) if isPrime[p]]",
            v2: "# Memory efficient slice marking\ndef sieve_opt(n):\n    primes = [True] * (n + 1)\n    for p in range(2, int(n**0.5) + 1):\n        if primes[p]:\n            primes[p*p : n+1 : p] = [False] * len(range(p*p, n+1, p))\n    return [p for p in range(2, n + 1) if primes[p]]"
        },
        cpp: {
            v1: "void sieve(int n) {\n    vector<bool> isPrime(n + 1, true);\n    isPrime[0] = isPrime[1] = false;\n    for (int p = 2; p * p <= n; p++) {\n        if (isPrime[p]) {\n            for (int i = p * p; i <= n; i += p)\n                isPrime[i] = false;\n        }\n    }\n}",
            v2: "// Using bitset for large N\nbitset<1000001> isPrime;\nvoid sieve(int n) {\n    isPrime.set();\n    isPrime[0] = isPrime[1] = 0;\n    for (int p = 2; p * p <= n; p++) {\n        if (isPrime[p]) {\n            for (int i = p * p; i <= n; i += p)\n                isPrime[i] = 0;\n        }\n    }\n}"
        }
    };

    let n = 30, steps = [], cur = 0, timer = null, currentMainTab = 'theory';

    function switchMainTab(btn, tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        renderContextControls();
    }

    function renderContextControls() {
        const panel = document.getElementById('context-panel'); panel.innerHTML = '';
        const list = currentMainTab === 'theory' ? ['EN', 'RU'] : ['v1', 'v2'];
        list.forEach((item, idx) => {
            const b = document.createElement('button');
            b.className = 'sub-btn' + (idx === 0 ? ' active' : '');
            b.textContent = item;
            b.onclick = () => {
                document.querySelectorAll('.sub-btn').forEach(s => s.classList.remove('active'));
                b.classList.add('active');
                updateContent(item);
            };
            panel.appendChild(b);
        });
        updateContent(currentMainTab === 'theory' ? 'EN' : 'v1');
    }

    function updateContent(key) {
        const display = document.getElementById(currentMainTab + '-display');
        if (currentMainTab === 'theory') display.innerHTML = db.theory[key];
        else {
            display.textContent = db[currentMainTab][key];
            Prism.highlightElement(display);
        }
    }

    function rebuild() {
        n = parseInt(document.getElementById('n-input').value) || 30;
        if (n > 200) n = 200;
        initSieve();
    }

    function initSieve() {
        steps = [];
        let isPrime = new Array(n + 1).fill(true);
        let confirmed = [];
        isPrime[0] = isPrime[1] = false;
        let limit = Math.floor(Math.sqrt(n));
        
        steps.push({ type: 'init', states: [...isPrime], confirmed: [], msg: `Sieve initialized. Checking up to <span class="limit-marker">√${n} ≈ ${limit}</span>.` });

        for (let p = 2; p <= n; p++) {
            if (isPrime[p]) {
                if (p <= limit) {
                    steps.push({ type: 'prime-found', p: p, states: [...isPrime], confirmed: [...confirmed], msg: `<b>${p}</b> is prime. Marking its multiples...` });
                    for (let i = p * p; i <= n; i += p) {
                        isPrime[i] = false;
                        steps.push({ type: 'marking', p: p, m: i, states: [...isPrime], confirmed: [...confirmed], msg: `Marking <b>${i}</b> as composite.` });
                    }
                    confirmed.push(p);
                } else {
                    confirmed.push(p);
                    steps.push({ type: 'prime-skip', p: p, states: [...isPrime], confirmed: [...confirmed], msg: `<b>${p} > √${n}</b>. Already confirmed as prime.` });
                }
            }
        }
        steps.push({ type: 'final', states: [...isPrime], confirmed: [...confirmed], msg: `<b>Finished!</b> All highlighted numbers are prime.` });
        cur = 0; render();
    }

    function render() {
        const s = steps[cur];
        const grid = document.getElementById('grid');
        document.getElementById('info').innerHTML = s.msg;
        document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;
        
        grid.innerHTML = '';
        for (let i = 2; i <= n; i++) {
            const div = document.createElement('div');
            div.className = 'cell';
            div.textContent = i;
            if (s.confirmed.includes(i)) div.classList.add('is-prime-final');
            if (s.type === 'final') {
                if (s.states[i]) div.classList.add('is-prime-final');
                else div.classList.add('discarded');
            } else {
                if (!s.states[i] && (s.type !== 'marking' || i !== s.m)) div.classList.add('discarded');
                if ((s.type === 'prime-found' || s.type === 'marking' || s.type === 'prime-skip') && i === s.p) div.classList.add('prime-active');
                if (s.type === 'marking' && i === s.m) div.classList.add('marking');
            }
            grid.appendChild(div);
        }
    }

    function go(dir) {
        if (cur+dir >= 0 && cur+dir < steps.length) { cur+=dir; render(); }
        else if (timer) toggleAuto();
    }

    function toggleAuto() {
        const btn = document.getElementById('auto-btn');
        if (timer) { clearInterval(timer); timer = null; btn.textContent = "Auto Play"; }
        else { btn.textContent = "Stop"; timer = setInterval(() => go(1), 400); }
    }

    function resetAll() { cur=0; render(); if(timer) toggleAuto(); }

    renderContextControls();
    rebuild();
</script>
</body>
</html>
