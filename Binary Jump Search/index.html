<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AlgoView | Binary Jump Search</title>
    <style>
        :root {
            --bg-main: #1a1a1c;
            --bg-card: #242426;
            --bg-input: #2d2d30;
            --text-main: #e1e1e3;
            --text-secondary: #9ba1a6;
            --accent: #7f77dd;
            --border: #3e3e42;
            --current-pos: #f1c40f; /* From */
            --jump-target: #1d9e75; /* From + J */
            --failed-target: #e74c3c; 
        }

        body { 
            margin: 0; padding: 2rem; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main); color: var(--text-main); 
        }
        
        .wrap { max-width: 900px; margin: 0 auto; }
        
        .inputs { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
        .inputs input { 
            background: var(--bg-input); border: 1px solid var(--border);
            color: var(--text-main); padding: 10px; border-radius: 8px; font-size: 14px;
        }
        
        button {
            padding: 10px 20px; border-radius: 8px; border: none;
            background: var(--accent); color: white; font-weight: 600; cursor: pointer;
        }
        button.secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }

        .info-box {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; min-height: 80px; margin-bottom: 60px;
            border-left: 4px solid var(--accent);
        }

        .viz-area { position: relative; margin: 80px 0; }
        .array-row { display: flex; justify-content: center; gap: 8px; }

        .cell {
            width: 50px; height: 50px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--bg-card);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; position: relative;
            transition: all 0.3s ease;
        }

        /* Labels for pointers */
        .ptr {
            position: absolute; top: -45px; left: 50%;
            transform: translateX(-50%);
            padding: 2px 8px; border-radius: 4px;
            font-size: 12px; font-weight: bold; color: white;
            white-space: nowrap;
        }

        .cell.from { border: 3px solid var(--current-pos); color: var(--current-pos); }
        .cell.target { border: 3px solid var(--jump-target); background: rgba(29, 158, 117, 0.1); }
        .cell.checking { border: 2px solid var(--accent); transform: translateY(-5px); }
        .cell.found { background: var(--jump-target); color: white; border-color: white; }

        .jump-arc {
            position: absolute; height: 30px; border: 2px dashed var(--accent);
            border-bottom: none; border-radius: 50% 50% 0 0;
            top: -40px; transition: all 0.4s ease;
        }

        .ctrls { display: flex; align-items: center; gap: 10px; margin-top: 40px; }
        .ctr-lbl { font-size: 13px; color: var(--text-secondary); margin-left: auto; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="inputs">
        <label>Array:</label>
        <input id="in-arr" type="text" value="2, 5, 8, 12, 16, 23, 38, 45, 56, 72, 91" style="width: 300px;">
        <label>Target:</label>
        <input id="in-target" type="number" value="23" style="width: 80px;">
        <button onclick="rebuild()">Start Search</button>
    </div>

    <div class="info-box" id="info">Ready to search.</div>
    
    <div class="viz-area">
        <div id="array-row" class="array-row"></div>
    </div>

    <div class="ctrls">
        <button onclick="go(-1)" class="secondary">< Back</button>
        <button onclick="go(1)">Next Step ></button>
        <button onclick="resetAll()" class="secondary">Reset</button>
        <span class="ctr-lbl" id="ctr"></span>
    </div>
</div>

<script>
let steps = [], cur = 0;

function rebuild() {
    const arr = document.getElementById('in-arr').value.split(',').map(x => parseInt(x.trim())).sort((a,b) => a-b);
    const target = parseInt(document.getElementById('in-target').value);
    steps = buildJumpSteps(arr, target);
    cur = 0;
    render();
}

function buildJumpSteps(ar, value) {
    let _steps = [];
    let from = 0;
    let size = ar.length;

    _steps.push({ 
        arr: ar, from: 0, j: null, msg: `Initial state. Searching for <b>${value}</b>. Start from index 0.` 
    });

    // Main loop: j = size/2, size/4, ... 1
    for (let j = Math.floor(size / 2); j >= 1; j = Math.floor(j / 2)) {
        _steps.push({ 
            arr: ar, from: from, j: j, 
            msg: `Jump size <b>j = ${j}</b>. Trying to jump from index ${from}.` 
        });

        while (from + j < size && value >= ar[from + j]) {
            _steps.push({ 
                arr: ar, from: from, j: j, targetIdx: from + j, 
                msg: `Checking index ${from + j} (${ar[from + j]}). It's ≤ target, so we jump!` 
            });
            from += j;
            _steps.push({ 
                arr: ar, from: from, j: j, 
                msg: `New base position: <b>index ${from}</b>.` 
            });
        }
        
        if (from + j < size) {
            _steps.push({ 
                arr: ar, from: from, j: j, targetIdx: from + j, failed: true,
                msg: `Checking ${from + j} (${ar[from + j]}). It's > target. Can't jump, reducing <b>j</b>.` 
            });
        }
    }

    const found = (size > 0 && ar[from] === value);
    _steps.push({ 
        arr: ar, from: from, foundIdx: found ? from : null,
        msg: found ? `<b>Success!</b> Found ${value} at index ${from}.` : `<b>Not found.</b> Closest element is ${ar[from]}.`
    });

    return _steps;
}

function render() {
    const s = steps[cur];
    const container = document.getElementById('array-row');
    container.innerHTML = '';
    document.getElementById('info').innerHTML = s.msg;
    document.getElementById('ctr').textContent = `Step ${cur}/${steps.length-1}`;

    s.arr.forEach((val, idx) => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = val;

        if (idx === s.from) {
            cell.classList.add('from');
            const ptr = document.createElement('div');
            ptr.className = 'ptr';
            ptr.style.background = 'var(--current-pos)';
            ptr.textContent = 'from';
            cell.appendChild(ptr);
        }

        if (idx === s.targetIdx) {
            cell.classList.add('target');
            if (s.failed) cell.style.borderColor = 'var(--failed-target)';
            const ptr = document.createElement('div');
            ptr.className = 'ptr';
            ptr.style.background = s.failed ? 'var(--failed-target)' : 'var(--jump-target)';
            ptr.textContent = s.failed ? 'too far' : 'from + j';
            cell.appendChild(ptr);
        }

        if (idx === s.foundIdx) cell.classList.add('found');

        container.appendChild(cell);
    });
}

function go(dir) {
    const nx = cur + dir;
    if(nx >= 0 && nx < steps.length) { cur = nx; render(); }
}

function resetAll() { cur = 0; render(); }

rebuild();
</script>
</body>
</html>
